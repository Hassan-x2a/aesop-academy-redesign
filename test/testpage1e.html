<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>testpage1e</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 16px;
            font-size: 2rem;
        }

        .status {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            border-radius: 8px;
            padding: 16px;
            margin: 20px 0;
        }

        .status-icon {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .status-text {
            color: #2e7d32;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .info {
            color: #666;
            font-size: 0.9rem;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .timestamp {
            font-family: monospace;
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>testpage1e</h1>
        <div class="status">
            <div class="status-icon">✓</div>
            <div class="status-text">AI Factory Test Successful</div>
        </div>
        <p>This page was generated by AI Factory to verify the build system is working correctly.</p>
        <div class="info">
            <p>Page loaded at:</p>
            <div class="timestamp" id="timestamp"></div>
        </div>
    </div>

    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
