<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ladder Admin - AESOP AI Academy</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon_16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon_32.png">
<style>
:root {
  --bg: #0f172a;
  --panel: #162032;
  --panel-2: #1e293b;
  --line: #334155;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --gold: #c9a05a;
  --good: #22c55e;
  --warn: #f59e0b;
  --bad: #ef4444;
  --blue: #38bdf8;
}
* { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font: 14px/1.5 system-ui, -apple-system, Segoe UI, sans-serif; margin: 0; min-height: 100vh; }
button, input, select { font: inherit; }
button { background: var(--gold); border: 0; border-radius: 7px; color: #111827; cursor: pointer; font-weight: 800; min-height: 38px; padding: 0.55rem 0.8rem; }
button.secondary { background: transparent; border: 1px solid var(--line); color: var(--text); }
button:disabled { cursor: not-allowed; opacity: 0.55; }
input, select { background: #0b1220; border: 1px solid var(--line); border-radius: 7px; color: var(--text); min-height: 38px; padding: 0.55rem 0.7rem; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
.auth-overlay { align-items: center; background: rgba(15, 23, 42, 0.97); display: none; inset: 0; justify-content: center; padding: 1rem; position: fixed; z-index: 20; }
.auth-box { background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; max-width: 380px; padding: 1.5rem; width: 100%; }
.auth-box h1 { font-size: 1.3rem; margin: 0 0 0.35rem; }
.auth-box p, .muted { color: var(--muted); }
.auth-box input { margin-top: 0.55rem; width: 100%; }
.auth-box button { margin-top: 0.75rem; width: 100%; }
.auth-error { color: var(--bad); min-height: 1.2rem; padding-top: 0.5rem; }
header { align-items: center; background: #0b1220; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: 1rem; justify-content: space-between; padding: 1rem 1.25rem; }
.brand strong { color: var(--gold); display: block; font-size: 0.76rem; letter-spacing: 0.14em; text-transform: uppercase; }
.brand h1 { font-size: clamp(1.45rem, 4vw, 2rem); margin: 0.15rem 0 0; }
.top-actions { align-items: center; display: flex; flex-wrap: wrap; gap: 0.6rem; }
.user-label { color: var(--muted); font-size: 0.84rem; }
.toolbar { align-items: center; background: #0b1220; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: 0.65rem; padding: 0.85rem 1.25rem; }
.toolbar input { min-width: min(320px, 100%); }
.toolbar select { min-width: 180px; }
.tabs { display: flex; flex-wrap: wrap; gap: 0.45rem; padding: 1rem 1.25rem 0; }
.tab { background: transparent; border: 1px solid var(--line); color: var(--muted); }
.tab.active { background: var(--gold); border-color: var(--gold); color: #111827; }
main { padding: 1rem 1.25rem 2.5rem; }
.stats { display: grid; gap: 0.8rem; grid-template-columns: repeat(5, minmax(0, 1fr)); margin-bottom: 1rem; }
.stat, .section { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; }
.stat { padding: 0.9rem; }
.stat strong { color: var(--gold); display: block; font-size: 1.8rem; line-height: 1; }
.stat span { color: var(--muted); display: block; font-size: 0.72rem; font-weight: 900; letter-spacing: 0.08em; margin-top: 0.4rem; text-transform: uppercase; }
.section { overflow: hidden; }
.section-head { align-items: center; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: space-between; padding: 0.9rem 1rem; }
.section-head h2 { font-size: 1rem; margin: 0; }
.table-wrap { overflow: auto; }
table { border-collapse: collapse; min-width: 1080px; width: 100%; }
th, td { border-bottom: 1px solid var(--line); padding: 0.72rem 0.75rem; text-align: left; vertical-align: top; }
th { background: rgba(255,255,255,0.04); color: var(--muted); font-size: 0.72rem; letter-spacing: 0.08em; position: sticky; text-transform: uppercase; top: 0; }
td small { color: var(--muted); display: block; margin-top: 0.18rem; }
.pill { border: 1px solid var(--line); border-radius: 999px; display: inline-flex; font-size: 0.74rem; font-weight: 800; padding: 0.16rem 0.48rem; white-space: nowrap; }
.pill.good { background: rgba(34, 197, 94, 0.12); border-color: rgba(34, 197, 94, 0.4); color: var(--good); }
.pill.warn { background: rgba(245, 158, 11, 0.12); border-color: rgba(245, 158, 11, 0.4); color: var(--warn); }
.pill.bad { background: rgba(239, 68, 68, 0.12); border-color: rgba(239, 68, 68, 0.4); color: var(--bad); }
.pill.info { background: rgba(56, 189, 248, 0.12); border-color: rgba(56, 189, 248, 0.4); color: var(--blue); }
.empty, .loading, .error { color: var(--muted); padding: 2rem; text-align: center; }
.error { color: #fecaca; }
.details { max-width: 360px; white-space: normal; }
.nowrap { white-space: nowrap; }
@media (max-width: 900px) {
  .stats { grid-template-columns: 1fr 1fr; }
  .toolbar input, .toolbar select { flex: 1 1 100%; }
}
.row-actions { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.row-actions button { font-size: 0.78rem; min-height: 30px; padding: 0.32rem 0.55rem; }
.row-actions button.bad { background: rgba(239, 68, 68, 0.12); color: #fecaca; border: 1px solid rgba(239, 68, 68, 0.4); }
.row-actions button.info { background: rgba(56, 189, 248, 0.12); color: var(--blue); border: 1px solid rgba(56, 189, 248, 0.4); }
.modal-overlay { align-items: center; background: rgba(8, 12, 22, 0.78); display: none; inset: 0; justify-content: center; padding: 1rem; position: fixed; z-index: 30; overflow: auto; }
.modal-overlay.open { display: flex; }
.modal { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; max-width: 720px; padding: 1.25rem 1.5rem; width: 100%; max-height: calc(100vh - 2rem); overflow: auto; }
.modal h2 { font-size: 1.15rem; margin: 0 0 0.5rem; }
.modal .modal-sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 1rem; }
.modal label { color: var(--muted); display: block; font-size: 0.72rem; font-weight: 800; letter-spacing: 0.08em; margin: 0.85rem 0 0.3rem; text-transform: uppercase; }
.modal input, .modal select, .modal textarea { background: #0b1220; border: 1px solid var(--line); border-radius: 7px; color: var(--text); font: inherit; padding: 0.55rem 0.7rem; width: 100%; }
.modal textarea { min-height: 90px; resize: vertical; }
.modal .modal-row { display: grid; gap: 0.75rem; grid-template-columns: 1fr 1fr; }
.modal .modal-row.three { grid-template-columns: repeat(3, 1fr); }
.modal-banner { border-radius: 8px; margin: 1rem 0; padding: 0.75rem 0.9rem; font-size: 0.9rem; }
.modal-banner.good { background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94, 0.4); color: #bbf7d0; }
.modal-banner.bad { background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.4); color: #fecaca; }
.modal-banner.warn { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.4); color: #fde68a; }
.modal-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: flex-end; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--line); }
.modal pre.transcript { background: #0b1220; border: 1px solid var(--line); border-radius: 7px; color: var(--text); font-size: 0.82rem; line-height: 1.5; margin: 0; max-height: 320px; overflow: auto; padding: 0.85rem; white-space: pre-wrap; }
.modal pre.json { background: #0b1220; border: 1px solid var(--line); border-radius: 7px; color: #e2e8f0; font-size: 0.78rem; line-height: 1.45; margin: 0.4rem 0 0; max-height: 200px; overflow: auto; padding: 0.75rem; white-space: pre; }
.muted-note { color: var(--muted); font-size: 0.82rem; margin: 0.4rem 0 0; }
</style>
</head>
<body>
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h1>AESOP Admin Access</h1>
    <p>Sign in to view Ladder assessments, course completions, and certification attempts.</p>
    <input id="authEmail" type="email" placeholder="Admin email" autocomplete="email">
    <input id="authPass" type="password" placeholder="Password" autocomplete="current-password">
    <button id="authBtn" type="button">Sign in</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<div id="app" hidden>
  <header>
    <div class="brand">
      <strong>AESOP Admin</strong>
      <h1>Ladder Activity</h1>
    </div>
    <div class="top-actions">
      <span class="user-label" id="userLabel"></span>
      <a href="/theladder/" class="button">Open Ladder</a>
      <button id="refreshBtn" type="button">Refresh</button>
      <button id="signOutBtn" class="secondary" type="button">Sign out</button>
    </div>
  </header>

  <div class="toolbar">
    <input id="searchInput" type="search" placeholder="Search learner ID, course, tier, status..." autocomplete="off">
    <select id="statusFilter" aria-label="Status filter">
      <option value="all">All statuses</option>
      <option value="completed">Completed / certified</option>
      <option value="started">Started</option>
      <option value="failed">Failed / not certified</option>
      <option value="validation_failed">Validation failed</option>
    </select>
    <button id="exportBtn" class="secondary" type="button">Download current view</button>
  </div>

  <div class="tabs" role="tablist" aria-label="Ladder admin views">
    <button class="tab active" type="button" data-view="assessments">Assessments</button>
    <button class="tab" type="button" data-view="courses">Completed courses</button>
    <button class="tab" type="button" data-view="certifications">Certification attempts</button>
    <button class="tab" type="button" data-view="cert-stats">Certification stats</button>
    <button class="tab" type="button" data-view="award">Award credential</button>
  </div>

  <main>
    <section class="stats" aria-label="Summary">
      <div class="stat"><strong id="statLearners">0</strong><span>Learners</span></div>
      <div class="stat"><strong id="statAssessments">0</strong><span>Assessments</span></div>
      <div class="stat"><strong id="statCourses">0</strong><span>Completed Courses</span></div>
      <div class="stat"><strong id="statAttempts">0</strong><span>Cert Attempts</span></div>
      <div class="stat"><strong id="statCredentials">0</strong><span>Credentials</span></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 id="viewTitle">Assessments</h2>
        <span class="muted" id="viewMeta">Loading...</span>
      </div>
      <div class="table-wrap" id="tableWrap">
        <div class="loading">Loading learner records...</div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
    <div class="modal" id="modalBody"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { FIREBASE_CONFIG } from '/ai-academy/js/firebase-config.js';
import { LADDER_TIERS } from '/theladder/ladder-data.js?v=2';

const ADMIN_EMAILS = ['scott@aesopacademy.org'];

const PROXY_URL = '/aesop-api/proxy.php';
const CERTIFICATION_VALIDATOR_MODEL = 'claude-sonnet-4-5-20250929';
const CERTIFICATION_RESULT_REGEX = /<!--LADDER_CERTIFICATION_RESULT:([\s\S]*?)-->/;
const CERTIFICATION_VALIDATION_REGEX = /<!--LADDER_CERTIFICATION_VALIDATION:([\s\S]*?)-->/;

// Mirror the live theladder model. Education tiers + professional roles share
// a single dropdown (matches renderEvaluationPanel in ladder-app.js).
const EDUCATION_TIERS = [
  { id: 'elementary', label: 'Elementary', standards: 'AI4K12, ISTE, UNESCO' },
  { id: 'middle-school', label: 'Middle School', standards: 'AI4K12, ISTE, CSTA, UNESCO' },
  { id: 'high-school', label: 'High School', standards: 'AI4K12, ISTE, CSTA, UNESCO' }
];
const PROFESSIONAL_ROLES = [
  { id: 'ai-developer', label: 'AI Developer', source: 'O*NET 15-1255+', standards: 'O*NET, WEF, NIST AI RMF' },
  { id: 'machine-learning-engineer', label: 'Machine Learning Engineer', source: 'O*NET 15-1255+', standards: 'O*NET, WEF, NIST AI RMF' },
  { id: 'data-scientist', label: 'Data Scientist', source: 'O*NET 15-2051.00', standards: 'O*NET, WEF, NIST AI RMF' },
  { id: 'ai-operations-engineer', label: 'AI Operations Engineer', source: 'WEF Future of Jobs 2025', standards: 'WEF, NIST AI RMF, ISO/IEC 42001' },
  { id: 'ai-product-manager', label: 'AI Product Manager', source: 'WEF Future of Jobs 2025', standards: 'WEF, O*NET Product Management' },
  { id: 'ai-educator', label: 'AI Educator', source: 'O*NET 25-1021.00', standards: 'O*NET, UNESCO, ISTE' },
  { id: 'ai-security-specialist', label: 'AI Security Specialist', source: 'O*NET 15-3121.00', standards: 'O*NET, NIST AI RMF, OWASP' },
  { id: 'ai-governance-officer', label: 'AI Governance Officer', source: 'WEF Future of Jobs 2025', standards: 'WEF, NIST AI RMF, EU AI Act' },
  { id: 'ai-consultant', label: 'AI Consultant', source: 'O*NET 13-1111.00', standards: 'O*NET, WEF, NIST AI RMF' },
  { id: 'executive-leadership', label: 'Executive Leadership', source: 'WEF, NIST AI RMF', standards: 'WEF, NIST AI RMF, EU AI Act' }
];
const TEST_DEPTHS = [
  { id: 'core', label: 'Core Certification', evidence: 'clear foundational competency in the selected function' },
  { id: 'certification', label: 'Certification', evidence: 'clear competency evidence for professional role and function' },
  { id: 'expert-certification', label: 'Expert Certification', evidence: 'strong transfer, edge-case reasoning, and defensible tradeoff analysis' },
  { id: 'master-certification', label: 'Master Certification', evidence: 'original synthesis, portfolio-grade artifact, standards mapping, and leadership-level defense' }
];
const CERTIFICATION_TIER_LOOKUP = new Map([
  ...EDUCATION_TIERS.map((t) => [t.id, { ...t, kind: 'education' }]),
  ...PROFESSIONAL_ROLES.map((r) => [r.id, { ...r, kind: 'role' }])
]);
const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);

let learners = [];
let rows = { assessments: [], courses: [], certifications: [] };
let activeView = 'assessments';

const el = {
  authOverlay: document.getElementById('authOverlay'),
  app: document.getElementById('app'),
  authEmail: document.getElementById('authEmail'),
  authPass: document.getElementById('authPass'),
  authBtn: document.getElementById('authBtn'),
  authError: document.getElementById('authError'),
  userLabel: document.getElementById('userLabel'),
  refreshBtn: document.getElementById('refreshBtn'),
  signOutBtn: document.getElementById('signOutBtn'),
  searchInput: document.getElementById('searchInput'),
  statusFilter: document.getElementById('statusFilter'),
  exportBtn: document.getElementById('exportBtn'),
  tableWrap: document.getElementById('tableWrap'),
  viewTitle: document.getElementById('viewTitle'),
  viewMeta: document.getElementById('viewMeta')
};

const esc = (value) => String(value ?? '')
  .replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;')
  .replace(/'/g, '&#039;');

function fmtDate(value) {
  if (!value) return 'Not recorded';
  const date = value?.toDate ? value.toDate() : new Date(value);
  if (Number.isNaN(date.getTime())) return 'Not recorded';
  return date.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
}

function statusPill(status) {
  const normalized = String(status || 'unknown').toLowerCase();
  const kind = ['completed', 'certified', 'valid', 'passed'].some((item) => normalized.includes(item))
    ? 'good'
    : ['failed', 'invalid', 'not_certified', 'validation_failed'].some((item) => normalized.includes(item))
      ? 'bad'
      : ['started', 'pending'].some((item) => normalized.includes(item))
        ? 'warn'
        : 'info';
  return `<span class="pill ${kind}">${esc(status || 'unknown')}</span>`;
}

function courseTitle(id, record) {
  return record?.title || record?.courseTitle || String(id || '').replace(/-/g, ' ');
}

function isCompletedCourse(record) {
  const status = String(record?.status || '').toLowerCase();
  return ['complete', 'completed', 'certified', 'passed', 'finished'].some((word) => status.includes(word))
    || Boolean(record?.completedAt || record?.certifiedOn || record?.certificateEarnedAt)
    || Number(record?.progressPercent || record?.percentComplete || 0) >= 100;
}

function latestTime(values) {
  const times = values
    .map((value) => value ? new Date(value?.toDate ? value.toDate() : value).getTime() : 0)
    .filter((time) => !Number.isNaN(time) && time > 0);
  if (!times.length) return '';
  return new Date(Math.max(...times)).toISOString();
}

function assessmentRowsFor(learner) {
  const data = learner.data;
  const ladder = data.ladderProgress || {};
  const placement = ladder.placement || data.profile?.ladderPlacement || null;
  const messages = Array.isArray(ladder.assessmentMessages) ? ladder.assessmentMessages : [];
  const events = Array.isArray(ladder.transcriptEvents) ? ladder.transcriptEvents : [];
  const assessmentEvents = events.filter((event) => String(event.eventType || '').includes('placement_assessment'));
  const userResponses = messages.filter((message) => message.role === 'user').length;
  const hasAssessment = Boolean(placement) || messages.length > 0 || assessmentEvents.length > 0;
  if (!hasAssessment) return [];
  const status = placement ? 'completed' : 'started';
  const grantedTierIds = placement?.grantedTierIds || placement?.placedOutTierIds || [];
  const assignedTopicIds = placement?.assignedTopicIds || [];
  return [{
    learnerId: learner.id,
    status,
    responses: userResponses,
    placedOut: grantedTierIds.length,
    assigned: assignedTopicIds.length,
    capability: placement?.capabilityScore ?? '',
    technical: placement?.technicalScore ?? '',
    governance: placement?.governanceScore ?? '',
    interests: Array.isArray(placement?.interestTags) ? placement.interestTags.join(', ') : '',
    updatedAt: placement?.profileAppliedAt || placement?.certifiedAt || latestTime(assessmentEvents.map((event) => event.createdAt || event.at)),
    profileAppliedAt: placement?.profileAppliedAt || '',
    transcriptUrl: `/student-transcript-live.html?id=${encodeURIComponent(learner.id)}`
  }];
}

function courseRowsFor(learner) {
  const progress = learner.data.courseProgress || {};
  return Object.entries(progress)
    .filter(([, record]) => isCompletedCourse(record || {}))
    .map(([courseId, record]) => ({
      learnerId: learner.id,
      courseId,
      title: courseTitle(courseId, record),
      status: record?.status || 'completed',
      completedAt: record?.completedAt || record?.certifiedOn || record?.certificateEarnedAt || record?.updatedAt || '',
      modulesCompleted: record?.modulesCompleted ?? '',
      score: record?.testScore ?? record?.score ?? record?.finalScore ?? '',
      evidence: record?.certificateId || record?.evidence || record?.path || '',
      transcriptUrl: `/student-transcript-live.html?id=${encodeURIComponent(learner.id)}`
    }));
}

function certificationRowsFor(learner) {
  const data = learner.data;
  const ladder = data.ladderProgress || {};
  const attempts = Array.isArray(ladder.evaluationAttempts) ? ladder.evaluationAttempts : [];
  const credentials = data.ladderCertifications || data.studentTranscript?.ladderCertifications || ladder.ladderCertifications || [];
  const credentialByAttempt = new Map(credentials.map((cert) => [String(cert.id || '').split(':').pop(), cert]));
  const conversations = ladder.certificationConversations || data.certificationConversations || {};
  return attempts.map((attempt) => {
    const credential = credentialByAttempt.get(attempt.attemptId) || null;
    const validation = attempt.validation || credential?.validation || null;
    const transcript = conversations?.[attempt.attemptId];
    return {
      learnerId: learner.id,
      attemptId: attempt.attemptId || '',
      status: attempt.status || 'started',
      proposedStatus: attempt.proposedStatus || '',
      validationStatus: attempt.validationStatus || (validation?.valid === true ? 'valid' : validation?.valid === false ? 'invalid' : ''),
      tier: attempt.ladderTierLabel || attempt.ladderTierId || '',
      educationTier: attempt.certificationTierLabel || '',
      depth: attempt.testDepthLabel || attempt.depthLabel || attempt.testDepthId || '',
      startedAt: attempt.startedAt || attempt.createdAt || '',
      completedAt: attempt.completedAt || '',
      score: attempt.score ?? '',
      validator: validation?.reviewerModel || '',
      rationale: validation?.rationale || attempt.rationale || '',
      credentialed: Boolean(credential),
      hasStoredTranscript: Array.isArray(transcript?.messages) && transcript.messages.length > 0,
      transcriptUrl: `/student-transcript-live.html?id=${encodeURIComponent(learner.id)}`
    };
  });
}

function rebuildRows() {
  rows = learners.reduce((acc, learner) => {
    acc.assessments.push(...assessmentRowsFor(learner));
    acc.courses.push(...courseRowsFor(learner));
    acc.certifications.push(...certificationRowsFor(learner));
    return acc;
  }, { assessments: [], courses: [], certifications: [] });
  rows.assessments.sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)));
  rows.courses.sort((a, b) => String(b.completedAt).localeCompare(String(a.completedAt)));
  rows.certifications.sort((a, b) => String(b.startedAt || b.completedAt).localeCompare(String(a.startedAt || a.completedAt)));
}

function currentRows() {
  const query = el.searchInput.value.trim().toLowerCase();
  const status = el.statusFilter.value;
  return (rows[activeView] || []).filter((row) => {
    const haystack = JSON.stringify(row).toLowerCase();
    if (query && !haystack.includes(query)) return false;
    if (status === 'all') return true;
    const rowStatus = String(row.status || '').toLowerCase();
    if (status === 'completed') return ['completed', 'certified', 'valid', 'passed'].some((word) => rowStatus.includes(word));
    if (status === 'failed') return ['failed', 'not_certified', 'invalid'].some((word) => rowStatus.includes(word));
    return rowStatus.includes(status);
  });
}

function setStats() {
  document.getElementById('statLearners').textContent = learners.length;
  document.getElementById('statAssessments').textContent = rows.assessments.length;
  document.getElementById('statCourses').textContent = rows.courses.length;
  document.getElementById('statAttempts').textContent = rows.certifications.length;
  const credentialCount = learners.reduce((count, learner) => {
    const data = learner.data;
    const certs = data.ladderCertifications || data.studentTranscript?.ladderCertifications || data.ladderProgress?.ladderCertifications || [];
    return count + certs.filter((cert) => cert.source !== 'assessment').length;
  }, 0);
  document.getElementById('statCredentials').textContent = credentialCount;
}

function assessmentTable(items) {
  return `<table><thead><tr><th>Learner</th><th>Status</th><th>Responses</th><th>Placed out</th><th>Assigned</th><th>Scores</th><th>Interests</th><th>Updated</th></tr></thead><tbody>
    ${items.map((row) => `<tr>
      <td><a href="${esc(row.transcriptUrl)}">${esc(row.learnerId)}</a></td>

function computeCertificationStats() {
  const attempts = rows.certifications || [];
  const stats = {
    total: attempts.length,
    certified: attempts.filter((a) => ['completed', 'certified', 'valid'].some((word) => String(a.status || '').toLowerCase().includes(word))).length,
    notCertified: attempts.filter((a) => ['failed', 'not_certified', 'invalid'].some((word) => String(a.status || '').toLowerCase().includes(word))).length,
    started: attempts.filter((a) => ['started'].some((word) => String(a.status || '').toLowerCase().includes(word))).length,
    byTier: {},
    byDepth: {},
    scores: {
      all: attempts.filter((a) => a.score && !isNaN(a.score)).map((a) => Number(a.score)),
      certified: attempts.filter((a) => a.score && !isNaN(a.score) && ['completed', 'certified', 'valid'].some((word) => String(a.status || '').toLowerCase().includes(word))).map((a) => Number(a.score)),
      notCertified: attempts.filter((a) => a.score && !isNaN(a.score) && ['failed', 'not_certified', 'invalid'].some((word) => String(a.status || '').toLowerCase().includes(word))).map((a) => Number(a.score))
    }
  };

  attempts.forEach((attempt) => {
    const tier = attempt.tier || 'unknown';
    if (!stats.byTier[tier]) stats.byTier[tier] = { total: 0, certified: 0, avg: 0, scores: [] };
    stats.byTier[tier].total++;
    if (['completed', 'certified', 'valid'].some((word) => String(attempt.status || '').toLowerCase().includes(word))) {
      stats.byTier[tier].certified++;
    }
    if (attempt.score && !isNaN(attempt.score)) {
      stats.byTier[tier].scores.push(Number(attempt.score));
    }
  });
  Object.keys(stats.byTier).forEach((tier) => {
    const scores = stats.byTier[tier].scores || [];
    stats.byTier[tier].avg = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '-';
  });

  attempts.forEach((attempt) => {
    const depth = attempt.depth || 'unknown';
    if (!stats.byDepth[depth]) stats.byDepth[depth] = { total: 0, certified: 0, avg: 0, scores: [] };
    stats.byDepth[depth].total++;
    if (['completed', 'certified', 'valid'].some((word) => String(attempt.status || '').toLowerCase().includes(word))) {
      stats.byDepth[depth].certified++;
    }
    if (attempt.score && !isNaN(attempt.score)) {
      stats.byDepth[depth].scores.push(Number(attempt.score));
    }
  });
  Object.keys(stats.byDepth).forEach((depth) => {
    const scores = stats.byDepth[depth].scores || [];
    stats.byDepth[depth].avg = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '-';
  });

  return stats;
}

function certificationStatsTable() {
  const stats = computeCertificationStats();
  const certRate = stats.total ? ((stats.certified / stats.total) * 100).toFixed(1) : 0;
  const avgScoreAll = stats.scores.all.length ? (stats.scores.all.reduce((a, b) => a + b, 0) / stats.scores.all.length).toFixed(1) : '-';
  const avgScoreCert = stats.scores.certified.length ? (stats.scores.certified.reduce((a, b) => a + b, 0) / stats.scores.certified.length).toFixed(1) : '-';
  const avgScoreFail = stats.scores.notCertified.length ? (stats.scores.notCertified.reduce((a, b) => a + b, 0) / stats.scores.notCertified.length).toFixed(1) : '-';

  const tierRows = Object.entries(stats.byTier).sort(([a], [b]) => a.localeCompare(b));

  return `<div style="display: grid; gap: 2rem;">

        <div><div style="font-size: 2.2rem; font-weight: 800; color: var(--gold);">${esc(certRate)}%</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">Pass rate</div></div>
        <div><div style="font-size: 2.2rem; font-weight: 800; color: var(--good);">${esc(stats.certified)}</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">Certified</div></div>
        <div><div style="font-size: 2.2rem; font-weight: 800; color: var(--bad);">${esc(stats.notCertified)}</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">Not certified</div></div>
        <div><div style="font-size: 2.2rem; font-weight: 800; color: var(--warn);">${esc(stats.started)}</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">In progress</div></div>
      </div>
    </section>

    <section class="section">
      <div class="section-head"><h2>By Education Tier</h2></div>
      <div class="table-wrap"><table><thead><tr><th>Tier</th><th>Attempts</th><th>Certified</th><th>Pass Rate</th><th>Avg Score</th></tr></thead><tbody>
        ${tierRows.map(([tier, data]) => { const rate = data.total ? ((data.certified / data.total) * 100).toFixed(1) : 0; return `<tr><td><strong>${esc(tier)}</strong></td><td>${esc(data.total)}</td><td><span class="pill good">${esc(data.certified)}</span></td><td>${esc(rate)}%</td><td>${esc(data.avg)}</td></tr>`; }).join('')}
      </tbody></table></div>
    </section>

    <section class="section">
      <div class="section-head"><h2>By Certification Depth</h2></div>
      <div class="table-wrap"><table><thead><tr><th>Depth</th><th>Attempts</th><th>Certified</th><th>Pass Rate</th><th>Avg Score</th></tr></thead><tbody>
        ${depthRows.map(([depth, data]) => { const rate = data.total ? ((data.certified / data.total) * 100).toFixed(1) : 0; return `<tr><td><strong>${esc(depth)}</strong></td><td>${esc(data.total)}</td><td><span class="pill good">${esc(data.certified)}</span></td><td>${esc(rate)}%</td><td>${esc(data.avg)}</td></tr>`; }).join('')}
      </tbody></table></div>
    </section>

    <section class="section">
      <div class="section-head"><h2>Average Scores</h2></div>
      <div style="padding: 1.5rem 1rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; text-align: center;">
        <div><div style="font-size: 1.8rem; font-weight: 800; color: var(--blue);">${esc(avgScoreAll)}</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">All attempts</div></div>

        <div><div style="font-size: 1.8rem; font-weight: 800; color: var(--bad);">${esc(avgScoreFail)}</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">Not certified</div></div>
      </div>

// -- Admin write helpers ---------------------------------------------------

function findLearnerById(learnerId) {
  const lookup = String(learnerId || '').trim();
  if (!lookup) return null;
  const upper = lookup.toUpperCase();
  return learners.find((l) => l.id === upper) || learners.find((l) => String(l.data.learnerId || '').toUpperCase() === upper) || null;
}

function findAttempt(learner, attemptId) {
  const attempts = learner?.data?.ladderProgress?.evaluationAttempts || [];
  return attempts.find((a) => a.attemptId === attemptId) || null;
}

function findStoredConversation(learner, attemptId) {
  const conversations = learner?.data?.ladderProgress?.certificationConversations || learner?.data?.certificationConversations || {};
  return conversations[attemptId] || null;
}

function adminEmail() {
  return auth.currentUser?.email || 'admin';
}

async function writeLearner(learnerId, patch) {
  const upper = String(learnerId || '').trim();
  if (!upper) throw new Error('learnerId required');
  await setDoc(doc(db, 'learners', upper), patch, { merge: true });
}

function buildLadderTierMeta(ladderTierId) {
  const idx = LADDER_TIERS.findIndex((t) => t.id === ladderTierId);
  if (idx === -1) return { id: ladderTierId, label: ladderTierId, order: 0 };
  const tier = LADDER_TIERS[idx];
  return { id: tier.id, label: `${tier.name} - ${tier.title}`, order: idx + 1 };
}

function buildCertTierMeta(certTierId) {
  return CERTIFICATION_TIER_LOOKUP.get(certTierId) || { ...EDUCATION_TIERS[0], kind: 'education' };
}

function buildDepthMeta(depthId) {
  return TEST_DEPTHS.find((d) => d.id === depthId) || TEST_DEPTHS[0];
}

function buildAdminCredential({ learnerId, ladderTierId, certTierId, depthId, rationale, score, attemptId, source, validation }) {
  const tierMeta = buildLadderTierMeta(ladderTierId);
  const certMeta = buildCertTierMeta(certTierId);
  const depthMeta = buildDepthMeta(depthId);
  const earnedAt = new Date().toISOString();
  const credentialAttemptId = attemptId || `admin_${Date.now()}`;
  const blueprintId = `${certMeta.id}:${tierMeta.id}:${depthMeta.id}`;
  return {
    id: `${blueprintId}:${credentialAttemptId}`,
    source: source || 'admin_override',
    status: 'certified',
    evidence: source === 'ai_exam_revalidated' ? 'verified' : 'admin_override',
    depthId: depthMeta.id,
    depthLabel: depthMeta.label,
    certificationTierId: certMeta.id,
    certificationTierLabel: certMeta.label,
    ladderTierId: tierMeta.id,
    ladderTierLabel: tierMeta.label,
    tierOrder: tierMeta.order,
    title: `${tierMeta.label} - ${depthMeta.label}`,
    earnedAt,
    score: score === undefined || score === '' ? null : Number(score),
    rationale: rationale || 'Admin-recorded credential.',
    standards: certMeta.standards,
    blueprintId,
    blueprintVersion: 'v0.1',
    identityAssurance: null,
    validation: validation || {
      id: `validation:${credentialAttemptId}`,
      attemptId: credentialAttemptId,
      valid: true,
      reviewerType: 'admin',
      reviewerModel: 'admin_override',
      reviewedAt: earnedAt,
      rationale: rationale || 'Admin override',
      adminEmail: adminEmail()
    },
    validationStatus: 'valid',
    adminAttribution: { email: adminEmail(), at: earnedAt, action: source || 'admin_override' },
    transcriptLine: source === 'ai_exam_revalidated'
      ? `${tierMeta.label} - ${certMeta.label} ${depthMeta.label}. Independent validation confirmed learner evidence and examiner process (post-hoc revalidation by ${adminEmail()}).`
      : `${tierMeta.label} - ${certMeta.label} ${depthMeta.label}. Recorded by admin override (${adminEmail()}): ${rationale || ''}`
  };
}

async function applyAdminCredential(learner, credential, attemptUpdates) {
  const data = learner.data || {};
  const ladder = data.ladderProgress || {};
  const existingCerts = data.ladderCertifications || ladder.ladderCertifications || [];
  const filtered = existingCerts.filter((c) => c.id !== credential.id);
  const ladderCertifications = [credential, ...filtered];

  const attempts = (ladder.evaluationAttempts || []).map((a) => attemptUpdates && a.attemptId === attemptUpdates.attemptId ? { ...a, ...attemptUpdates.patch } : a);

  const transcriptEvent = {
    eventType: credential.source === 'ai_exam_revalidated' ? 'certification_awarded' : 'certification_admin_override',
    status: credential.source === 'ai_exam_revalidated' ? 'verified' : 'self_reported',
    title: credential.title,
    detail: credential.transcriptLine,
    tierTitle: credential.ladderTierLabel,
    timestamp: credential.earnedAt,
    evidence: credential.evidence,
    adminEmail: adminEmail()
  };
  const transcriptEvents = [transcriptEvent, ...(ladder.transcriptEvents || [])];

  const patch = {
    ladderCertifications,
    studentTranscript: {
      updatedAt: credential.earnedAt,
      ladderCertifications,
      standardsReviews: ladder.standardsReviews || [],
      certificationValidations: ladder.certificationValidations || []
    },
    ladderProgress: {
      ladderCertifications,
      evaluationAttempts: attempts,
      transcriptEvents
    }
  };
  await writeLearner(learner.id, patch);
}

async function applyAttemptStatusChange(learner, attemptId, patch, transcriptEvent) {
  const ladder = learner.data?.ladderProgress || {};
  const attempts = (ladder.evaluationAttempts || []).map((a) => a.attemptId === attemptId ? { ...a, ...patch } : a);
  const transcriptEvents = transcriptEvent ? [transcriptEvent, ...(ladder.transcriptEvents || [])] : (ladder.transcriptEvents || []);
  await writeLearner(learner.id, {
    ladderProgress: { evaluationAttempts: attempts, transcriptEvents }
  });
}

function openAwardForAttempt(learner, attempt) {
  openModal(`<h2>Award credential for this attempt</h2>
    <p class="modal-sub">Records an admin_override credential against attempt ${esc(attempt.attemptId)}. The original status will be flipped to certified.</p>
    ${attemptSummary(attempt)}
    <label for="awardForAttemptRationale">Rationale (required)</label>
    <textarea id="awardForAttemptRationale" placeholder="Why is this attempt being awarded despite missing the normal validation flow?"></textarea>
    <label for="awardForAttemptScore">Score override (optional)</label>
    <input id="awardForAttemptScore" type="number" min="0" max="100" placeholder="0-100">
    <div id="awardForAttemptResult"></div>
    <div class="modal-actions">
      <button class="secondary" type="button" data-modal="close">Cancel</button>
      <button type="button" id="awardForAttemptSubmit">Award</button>
    </div>`);
  document.getElementById('awardForAttemptSubmit').addEventListener('click', async () => {
    const rationale = document.getElementById('awardForAttemptRationale').value.trim();
    const score = document.getElementById('awardForAttemptScore').value;
    if (!rationale) {
      document.getElementById('awardForAttemptResult').innerHTML = '<div class="modal-banner bad">Rationale is required.</div>';
      return;
    }
    document.getElementById('awardForAttemptSubmit').disabled = true;
    document.getElementById('awardForAttemptResult').innerHTML = '<div class="modal-banner warn">Writing...</div>';
    try {
      const credential = buildAdminCredential({
        learnerId: learner.id,
        ladderTierId: attempt.ladderTierId,
        certTierId: attempt.certificationTierId,
        depthId: attempt.testDepthId,
        rationale,
        score,
        attemptId: attempt.attemptId,
        source: 'admin_override'
      });
      await applyAdminCredential(learner, credential, {
        attemptId: attempt.attemptId,
        patch: { status: 'certified', completedAt: new Date().toISOString(), adminOverrideEmail: adminEmail(), adminOverrideRationale: rationale }
      });
      document.getElementById('awardForAttemptResult').innerHTML = '<div class="modal-banner good">Credential recorded. Closing...</div>';
      setTimeout(async () => { closeModal(); await loadLearners(); }, 800);
    } catch (error) {
      document.getElementById('awardForAttemptResult').innerHTML = `<div class="modal-banner bad">${esc(error.message || 'Write failed')}</div>`;
      document.getElementById('awardForAttemptSubmit').disabled = false;
    }
  });
}

function bindAwardForm() {
  const form = document.getElementById('awardForm');
  if (!form) return;
  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const learnerId = document.getElementById('awardLearner').value.trim();
    const ladderTierId = document.getElementById('awardLadderTier').value;
    const certTierId = document.getElementById('awardCertTier').value;
    const depthId = document.getElementById('awardDepth').value;
    const score = document.getElementById('awardScore').value;
    const rationale = document.getElementById('awardRationale').value.trim();
    const result = document.getElementById('awardResult');
    if (!rationale) {
      result.innerHTML = '<div class="modal-banner bad">Rationale is required.</div>';
      return;
    }
    const learner = findLearnerById(learnerId);
    if (!learner) {
      result.innerHTML = `<div class="modal-banner bad">No learner record found for "${esc(learnerId)}". Confirm the ID and try again.</div>`;
      return;
    }
    result.innerHTML = '<div class="modal-banner warn">Writing...</div>';
    try {
      const credential = buildAdminCredential({ learnerId: learner.id, ladderTierId, certTierId, depthId, rationale, score, source: 'admin_override' });
      await applyAdminCredential(learner, credential, null);
      result.innerHTML = `<div class="modal-banner good">Credential recorded for ${esc(learner.id)} - ${esc(credential.title)}.</div>`;
      await loadLearners();
    } catch (error) {
      result.innerHTML = `<div class="modal-banner bad">${esc(error.message || 'Write failed')}</div>`;
    }
  });
}

// -- C: Re-validate from transcript ----------------------------------------

function buildValidatorSystemPrompt() {
  return `You are the independent Ladder certification validator for AESOP AI Academy. You are not the examiner. You are a second model reviewing whether a certification conversation is valid before any credential is recorded. Validate BOTH sides: learner gave enough relevant evidence; examiner asked fair, scoped, evidence-seeking questions and did not invent evidence. Reject if too short, leading, off-topic, missing evidence, or unsupported. Return only this hidden marker on one line: <!--LADDER_CERTIFICATION_VALIDATION:{"valid":true,"learner_valid":true,"examiner_valid":true,"confidence":0.0,"rationale":"one concise reason","learner_evidence":"one concise evidence summary","examiner_review":"one concise process review","concerns":[]}-->. Set valid true only if both sides are true. Do not include markdown, prose, or any text outside the marker.`;
}

function buildValidatorUserMessage(context, syntheticResult, messages) {
  const transcript = messages.map((m, i) => `${i + 1}. ${String(m.role).toUpperCase()}: ${m.content}`).join('\n\n');
  return `Validate this Ladder certification conversation.\n\nCertification context:\n${JSON.stringify(context, null, 2)}\n\nProposed examiner result:\n${JSON.stringify(syntheticResult, null, 2)}\n\nConversation transcript:\n${transcript}`;
}

async function runValidatorCall(context, syntheticResult, messages) {
  const response = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: CERTIFICATION_VALIDATOR_MODEL,
      messages: [{ role: 'user', content: buildValidatorUserMessage(context, syntheticResult, messages) }],
      system_prompt: buildValidatorSystemPrompt(),
      max_tokens: 700
    })
  });
  const data = await response.json();
  const raw = data?.content?.[0]?.text || '';
  const match = raw.match(CERTIFICATION_VALIDATION_REGEX);
  if (!response.ok || !match) {
    return { valid: false, learner_valid: false, examiner_valid: false, rationale: data?.error || 'Validator did not return a marker.', concerns: ['Validator unreachable or marker missing'] };
  }
  try {
    return JSON.parse(match[1]);
  } catch (error) {
    return { valid: false, learner_valid: false, examiner_valid: false, rationale: 'Validator returned unparseable JSON.', concerns: [String(error?.message || 'parse error')] };
  }
}

function parseExaminerDetermination(messages) {
  const lastAssistant = [...messages].reverse().find((m) => m.role === 'assistant');
  if (!lastAssistant) return null;
  const text = lastAssistant.content || '';
  const markerMatch = text.match(CERTIFICATION_RESULT_REGEX);
  if (markerMatch) {
    try { return JSON.parse(markerMatch[1]); } catch (_) {}
  }
  // Look for rubric block
  const rubricIdx = text.indexOf('Rubric Evaluation');
  if (rubricIdx === -1) return null;
  const tail = text.slice(rubricIdx);
  const passCount = (tail.match(/:\s*PASS\b/gi) || []).length;
  const failCount = (tail.match(/:\s*FAIL\b/gi) || []).length;
  const looksCertified = passCount >= 5 && failCount <= 2;
  return {
    result: looksCertified ? 'certified' : 'not_certified',
    score: looksCertified ? Math.min(95, 70 + passCount * 3) : Math.max(40, 70 - failCount * 8),
    rationale: `Auto-parsed from examiner's last message: ${passCount} PASS, ${failCount} FAIL across rubric dimensions.`,
    evidenceSummary: 'Parsed from rubric block in examiner transcript.'
  };
}

function openRevalidateForAttempt(learner, attempt) {
  const conversation = findStoredConversation(learner, attempt.attemptId);
  if (!conversation || !Array.isArray(conversation.messages) || !conversation.messages.length) {
    openModal(`<h2>Re-validate not possible</h2>
      <p class="modal-sub">No stored transcript on this learner record for attempt ${esc(attempt.attemptId)}. Re-validation requires the conversation transcript to have been persisted.</p>
      <div class="modal-actions"><button type="button" data-modal="close">OK</button></div>`);
    return;
  }
  const parsed = parseExaminerDetermination(conversation.messages) || { result: 'certified', score: 80, rationale: '', evidenceSummary: '' };
  const transcriptText = conversation.messages.map((m) => `${String(m.role).toUpperCase()}: ${m.content}`).join('\n\n');
  openModal(`<h2>Re-validate from stored transcript</h2>
    <p class="modal-sub">Calls the independent second-model validator (${esc(CERTIFICATION_VALIDATOR_MODEL)}) against the saved conversation. On a clean pass this records a real ai_exam_revalidated credential.</p>
    ${attemptSummary(attempt)}
    <label>Stored transcript (${conversation.messages.length} messages, last updated ${esc(fmtDate(conversation.updatedAt))})</label>
    <pre class="transcript">${esc(transcriptText)}</pre>
    <label for="revalResult">Proposed result</label>
    <select id="revalResult">
      <option value="certified" ${parsed.result === 'certified' ? 'selected' : ''}>certified</option>
      <option value="not_certified" ${parsed.result !== 'certified' ? 'selected' : ''}>not_certified</option>
    </select>
    <label for="revalScore">Score</label>
    <input id="revalScore" type="number" min="0" max="100" value="${esc(parsed.score)}">
    <label for="revalRationale">Rationale (sent to validator)</label>
    <textarea id="revalRationale">${esc(parsed.rationale || '')}</textarea>
    <label for="revalEvidence">Evidence summary (sent to validator)</label>
    <textarea id="revalEvidence">${esc(parsed.evidenceSummary || '')}</textarea>
    <div id="revalOutcome"></div>
    <div class="modal-actions">
      <button class="secondary" type="button" data-modal="close">Cancel</button>
      <button type="button" id="revalRun">Run independent validator</button>
    </div>`);
  document.getElementById('revalRun').addEventListener('click', async () => {
    const outcome = document.getElementById('revalOutcome');
    const btn = document.getElementById('revalRun');
    btn.disabled = true;
    outcome.innerHTML = '<div class="modal-banner warn">Calling validator...</div>';
    const syntheticResult = {
      result: document.getElementById('revalResult').value,
      score: Number(document.getElementById('revalScore').value) || 0,
      rationale: document.getElementById('revalRationale').value.trim(),
      evidenceSummary: document.getElementById('revalEvidence').value.trim()
    };
    const context = {
      attemptId: attempt.attemptId,
      blueprintId: attempt.blueprintId,
      blueprintVersion: attempt.blueprintVersion,
      ladderTierId: attempt.ladderTierId,
      ladderTierLabel: attempt.ladderTierLabel,
      certificationTierId: attempt.certificationTierId,
      certificationTierLabel: attempt.certificationTierLabel,
      testDepthId: attempt.testDepthId,
      testDepthLabel: attempt.testDepthLabel,
      standards: attempt.standards
    };
    const validation = await runValidatorCall(context, syntheticResult, conversation.messages);
    const valid = validation.valid === true && validation.learner_valid === true && validation.examiner_valid === true;
    const isCert = syntheticResult.result === 'certified';
    const banner = valid && isCert ? 'good' : (valid && !isCert ? 'warn' : 'bad');
    const concernsHtml = Array.isArray(validation.concerns) && validation.concerns.length
      ? `<ul>${validation.concerns.map((c) => `<li>${esc(typeof c === 'string' ? c : JSON.stringify(c))}</li>`).join('')}</ul>` : '';
    outcome.innerHTML = `<div class="modal-banner ${banner}">
      <strong>${valid ? 'Validation passed' : 'Validation failed'}</strong>
      <div>${esc(validation.rationale || '')}</div>
      ${concernsHtml}
    </div>
    <pre class="json">${esc(JSON.stringify(validation, null, 2))}</pre>
    <div class="modal-actions">
      ${valid && isCert ? '<button type="button" id="revalRecord">Record ai_exam_revalidated credential</button>' : ''}
      ${valid && !isCert ? '<button type="button" id="revalRecordNotAwarded">Record not-certified outcome</button>' : ''}
      ${!valid ? '<button type="button" id="revalForceOverride">Force-award as admin override anyway</button>' : ''}
      <button class="secondary" type="button" data-modal="close">Close</button>
    </div>`;
    btn.disabled = false;
    document.getElementById('revalRecord')?.addEventListener('click', async () => {
      const credential = buildAdminCredential({
        learnerId: learner.id,
        ladderTierId: attempt.ladderTierId,
        certTierId: attempt.certificationTierId,
        depthId: attempt.testDepthId,
        rationale: syntheticResult.rationale || 'Re-validated by admin against stored transcript.',
        score: syntheticResult.score,
        attemptId: attempt.attemptId,
        source: 'ai_exam_revalidated',
        validation: {
          ...validation,
          id: `validation:${attempt.attemptId}`,
          attemptId: attempt.attemptId,
          reviewerType: 'second_model',
          reviewerModel: CERTIFICATION_VALIDATOR_MODEL,
          reviewedAt: new Date().toISOString(),
          revalidated: true,
          revalidatedBy: adminEmail()
        }
      });
      await applyAdminCredential(learner, credential, { attemptId: attempt.attemptId, patch: { status: 'certified', validationStatus: 'valid', completedAt: new Date().toISOString() } });
      closeModal(); await loadLearners();
    });
    document.getElementById('revalRecordNotAwarded')?.addEventListener('click', async () => {
      await applyAttemptStatusChange(learner, attempt.attemptId, { status: 'not_certified', validationStatus: 'valid', completedAt: new Date().toISOString(), rationale: syntheticResult.rationale }, {
        eventType: 'certification_not_awarded',
        status: 'self_reported',
        title: `${attempt.certificationTierLabel} ${attempt.testDepthLabel}`,
        detail: `Re-validated by admin. ${syntheticResult.rationale || ''}`,
        timestamp: new Date().toISOString(),
        evidence: 'ai_exam_validated',
        adminEmail: adminEmail()
      });
      closeModal(); await loadLearners();
    });
    document.getElementById('revalForceOverride')?.addEventListener('click', () => {
      closeModal();
      openAwardForAttempt(learner, attempt);
    });
  });
}

// -- D: Cancel stale attempt ----------------------------------------------

function openCancelForAttempt(learner, attempt) {
  openModal(`<h2>Cancel this attempt</h2>
    <p class="modal-sub">Flips the attempt's status to cancelled with an admin note. The original record is preserved.</p>
    ${attemptSummary(attempt)}
    <label for="cancelReason">Reason (visible in transcript)</label>
    <textarea id="cancelReason" placeholder="Why is this attempt being cancelled?"></textarea>
    <div id="cancelResult"></div>
    <div class="modal-actions">
      <button class="secondary" type="button" data-modal="close">Keep</button>
      <button class="bad" type="button" id="cancelConfirm">Cancel attempt</button>
    </div>`);
  document.getElementById('cancelConfirm').addEventListener('click', async () => {
    const reason = document.getElementById('cancelReason').value.trim() || 'No reason provided.';
    document.getElementById('cancelConfirm').disabled = true;
    document.getElementById('cancelResult').innerHTML = '<div class="modal-banner warn">Writing...</div>';
    try {
      await applyAttemptStatusChange(learner, attempt.attemptId, {
        status: 'cancelled',
        adminCancelledBy: adminEmail(),
        adminCancelledAt: new Date().toISOString(),
        adminCancelReason: reason
      }, {
        eventType: 'certification_cancelled',
        status: 'self_reported',
        title: `${attempt.certificationTierLabel} ${attempt.testDepthLabel}`,
        detail: `Cancelled by ${adminEmail()}: ${reason}`,
        timestamp: new Date().toISOString(),
        evidence: 'admin_cancel',
        adminEmail: adminEmail()
      });
      document.getElementById('cancelResult').innerHTML = '<div class="modal-banner good">Cancelled. Closing...</div>';
      setTimeout(async () => { closeModal(); await loadLearners(); }, 600);
    } catch (error) {
      document.getElementById('cancelResult').innerHTML = `<div class="modal-banner bad">${esc(error.message || 'Write failed')}</div>`;
      document.getElementById('cancelConfirm').disabled = false;
    }
  });
}

function bindCertificationRowActions() {
  el.tableWrap.querySelectorAll('button[data-action]').forEach((button) => {
    button.addEventListener('click', () => {
      const action = button.dataset.action;
      const learnerId = button.dataset.learner;
      const attemptId = button.dataset.attempt;
      const learner = findLearnerById(learnerId);
      if (!learner) return;
      const attempt = findAttempt(learner, attemptId);
      if (!attempt) return;
      if (action === 'award') openAwardForAttempt(learner, attempt);
      if (action === 'revalidate') openRevalidateForAttempt(learner, attempt);
      if (action === 'cancel') openCancelForAttempt(learner, attempt);
    });
  });
}

async function loadLearners() {
  el.refreshBtn.disabled = true;
  el.tableWrap.innerHTML = '<div class="loading">Loading learner records...</div>';
  try {
    const snap = await getDocs(collection(db, 'learners'));
    learners = snap.docs.map((docSnap) => ({
      id: String(docSnap.data().learnerId || docSnap.id).toUpperCase(),
      data: docSnap.data()
    }));
    rebuildRows();
    render();
  } catch (error) {
    console.warn('Could not load learner admin records:', error);
    el.tableWrap.innerHTML = `<div class="error">Could not load learner records. This page needs an authenticated admin account and Firestore rules that allow admin collection reads on learners.</div>`;
  } finally {
    el.refreshBtn.disabled = false;
  }
}

function exportCurrentView() {
  const items = currentRows();
  const payload = {
    _format: 'aesop-ladder-admin-view-v1',
    view: activeView,
    exportedAt: new Date().toISOString(),
    count: items.length,
    rows: items
  };
  const url = URL.createObjectURL(new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }));
  const anchor = document.createElement('a');
  anchor.href = url;
  anchor.download = `aesop-ladder-admin-${activeView}.json`;
  anchor.click();
  URL.revokeObjectURL(url);
}

async function doSignIn() {
  el.authError.textContent = '';
  const email = el.authEmail.value.trim();
  const password = el.authPass.value;
  if (!email || !password) {
    el.authError.textContent = 'Email and password required.';
    return;
  }
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (error) {
    el.authError.textContent = 'Sign in failed. Check the admin email and password.';
  }
}

onAuthStateChanged(auth, (user) => {
  const allowed = user && ADMIN_EMAILS.includes(user.email);
  if (allowed) {
    el.authOverlay.style.display = 'none';
    el.app.hidden = false;
    el.userLabel.textContent = user.email;
    loadLearners();
    return;
  }
  el.app.hidden = true;
  el.authOverlay.style.display = 'flex';
  if (user && !allowed) {
    el.authError.textContent = 'This account is not listed as an AESOP admin.';
    signOut(auth);
  }
});

el.authBtn.addEventListener('click', doSignIn);
el.authPass.addEventListener('keydown', (event) => { if (event.key === 'Enter') doSignIn(); });
el.authEmail.addEventListener('keydown', (event) => { if (event.key === 'Enter') doSignIn(); });
el.signOutBtn.addEventListener('click', () => signOut(auth));
el.refreshBtn.addEventListener('click', loadLearners);
el.searchInput.addEventListener('input', render);
el.statusFilter.addEventListener('change', render);
el.exportBtn.addEventListener('click', exportCurrentView);
document.querySelectorAll('.tab').forEach((button) => {
  button.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach((tab) => tab.classList.remove('active'));
    button.classList.add('active');
    activeView = button.dataset.view;
    render();
  });
});
document.getElementById('modalOverlay').addEventListener('click', (event) => {
  if (event.target.id === 'modalOverlay') closeModal();
  if (event.target.dataset?.modal === 'close') closeModal();
});
document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('open')) closeModal();
});
</script>
