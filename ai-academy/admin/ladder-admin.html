<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ladder Admin - AESOP AI Academy</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon_16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon_32.png">
<style>
:root {
  --bg: #0f172a;
  --panel: #162032;
  --panel-2: #1e293b;
  --line: #334155;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --gold: #c9a05a;
  --good: #22c55e;
  --warn: #f59e0b;
  --bad: #ef4444;
  --blue: #38bdf8;
}
* { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font: 14px/1.5 system-ui, -apple-system, Segoe UI, sans-serif; margin: 0; min-height: 100vh; }
button, input, select { font: inherit; }
button { background: var(--gold); border: 0; border-radius: 7px; color: #111827; cursor: pointer; font-weight: 800; min-height: 38px; padding: 0.55rem 0.8rem; }
button.secondary { background: transparent; border: 1px solid var(--line); color: var(--text); }
button:disabled { cursor: not-allowed; opacity: 0.55; }
input, select { background: #0b1220; border: 1px solid var(--line); border-radius: 7px; color: var(--text); min-height: 38px; padding: 0.55rem 0.7rem; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
.auth-overlay { align-items: center; background: rgba(15, 23, 42, 0.97); display: none; inset: 0; justify-content: center; padding: 1rem; position: fixed; z-index: 20; }
.auth-box { background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; max-width: 380px; padding: 1.5rem; width: 100%; }
.auth-box h1 { font-size: 1.3rem; margin: 0 0 0.35rem; }
.auth-box p, .muted { color: var(--muted); }
.auth-box input { margin-top: 0.55rem; width: 100%; }
.auth-box button { margin-top: 0.75rem; width: 100%; }
.auth-error { color: var(--bad); min-height: 1.2rem; padding-top: 0.5rem; }
header { align-items: center; background: #0b1220; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: 1rem; justify-content: space-between; padding: 1rem 1.25rem; }
.brand strong { color: var(--gold); display: block; font-size: 0.76rem; letter-spacing: 0.14em; text-transform: uppercase; }
.brand h1 { font-size: clamp(1.45rem, 4vw, 2rem); margin: 0.15rem 0 0; }
.top-actions { align-items: center; display: flex; flex-wrap: wrap; gap: 0.6rem; }
.user-label { color: var(--muted); font-size: 0.84rem; }
.toolbar { align-items: center; background: #0b1220; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: 0.65rem; padding: 0.85rem 1.25rem; }
.toolbar input { min-width: min(320px, 100%); }
.toolbar select { min-width: 180px; }
.tabs { display: flex; flex-wrap: wrap; gap: 0.45rem; padding: 1rem 1.25rem 0; }
.tab { background: transparent; border: 1px solid var(--line); color: var(--muted); }
.tab.active { background: var(--gold); border-color: var(--gold); color: #111827; }
main { padding: 1rem 1.25rem 2.5rem; }
.stats { display: grid; gap: 0.8rem; grid-template-columns: repeat(5, minmax(0, 1fr)); margin-bottom: 1rem; }
.stat, .section { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; }
.stat { padding: 0.9rem; }
.stat strong { color: var(--gold); display: block; font-size: 1.8rem; line-height: 1; }
.stat span { color: var(--muted); display: block; font-size: 0.72rem; font-weight: 900; letter-spacing: 0.08em; margin-top: 0.4rem; text-transform: uppercase; }
.section { overflow: hidden; }
.section-head { align-items: center; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: space-between; padding: 0.9rem 1rem; }
.section-head h2 { font-size: 1rem; margin: 0; }
.table-wrap { overflow: auto; }
table { border-collapse: collapse; min-width: 1080px; width: 100%; }
th, td { border-bottom: 1px solid var(--line); padding: 0.72rem 0.75rem; text-align: left; vertical-align: top; }
th { background: rgba(255,255,255,0.04); color: var(--muted); font-size: 0.72rem; letter-spacing: 0.08em; position: sticky; text-transform: uppercase; top: 0; }
td small { color: var(--muted); display: block; margin-top: 0.18rem; }
.pill { border: 1px solid var(--line); border-radius: 999px; display: inline-flex; font-size: 0.74rem; font-weight: 800; padding: 0.16rem 0.48rem; white-space: nowrap; }
.pill.good { background: rgba(34, 197, 94, 0.12); border-color: rgba(34, 197, 94, 0.4); color: var(--good); }
.pill.warn { background: rgba(245, 158, 11, 0.12); border-color: rgba(245, 158, 11, 0.4); color: var(--warn); }
.pill.bad { background: rgba(239, 68, 68, 0.12); border-color: rgba(239, 68, 68, 0.4); color: var(--bad); }
.pill.info { background: rgba(56, 189, 248, 0.12); border-color: rgba(56, 189, 248, 0.4); color: var(--blue); }
.empty, .loading, .error { color: var(--muted); padding: 2rem; text-align: center; }
.error { color: #fecaca; }
.details { max-width: 360px; white-space: normal; }
.nowrap { white-space: nowrap; }
@media (max-width: 900px) {
  .stats { grid-template-columns: 1fr 1fr; }
  .toolbar input, .toolbar select { flex: 1 1 100%; }
}
</style>
</head>
<body>
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h1>AESOP Admin Access</h1>
    <p>Sign in to view Ladder assessments, course completions, and certification attempts.</p>
    <input id="authEmail" type="email" placeholder="Admin email" autocomplete="email">
    <input id="authPass" type="password" placeholder="Password" autocomplete="current-password">
    <button id="authBtn" type="button">Sign in</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<div id="app" hidden>
  <header>
    <div class="brand">
      <strong>AESOP Admin</strong>
      <h1>Ladder Activity</h1>
    </div>
    <div class="top-actions">
      <span class="user-label" id="userLabel"></span>
      <a href="/theladder/" class="button">Open Ladder</a>
      <button id="refreshBtn" type="button">Refresh</button>
      <button id="signOutBtn" class="secondary" type="button">Sign out</button>
    </div>
  </header>

  <div class="toolbar">
    <input id="searchInput" type="search" placeholder="Search learner ID, course, tier, status..." autocomplete="off">
    <select id="statusFilter" aria-label="Status filter">
      <option value="all">All statuses</option>
      <option value="completed">Completed / certified</option>
      <option value="started">Started</option>
      <option value="failed">Failed / not certified</option>
      <option value="validation_failed">Validation failed</option>
    </select>
    <button id="exportBtn" class="secondary" type="button">Download current view</button>
  </div>

  <div class="tabs" role="tablist" aria-label="Ladder admin views">
    <button class="tab active" type="button" data-view="assessments">Assessments</button>
    <button class="tab" type="button" data-view="courses">Completed courses</button>
    <button class="tab" type="button" data-view="certifications">Certification attempts</button>
    <button class="tab" type="button" data-view="cert-stats">Certification stats</button>
  </div>

  <main>
    <section class="stats" aria-label="Summary">
      <div class="stat"><strong id="statLearners">0</strong><span>Learners</span></div>
      <div class="stat"><strong id="statAssessments">0</strong><span>Assessments</span></div>
      <div class="stat"><strong id="statCourses">0</strong><span>Completed Courses</span></div>
      <div class="stat"><strong id="statAttempts">0</strong><span>Cert Attempts</span></div>
      <div class="stat"><strong id="statCredentials">0</strong><span>Credentials</span></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 id="viewTitle">Assessments</h2>
        <span class="muted" id="viewMeta">Loading...</span>
      </div>
      <div class="table-wrap" id="tableWrap">
        <div class="loading">Loading learner records...</div>
      </div>
    </section>
  </main>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { FIREBASE_CONFIG } from '/ai-academy/js/firebase-config.js';

const ADMIN_EMAILS = ['scott@aesopacademy.org'];
const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);

let learners = [];
let rows = { assessments: [], courses: [], certifications: [] };
let activeView = 'assessments';

const el = {
  authOverlay: document.getElementById('authOverlay'),
  app: document.getElementById('app'),
  authEmail: document.getElementById('authEmail'),
  authPass: document.getElementById('authPass'),
  authBtn: document.getElementById('authBtn'),
  authError: document.getElementById('authError'),
  userLabel: document.getElementById('userLabel'),
  refreshBtn: document.getElementById('refreshBtn'),
  signOutBtn: document.getElementById('signOutBtn'),
  searchInput: document.getElementById('searchInput'),
  statusFilter: document.getElementById('statusFilter'),
  exportBtn: document.getElementById('exportBtn'),
  tableWrap: document.getElementById('tableWrap'),
  viewTitle: document.getElementById('viewTitle'),
  viewMeta: document.getElementById('viewMeta')
};

const esc = (value) => String(value ?? '')
  .replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;')
  .replace(/'/g, '&#039;');

function fmtDate(value) {
  if (!value) return 'Not recorded';
  const date = value?.toDate ? value.toDate() : new Date(value);
  if (Number.isNaN(date.getTime())) return 'Not recorded';
  return date.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
}

function statusPill(status) {
  const normalized = String(status || 'unknown').toLowerCase();
  const kind = ['completed', 'certified', 'valid', 'passed'].some((item) => normalized.includes(item))
    ? 'good'
    : ['failed', 'invalid', 'not_certified', 'validation_failed'].some((item) => normalized.includes(item))
      ? 'bad'
      : ['started', 'pending'].some((item) => normalized.includes(item))
        ? 'warn'
        : 'info';
  return `<span class="pill ${kind}">${esc(status || 'unknown')}</span>`;
}

function courseTitle(id, record) {
  return record?.title || record?.courseTitle || String(id || '').replace(/-/g, ' ');
}

function isCompletedCourse(record) {
  const status = String(record?.status || '').toLowerCase();
  return ['complete', 'completed', 'certified', 'passed', 'finished'].some((word) => status.includes(word))
    || Boolean(record?.completedAt || record?.certifiedOn || record?.certificateEarnedAt)
    || Number(record?.progressPercent || record?.percentComplete || 0) >= 100;
}

function latestTime(values) {
  const times = values
    .map((value) => value ? new Date(value?.toDate ? value.toDate() : value).getTime() : 0)
    .filter((time) => !Number.isNaN(time) && time > 0);
  if (!times.length) return '';
  return new Date(Math.max(...times)).toISOString();
}

function assessmentRowsFor(learner) {
  const data = learner.data;
  const ladder = data.ladderProgress || {};
  const placement = ladder.placement || data.profile?.ladderPlacement || null;
  const messages = Array.isArray(ladder.assessmentMessages) ? ladder.assessmentMessages : [];
  const events = Array.isArray(ladder.transcriptEvents) ? ladder.transcriptEvents : [];
  const assessmentEvents = events.filter((event) => String(event.eventType || '').includes('placement_assessment'));
  const userResponses = messages.filter((message) => message.role === 'user').length;
  const hasAssessment = Boolean(placement) || messages.length > 0 || assessmentEvents.length > 0;
  if (!hasAssessment) return [];
  const status = placement ? 'completed' : 'started';
  const grantedTierIds = placement?.grantedTierIds || placement?.placedOutTierIds || [];
  const assignedTopicIds = placement?.assignedTopicIds || [];
  return [{
    learnerId: learner.id,
    status,
    responses: userResponses,
    placedOut: grantedTierIds.length,
    assigned: assignedTopicIds.length,
    capability: placement?.capabilityScore ?? '',
    technical: placement?.technicalScore ?? '',
    governance: placement?.governanceScore ?? '',
    interests: Array.isArray(placement?.interestTags) ? placement.interestTags.join(', ') : '',
    updatedAt: placement?.profileAppliedAt || placement?.certifiedAt || latestTime(assessmentEvents.map((event) => event.createdAt || event.at)),
    profileAppliedAt: placement?.profileAppliedAt || '',
    transcriptUrl: `/student-transcript-live.html?id=${encodeURIComponent(learner.id)}`
  }];
}

function courseRowsFor(learner) {
  const progress = learner.data.courseProgress || {};
  return Object.entries(progress)
    .filter(([, record]) => isCompletedCourse(record || {}))
    .map(([courseId, record]) => ({
      learnerId: learner.id,
      courseId,
      title: courseTitle(courseId, record),
      status: record?.status || 'completed',
      completedAt: record?.completedAt || record?.certifiedOn || record?.certificateEarnedAt || record?.updatedAt || '',
      modulesCompleted: record?.modulesCompleted ?? '',
      score: record?.testScore ?? record?.score ?? record?.finalScore ?? '',
      evidence: record?.certificateId || record?.evidence || record?.path || '',
      transcriptUrl: `/student-transcript-live.html?id=${encodeURIComponent(learner.id)}`
    }));
}

function certificationRowsFor(learner) {
  const data = learner.data;
  const ladder = data.ladderProgress || {};
  const attempts = Array.isArray(ladder.evaluationAttempts) ? ladder.evaluationAttempts : [];
  const credentials = data.ladderCertifications || data.studentTranscript?.ladderCertifications || ladder.ladderCertifications || [];
  const credentialByAttempt = new Map(credentials.map((cert) => [String(cert.id || '').split(':').pop(), cert]));
  return attempts.map((attempt) => {
    const credential = credentialByAttempt.get(attempt.attemptId) || null;
    const validation = attempt.validation || credential?.validation || null;
    return {
      learnerId: learner.id,
      attemptId: attempt.attemptId || '',
      status: attempt.status || 'started',
      proposedStatus: attempt.proposedStatus || '',
      validationStatus: attempt.validationStatus || (validation?.valid === true ? 'valid' : validation?.valid === false ? 'invalid' : ''),
      tier: attempt.ladderTierLabel || attempt.ladderTierId || '',
      educationTier: attempt.certificationTierLabel || '',
      depth: attempt.testDepthLabel || attempt.depthLabel || attempt.testDepthId || '',
      startedAt: attempt.startedAt || attempt.createdAt || '',
      completedAt: attempt.completedAt || '',
      score: attempt.score ?? '',
      validator: validation?.reviewerModel || '',
      rationale: validation?.rationale || attempt.rationale || '',
      credentialed: Boolean(credential),
      transcriptUrl: `/student-transcript-live.html?id=${encodeURIComponent(learner.id)}`
    };
  });
}

function rebuildRows() {
  rows = learners.reduce((acc, learner) => {
    acc.assessments.push(...assessmentRowsFor(learner));
    acc.courses.push(...courseRowsFor(learner));
    acc.certifications.push(...certificationRowsFor(learner));
    return acc;
  }, { assessments: [], courses: [], certifications: [] });
  rows.assessments.sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)));
  rows.courses.sort((a, b) => String(b.completedAt).localeCompare(String(a.completedAt)));
  rows.certifications.sort((a, b) => String(b.startedAt || b.completedAt).localeCompare(String(a.startedAt || a.completedAt)));
}

function currentRows() {
  const query = el.searchInput.value.trim().toLowerCase();
  const status = el.statusFilter.value;
  return (rows[activeView] || []).filter((row) => {
    const haystack = JSON.stringify(row).toLowerCase();
    if (query && !haystack.includes(query)) return false;
    if (status === 'all') return true;
    const rowStatus = String(row.status || '').toLowerCase();
    if (status === 'completed') return ['completed', 'certified', 'valid', 'passed'].some((word) => rowStatus.includes(word));
    if (status === 'failed') return ['failed', 'not_certified', 'invalid'].some((word) => rowStatus.includes(word));
    return rowStatus.includes(status);
  });
}

function setStats() {
  document.getElementById('statLearners').textContent = learners.length;
  document.getElementById('statAssessments').textContent = rows.assessments.length;
  document.getElementById('statCourses').textContent = rows.courses.length;
  document.getElementById('statAttempts').textContent = rows.certifications.length;
  const credentialCount = learners.reduce((count, learner) => {
    const data = learner.data;
    const certs = data.ladderCertifications || data.studentTranscript?.ladderCertifications || data.ladderProgress?.ladderCertifications || [];
    return count + certs.filter((cert) => cert.source !== 'assessment').length;
  }, 0);
  document.getElementById('statCredentials').textContent = credentialCount;
}

function assessmentTable(items) {
  return `<table><thead><tr><th>Learner</th><th>Status</th><th>Responses</th><th>Placed out</th><th>Assigned</th><th>Scores</th><th>Interests</th><th>Updated</th></tr></thead><tbody>
    ${items.map((row) => `<tr>
      <td><a href="${esc(row.transcriptUrl)}">${esc(row.learnerId)}</a></td>
      <td>${statusPill(row.status)}</td>
      <td>${esc(row.responses)}</td>
      <td>${esc(row.placedOut)}</td>
      <td>${esc(row.assigned)}</td>
      <td class="nowrap">Cap ${esc(row.capability || '-')}; Tech ${esc(row.technical || '-')}; Gov ${esc(row.governance || '-')}</td>
      <td class="details">${esc(row.interests || '-')}</td>
      <td>${esc(fmtDate(row.updatedAt))}</td>
    </tr>`).join('')}
  </tbody></table>`;
}

function courseTable(items) {
  return `<table><thead><tr><th>Learner</th><th>Course</th><th>Status</th><th>Completed</th><th>Modules</th><th>Score</th><th>Evidence</th></tr></thead><tbody>
    ${items.map((row) => `<tr>
      <td><a href="${esc(row.transcriptUrl)}">${esc(row.learnerId)}</a></td>
      <td><strong>${esc(row.title)}</strong><small>${esc(row.courseId)}</small></td>
      <td>${statusPill(row.status)}</td>
      <td>${esc(fmtDate(row.completedAt))}</td>
      <td>${esc(row.modulesCompleted || '-')}</td>
      <td>${esc(row.score || '-')}</td>
      <td class="details">${esc(row.evidence || '-')}</td>
    </tr>`).join('')}
  </tbody></table>`;
}

function certificationTable(items) {
  return `<table><thead><tr><th>Learner</th><th>Status</th><th>Target</th><th>Depth</th><th>Started</th><th>Completed</th><th>Score</th><th>Validation</th><th>Rationale</th></tr></thead><tbody>
    ${items.map((row) => `<tr>
      <td><a href="${esc(row.transcriptUrl)}">${esc(row.learnerId)}</a><small>${esc(row.attemptId)}</small></td>
      <td>${statusPill(row.status)}${row.credentialed ? '<small>Credential recorded</small>' : ''}</td>
      <td><strong>${esc(row.tier || '-')}</strong><small>${esc(row.educationTier || '-')}</small></td>
      <td>${esc(row.depth || '-')}</td>
      <td>${esc(fmtDate(row.startedAt))}</td>
      <td>${esc(fmtDate(row.completedAt))}</td>
      <td>${esc(row.score || '-')}</td>
      <td>${row.validationStatus ? statusPill(row.validationStatus) : '-'}<small>${esc(row.validator || '')}</small></td>
      <td class="details">${esc(row.rationale || '-')}</td>
    </tr>`).join('')}
  </tbody></table>`;
}

function computeCertificationStats() {
  const attempts = rows.certifications || [];
  const stats = {
    total: attempts.length,
    certified: attempts.filter((a) => ['completed', 'certified', 'valid'].some((word) => String(a.status || '').toLowerCase().includes(word))).length,
    notCertified: attempts.filter((a) => ['failed', 'not_certified', 'invalid'].some((word) => String(a.status || '').toLowerCase().includes(word))).length,
    started: attempts.filter((a) => ['started'].some((word) => String(a.status || '').toLowerCase().includes(word))).length,
    byTier: {},
    byDepth: {},
    scores: {
      all: attempts.filter((a) => a.score && !isNaN(a.score)).map((a) => Number(a.score)),
      certified: attempts.filter((a) => a.score && !isNaN(a.score) && ['completed', 'certified', 'valid'].some((word) => String(a.status || '').toLowerCase().includes(word))).map((a) => Number(a.score)),
      notCertified: attempts.filter((a) => a.score && !isNaN(a.score) && ['failed', 'not_certified', 'invalid'].some((word) => String(a.status || '').toLowerCase().includes(word))).map((a) => Number(a.score))
    }
  };

  attempts.forEach((attempt) => {
    const tier = attempt.tier || 'unknown';
    if (!stats.byTier[tier]) stats.byTier[tier] = { total: 0, certified: 0, avg: 0, scores: [] };
    stats.byTier[tier].total++;
    if (['completed', 'certified', 'valid'].some((word) => String(attempt.status || '').toLowerCase().includes(word))) {
      stats.byTier[tier].certified++;
    }
    if (attempt.score && !isNaN(attempt.score)) {
      stats.byTier[tier].scores.push(Number(attempt.score));
    }
  });
  Object.keys(stats.byTier).forEach((tier) => {
    const scores = stats.byTier[tier].scores || [];
    stats.byTier[tier].avg = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '-';
  });

  attempts.forEach((attempt) => {
    const depth = attempt.depth || 'unknown';
    if (!stats.byDepth[depth]) stats.byDepth[depth] = { total: 0, certified: 0, avg: 0, scores: [] };
    stats.byDepth[depth].total++;
    if (['completed', 'certified', 'valid'].some((word) => String(attempt.status || '').toLowerCase().includes(word))) {
      stats.byDepth[depth].certified++;
    }
    if (attempt.score && !isNaN(attempt.score)) {
      stats.byDepth[depth].scores.push(Number(attempt.score));
    }
  });
  Object.keys(stats.byDepth).forEach((depth) => {
    const scores = stats.byDepth[depth].scores || [];
    stats.byDepth[depth].avg = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '-';
  });

  return stats;
}

function certificationStatsTable() {
  const stats = computeCertificationStats();
  const certRate = stats.total ? ((stats.certified / stats.total) * 100).toFixed(1) : 0;
  const avgScoreAll = stats.scores.all.length ? (stats.scores.all.reduce((a, b) => a + b, 0) / stats.scores.all.length).toFixed(1) : '-';
  const avgScoreCert = stats.scores.certified.length ? (stats.scores.certified.reduce((a, b) => a + b, 0) / stats.scores.certified.length).toFixed(1) : '-';
  const avgScoreFail = stats.scores.notCertified.length ? (stats.scores.notCertified.reduce((a, b) => a + b, 0) / stats.scores.notCertified.length).toFixed(1) : '-';

  const tierRows = Object.entries(stats.byTier).sort(([a], [b]) => a.localeCompare(b));
  const depthRows = Object.entries(stats.byDepth).sort(([a], [b]) => a.localeCompare(b));

  return `<div style="display: grid; gap: 2rem;">
    <section class="section">
      <div class="section-head"><h2>Overall Pass Rate</h2></div>
      <div style="padding: 1.5rem 1rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; text-align: center;">
        <div><div style="font-size: 2.2rem; font-weight: 800; color: var(--gold);">${esc(certRate)}%</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">Pass rate</div></div>
        <div><div style="font-size: 2.2rem; font-weight: 800; color: var(--good);">${esc(stats.certified)}</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">Certified</div></div>
        <div><div style="font-size: 2.2rem; font-weight: 800; color: var(--bad);">${esc(stats.notCertified)}</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">Not certified</div></div>
        <div><div style="font-size: 2.2rem; font-weight: 800; color: var(--warn);">${esc(stats.started)}</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">In progress</div></div>
      </div>
    </section>

    <section class="section">
      <div class="section-head"><h2>By Education Tier</h2></div>
      <div class="table-wrap"><table><thead><tr><th>Tier</th><th>Attempts</th><th>Certified</th><th>Pass Rate</th><th>Avg Score</th></tr></thead><tbody>
        ${tierRows.map(([tier, data]) => { const rate = data.total ? ((data.certified / data.total) * 100).toFixed(1) : 0; return `<tr><td><strong>${esc(tier)}</strong></td><td>${esc(data.total)}</td><td><span class="pill good">${esc(data.certified)}</span></td><td>${esc(rate)}%</td><td>${esc(data.avg)}</td></tr>`; }).join('')}
      </tbody></table></div>
    </section>

    <section class="section">
      <div class="section-head"><h2>By Certification Depth</h2></div>
      <div class="table-wrap"><table><thead><tr><th>Depth</th><th>Attempts</th><th>Certified</th><th>Pass Rate</th><th>Avg Score</th></tr></thead><tbody>
        ${depthRows.map(([depth, data]) => { const rate = data.total ? ((data.certified / data.total) * 100).toFixed(1) : 0; return `<tr><td><strong>${esc(depth)}</strong></td><td>${esc(data.total)}</td><td><span class="pill good">${esc(data.certified)}</span></td><td>${esc(rate)}%</td><td>${esc(data.avg)}</td></tr>`; }).join('')}
      </tbody></table></div>
    </section>

    <section class="section">
      <div class="section-head"><h2>Average Scores</h2></div>
      <div style="padding: 1.5rem 1rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; text-align: center;">
        <div><div style="font-size: 1.8rem; font-weight: 800; color: var(--blue);">${esc(avgScoreAll)}</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">All attempts</div></div>
        <div><div style="font-size: 1.8rem; font-weight: 800; color: var(--good);">${esc(avgScoreCert)}</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">Certified</div></div>
        <div><div style="font-size: 1.8rem; font-weight: 800; color: var(--bad);">${esc(avgScoreFail)}</div><div style="color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem;">Not certified</div></div>
      </div>
    </section>
  </div>`;
}

function render() {
  setStats();
  const titles = {
    assessments: 'Assessment Activity',
    courses: 'Completed Course Records',
    certifications: 'Certification Attempts',
    'cert-stats': 'Certification Statistics'
  };
  el.viewTitle.textContent = titles[activeView];

  if (activeView === 'cert-stats') {
    el.viewMeta.textContent = '';
    el.tableWrap.innerHTML = certificationStatsTable();
    return;
  }

  const items = currentRows();
  el.viewMeta.textContent = `${items.length} visible of ${(rows[activeView] || []).length} total`;
  if (!items.length) {
    el.tableWrap.innerHTML = '<div class="empty">No records match this view.</div>';
    return;
  }
  el.tableWrap.innerHTML = activeView === 'assessments'
    ? assessmentTable(items)
    : activeView === 'courses'
      ? courseTable(items)
      : certificationTable(items);
}

async function loadLearners() {
  el.refreshBtn.disabled = true;
  el.tableWrap.innerHTML = '<div class="loading">Loading learner records...</div>';
  try {
    const snap = await getDocs(collection(db, 'learners'));
    learners = snap.docs.map((docSnap) => ({
      id: String(docSnap.data().learnerId || docSnap.id).toUpperCase(),
      data: docSnap.data()
    }));
    rebuildRows();
    render();
  } catch (error) {
    console.warn('Could not load learner admin records:', error);
    el.tableWrap.innerHTML = `<div class="error">Could not load learner records. This page needs an authenticated admin account and Firestore rules that allow admin collection reads on learners.</div>`;
  } finally {
    el.refreshBtn.disabled = false;
  }
}

function exportCurrentView() {
  const items = currentRows();
  const payload = {
    _format: 'aesop-ladder-admin-view-v1',
    view: activeView,
    exportedAt: new Date().toISOString(),
    count: items.length,
    rows: items
  };
  const url = URL.createObjectURL(new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }));
  const anchor = document.createElement('a');
  anchor.href = url;
  anchor.download = `aesop-ladder-admin-${activeView}.json`;
  anchor.click();
  URL.revokeObjectURL(url);
}

async function doSignIn() {
  el.authError.textContent = '';
  const email = el.authEmail.value.trim();
  const password = el.authPass.value;
  if (!email || !password) {
    el.authError.textContent = 'Email and password required.';
    return;
  }
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (error) {
    el.authError.textContent = 'Sign in failed. Check the admin email and password.';
  }
}

onAuthStateChanged(auth, (user) => {
  const allowed = user && ADMIN_EMAILS.includes(user.email);
  if (allowed) {
    el.authOverlay.style.display = 'none';
    el.app.hidden = false;
    el.userLabel.textContent = user.email;
    loadLearners();
    return;
  }
  el.app.hidden = true;
  el.authOverlay.style.display = 'flex';
  if (user && !allowed) {
    el.authError.textContent = 'This account is not listed as an AESOP admin.';
    signOut(auth);
  }
});

el.authBtn.addEventListener('click', doSignIn);
el.authPass.addEventListener('keydown', (event) => { if (event.key === 'Enter') doSignIn(); });
el.authEmail.addEventListener('keydown', (event) => { if (event.key === 'Enter') doSignIn(); });
el.signOutBtn.addEventListener('click', () => signOut(auth));
el.refreshBtn.addEventListener('click', loadLearners);
el.searchInput.addEventListener('input', render);
el.statusFilter.addEventListener('change', render);
el.exportBtn.addEventListener('click', exportCurrentView);
document.querySelectorAll('.tab').forEach((button) => {
  button.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach((tab) => tab.classList.remove('active'));
    button.classList.add('active');
    activeView = button.dataset.view;
    render();
  });
});
</script>
</body>
</html>
