<script>
// ─────────────────────────────────────────────────────────────
// EXAM CONFIGURATION
// ─────────────────────────────────────────────────────────────
const EXAM_CONFIG = {
  courseId: 'ai-ethics-decision-making-v2',
  courseTitle: 'AI Ethics & Decision Making',
  backUrl: '/ai-academy/modules/v2/ai-ethics-decision-making/m8.html',
  passPct: 70,
  timeLimitSeconds: 3600,
  retakeDays: 3,
};

// ─────────────────────────────────────────────────────────────
// EXAM DATA — 30 questions across 8 modules + synthesis
// ─────────────────────────────────────────────────────────────
const EXAM_DATA = [
  // ── MODULE 1: Ethical Decision-Making Frameworks ──
  {
    q: "An AI hiring tool trained on historical promotion data systematically underscores candidates from non-traditional educational backgrounds. According to the Three Doors framework, this is primarily which type of failure?",
    choices: [
      "Deployment bias — the tool was used in a context it wasn't designed for",
      "Data bias — the training data encoded historical patterns that disadvantaged certain candidates",
      "Optimization bias — the model was told to optimize for the wrong outcome",
      "Algorithmic bias — the model architecture itself introduced the disparity"
    ],
    correct: 1,
    standard: "AI4K12 Big Idea 4",
    explanation: "The failure originates at the data door: training on historical promotions bakes in whatever biases existed in past decisions. Deployment bias would apply if the tool were used outside its intended scope; optimization bias would apply if the objective function itself was flawed. 'Algorithmic bias' is not a category in the Three Doors framework and conflates the source of bias with its mechanism."
  },
  {
    q: "A city uses a predictive policing algorithm optimized to minimize reported crime. Over time, officers are directed only to neighborhoods that historically filed more reports, causing crime in other areas to go undetected and unrecorded. Which door of AI failure does this best illustrate?",
    choices: [
      "Data bias — the training dataset underrepresented certain neighborhoods",
      "Deployment bias — the system is being used in a setting its designers never intended",
      "Optimization bias — the objective (minimize reported crime) diverges from the true goal (reduce actual crime)",
      "Feedback bias — the model continuously retrains on its own outputs"
    ],
    correct: 2,
    standard: "AI4K12 Big Idea 5",
    explanation: "The system is doing exactly what it was told — minimizing reported crime — but the objective itself is misaligned with public safety. This is the optimization door: the goal specified to the model is not the goal the community actually wants. Data bias is a contributing factor but not the primary failure; deployment bias would apply if the tool were used for a completely different purpose than intended."
  },
  {
    q: "When embedding values into an AI system through its design choices, which of the following is the most accurate description of how values enter code?",
    choices: [
      "Values only enter AI systems through explicit ethical constraints added by compliance teams after development",
      "Values are encoded through every design decision — what data to collect, what to optimize for, and who gets to define success",
      "Values in AI are primarily determined by the end users who interact with the system, not by developers",
      "Values enter AI systems mainly through the choice of programming language and software architecture"
    ],
    correct: 1,
    standard: "CSTA 3B-IC-27",
    explanation: "Every design decision — what data to collect, which metric to optimize, who is included in testing — encodes values, whether intentionally or not. Limiting values to explicit compliance constraints misses the vast majority of value-laden choices made during development. End users shape how a system is used but rarely control how it was built or what it optimizes."
  },
  {
    q: "A developer argues that their image-recognition model is 'objective' because it uses no human judgment — only mathematical operations on pixel data. Which ethical framework concept most directly challenges this claim?",
    choices: [
      "The precautionary principle — untested AI should be assumed harmful until proven otherwise",
      "Consequentialism — the outputs of the model, not its process, determine its ethical status",
      "Values in code — the choices of training data, labels, and objective function all reflect human judgments",
      "Deontological neutrality — mathematical processes are inherently bound by universal rules"
    ],
    correct: 2,
    standard: "UNESCO AI Competency · Ethics",
    explanation: "The 'objectivity' claim ignores that every step of model building — selecting training images, choosing who labels them and how, defining what counts as a correct classification — involves human value judgments. Consequentialism is relevant to evaluating outcomes but doesn't directly challenge the objectivity claim. 'Deontological neutrality' is not a real ethical framework concept."
  },

  // ── MODULE 2: Bias Detection ──
  {
    q: "A resume-screening AI performs equally well by aggregate accuracy across demographic groups, but produces significantly higher false-rejection rates for qualified candidates from one ethnic group. Which bias type does this most directly reflect?",
    choices: [
      "Data bias — the training set contained fewer resumes from that ethnic group",
      "Deployment bias — the tool is being used in a hiring context outside its design scope",
      "Optimization bias — the accuracy metric obscures differential error rates across groups",
      "Sampling bias — the audit dataset was not drawn randomly from the applicant pool"
    ],
    correct: 2,
    standard: "NIST AI RMF · Measure",
    explanation: "When a model optimizes for aggregate accuracy, it can achieve high overall performance while systematically failing a subgroup — because the subgroup is small enough that its errors barely move the aggregate number. This is optimization bias: the metric chosen to measure success masks the true harm. Data bias may also be present, but the described failure mechanism — the metric hiding differential error rates — is optimization bias."
  },
  {
    q: "During a bias audit, an evaluator finds that a loan-approval model was trained exclusively on applications from urban zip codes but is now deployed statewide, including rural areas. This is best classified as which type of bias?",
    choices: [
      "Data bias — the training data does not represent the population the model now serves",
      "Optimization bias — the model's objective function penalizes rural applicants",
      "Confirmation bias — auditors are looking for rural disparities and finding them",
      "Label bias — the loan-approval labels in the training set were incorrectly assigned"
    ],
    correct: 0,
    standard: "AI4K12 Big Idea 4",
    explanation: "The mismatch between training population (urban) and deployment population (statewide) is a textbook case of data bias — the training set is not representative of the people the model will actually affect. Optimization bias would require a flawed objective function, which is not described here. Confirmation bias is a human cognitive pattern, not a model failure type in this framework."
  },
  {
    q: "A bias audit reveals that an AI content-moderation tool flags posts in African American Vernacular English (AAVE) at three times the rate of Standard American English posts with equivalent sentiment. The model was trained on posts already flagged by human moderators. What makes this particularly difficult to detect through standard accuracy testing?",
    choices: [
      "The model performs poorly overall, so standard accuracy metrics reveal the problem immediately",
      "AAVE posts are rare in the dataset, so errors on them contribute minimally to aggregate accuracy scores",
      "Human auditors introduce confirmation bias when reviewing AAVE content, inflating accuracy scores",
      "Standard accuracy tests do not measure sentiment, so they cannot detect language-based disparities"
    ],
    correct: 1,
    standard: "CSTA 3B-IC-28",
    explanation: "When a subgroup is underrepresented in the test set, its error rate has little impact on the aggregate accuracy score, allowing systematic disparities to remain invisible. The original human moderators likely brought their own biases into the training labels — this compounds the problem but isn't the reason standard testing fails to detect it. Aggregate accuracy is inherently blind to subgroup performance when subgroups are small."
  },

  // ── MODULE 3: AI Transparency ──
  {
    q: "A hospital deploys an AI diagnostic tool. A physician asks what information was used to train the model and what its known failure modes are. Which transparency artifact is specifically designed to answer these questions?",
    choices: [
      "An audit log — a record of every prediction the model has made since deployment",
      "A model card — a standardized document describing the model's training data, intended uses, and known limitations",
      "An accountability chain — a document mapping which individuals approved the deployment",
      "A terms-of-service agreement — a legal document outlining how the model's outputs may be used"
    ],
    correct: 1,
    standard: "EU AI Act · Art. 13",
    explanation: "A model card is the standard artifact for communicating training data provenance, intended use cases, out-of-scope uses, and known limitations — exactly what the physician needs. An audit log records runtime decisions, not model characteristics. An accountability chain documents human responsibility, not model properties. Terms of service are legal instruments, not technical transparency tools."
  },
  {
    q: "Under EU AI Act Article 13, high-risk AI systems must provide transparency to users. Which of the following best describes what 'transparency' requires in this context?",
    choices: [
      "The AI must explain every internal mathematical operation in plain language to any user who asks",
      "Operators must disclose that an AI is being used and provide sufficient information for users to understand its capabilities and limitations",
      "The source code of the AI system must be made publicly available so independent researchers can audit it",
      "All training data used to build the AI must be released to regulators upon request"
    ],
    correct: 1,
    standard: "EU AI Act · Art. 13",
    explanation: "Article 13 requires that high-risk AI systems be transparent enough for users to understand what the system is, what it does, and its limitations — not that every internal operation be explainable in plain language. Full source-code disclosure and training-data release may be required in some contexts but are not what Art. 13 transparency specifically mandates."
  },
  {
    q: "An audit log for an AI decision system is most valuable when it records which of the following?",
    choices: [
      "The emotional reactions of users who received unfavorable decisions",
      "The input data, model version, output, confidence score, and timestamp for each decision",
      "Only the final decisions that were appealed or overturned by human reviewers",
      "The aggregate accuracy metrics of the model computed at monthly intervals"
    ],
    correct: 1,
    standard: "NIST AI RMF · Govern",

// ─────────────────────────────────────────────────────────────
// ENGINE — do not modify below
// ─────────────────────────────────────────────────────────────
const STORAGE_KEY = `aesop_exam_${EXAM_CONFIG.courseId}`;
let currentQ = 0;
let answers = new Array(EXAM_DATA.length).fill(-1);
let timerInterval = null;
let secondsLeft = EXAM_CONFIG.timeLimitSeconds;
let examStarted = false;
let examSubmitted = false;

function init() {
  document.getElementById('topbarBack').href = EXAM_CONFIG.backUrl;
  document.getElementById('topbarCourse').textContent = EXAM_CONFIG.courseTitle;
  document.getElementById('topbarProgress').textContent = '';
  document.getElementById('startTitle').textContent = EXAM_CONFIG.courseTitle + ' — Final Exam';
  document.getElementById('startEyebrow').textContent = 'Module 8 Complete · Final Exam';

  const saved = getSaved();
  if (saved && saved.lockedUntil && Date.now() < saved.lockedUntil) {
    const days = Math.ceil((saved.lockedUntil - Date.now()) / 86400000);
    const hrs  = Math.ceil((saved.lockedUntil - Date.now()) / 3600000);
    document.getElementById('retakeNotice').style.display = 'block';
    document.getElementById('retakeNotice').textContent =
      `You did not pass. Retakes are available in ${hrs < 24 ? hrs + ' hour(s)' : days + ' day(s)'}.`;
    document.getElementById('btnStart').disabled = true;
  }
}

function getSaved() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}
function setSaved(obj) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
}

function startExam() {
  examStarted = true;
  answers = new Array(EXAM_DATA.length).fill(-1);
  currentQ = 0;
  secondsLeft = EXAM_CONFIG.timeLimitSeconds;
  show('screenExam');
  renderQ();
  startTimer();
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) { clearInterval(timerInterval); submitExam(); }
  }, 1000);
}

function updateTimerDisplay() {
  const h = Math.floor(secondsLeft / 3600);
  const m = Math.floor((secondsLeft % 3600) / 60);
  const s = secondsLeft % 60;
  const str = `${h}:${pad(m)}:${pad(s)}`;
  const el = document.getElementById('timer');
  el.textContent = str;
  el.className = 'topbar-timer' + (secondsLeft < 300 ? ' warning' : '');
}

function pad(n) { return String(n).padStart(2, '0'); }

function renderQ() {
  const q = EXAM_DATA[currentQ];
  const answered = answers[currentQ] !== -1;
  const pct = Math.round(((currentQ + 1) / EXAM_DATA.length) * 100);

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('topbarProgress').textContent = `${currentQ + 1} / ${EXAM_DATA.length}`;
  document.getElementById('qCounter').textContent = `Question ${currentQ + 1} of ${EXAM_DATA.length}`;
  document.getElementById('btnPrev').disabled = currentQ === 0;

  const isLast = currentQ === EXAM_DATA.length - 1;
  const allAnswered = answers.every(a => a !== -1);
  const btn = document.getElementById('btnNext');
  if (isLast) {
    btn.textContent = allAnswered ? 'Submit Exam →' : 'Next →';
    btn.onclick = allAnswered ? submitExam : nextQ;
  } else {
    btn.textContent = 'Next →';
    btn.onclick = nextQ;
  }

  const letters = ['A', 'B', 'C', 'D'];
  document.getElementById('questionWrap').innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-num">Question ${currentQ + 1}</span>
        <span class="q-standard">${q.standard}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="choices">
        ${q.choices.map((c, i) => `
          <button class="choice${answers[currentQ] === i ? ' selected' : ''}"
            onclick="selectAnswer(${i})"
            ${examSubmitted ? 'disabled' : ''}>
            <span class="choice-letter">${letters[i]}</span>
            <span class="choice-text">${c}</span>
          </button>
        `).join('')}
      </div>
      <div class="q-explanation" id="qExpl"></div>
    </div>
  `;
}

function selectAnswer(idx) {
  if (examSubmitted) return;
  answers[currentQ] = idx;
  renderQ();
  // auto-advance if not last question
  if (currentQ < EXAM_DATA.length - 1) {
    setTimeout(() => { currentQ++; renderQ(); }, 300);
  }
}

function nextQ() {
  if (currentQ < EXAM_DATA.length - 1) { currentQ++; renderQ(); }
}
function prevQ() {
  if (currentQ > 0) { currentQ--; renderQ(); }
}

function submitExam() {
  clearInterval(timerInterval);
  examSubmitted = true;

  const correct = answers.filter((a, i) => a === EXAM_DATA[i].correct).length;
  const total   = EXAM_DATA.length;
  const pct     = Math.round((correct / total) * 100);
  const passed  = pct >= EXAM_CONFIG.passPct;

  // Save result + lock if failed
  const result = { passed, pct, correct, total, date: Date.now() };
  if (!passed) {
    result.lockedUntil = Date.now() + (EXAM_CONFIG.retakeDays * 86400000);
  }
  setSaved(result);

  // Score ring
  const ring = document.getElementById('scoreRing');
  ring.className = 'score-ring ' + (passed ? 'pass' : 'fail');
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('resultsVerdict').textContent = passed ? 'Exam Passed' : 'Exam Not Passed';
  document.getElementById('resultsSub').textContent = passed
    ? `You scored ${pct}% — above the ${EXAM_CONFIG.passPct}% threshold. This result has been recorded.`
    : `You scored ${pct}% — below the ${EXAM_CONFIG.passPct}% threshold. Review the wrong answers below, then retake when the timer clears.`;

  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = total - correct;
  document.getElementById('statPct').textContent = pct + '%';

  if (!passed) {
    const unlockDate = new Date(result.lockedUntil);
    document.getElementById('retakeInfo').textContent =
      `Retake available after ${unlockDate.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric'})} at ${unlockDate.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})}.`;
    document.getElementById('btnRetake').disabled = true;
  } else {
    document.getElementById('retakeInfo').textContent = '';
    document.getElementById('btnRetake').style.display = 'none';
  }

  // Build wrong-answer review
  const wrong = answers.map((a, i) => ({i, a, q: EXAM_DATA[i]})).filter(x => x.a !== x.q.correct);
  const letters = ['A','B','C','D'];
  document.getElementById('reviewWrap').innerHTML = wrong.length === 0
    ? '<p style="color:var(--teal);font-size:0.88rem;">Perfect score — no wrong answers to review.</p>'
    : wrong.map(({i, a, q}) => `
        <div class="review-item wrong-item">
          <div class="review-q">Q${i+1}. ${q.q}</div>
          <div class="review-answers">
            <span class="your">Your answer: ${letters[a]}. ${q.choices[a]}</span><br>
            <span class="correct">Correct: ${letters[q.correct]}. ${q.choices[q.correct]}</span>
          </div>
          <div class="review-explanation">${q.explanation}</div>
          <span class="review-standard">${q.standard}</span>
        </div>
      `).join('');

  show('screenResults');
}

function resetExam() {
  const saved = getSaved();
  if (saved && saved.lockedUntil && Date.now() < saved.lockedUntil) return;
  examSubmitted = false;
  startExam();
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

init();
</script>
</body>
</html>
