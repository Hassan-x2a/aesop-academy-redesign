<!DOCTYPE html>
<!-- v1.0.22 | 2026-04-29 -->
<!-- electives-hub-v1.1.0 | Registry-only: all course data from course-registry.json (no hardcoded courses) | April 2026 -->
<html lang="en">
<head>
<meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_32.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/favicon_512.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Electives — AESOP AI Academy</title>
<link rel="stylesheet" href="/academy-theme.css">
<link rel="stylesheet" href="/academy-dark-mode.css">
<link rel="stylesheet" href="/ai-academy/modules/elective-module.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@300;400;600;700;800;900&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script>(function(){var p=localStorage.getItem('aesop-theme');if(p==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;font-size:clamp(15px,1.1vw+0.4rem,20px);}

:root{
  --navy:#0a1220;--navy-mid:#0d1a2e;--gold:#c9a05a;--gold-light:#e8c88a;
  --teal:#2ba898;--purple:#9a5fb0;--red:#c0384f;--orange:#d97706;
  --green:#2d8a5e;--amber:#d4a017;
  --cream:#f5f0e8;--white:#ffffff;--ink:#1a1a2e;
  --ink-mid:#3a3a50;--ink-light:#6a6a7e;--ink-muted:#9a9aae;
  --border:#e2d9cc;--border-light:#ede8df;
  --current-accent:var(--teal);
  --sidebar-w:320px;
}

[data-theme="dark"]{
  --cream:#0d1520;--white:#111c28;--ink:#e8e3db;--ink-mid:#c0bbb3;
  --ink-light:#8a857e;--ink-muted:#5a5550;--border:#1e2e3e;--border-light:#17242f;
}

body{font-family:'Nunito Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* ── STARFIELD ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:var(--gold);animation:twinkle var(--dur) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:0.02}to{opacity:var(--max-op)}}

/* ── HEADER ── */

/* ── HUB TOPBAR ─────────────────────────────────────── */
.hub-topbar{display:flex;align-items:center;gap:1rem;padding:0 2rem;height:48px;background:rgba(6,14,24,0.97);border-bottom:1px solid #1a2738;position:sticky;top:0;z-index:200;flex-shrink:0;}
.hub-topbar-sep{width:1px;height:14px;background:#1a2738;flex-shrink:0;}
.hub-topbar-course{font-family:'Cinzel',serif;font-size:0.9rem;font-weight:700;color:var(--gold);letter-spacing:0.04em;flex:1;}
.hub-topbar-actions{display:flex;align-items:center;gap:0.75rem;margin-left:auto;flex-shrink:0;}
.hub-reset-btn{background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.35);border-radius:4px;padding:0.28rem 0.75rem;font-size:0.7rem;font-weight:600;letter-spacing:0.06em;cursor:not-allowed;font-family:inherit;}
.hub-reset-soon{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(201,160,90,0.4);background:rgba(201,160,90,0.06);border:1px solid rgba(201,160,90,0.15);padding:0.18rem 0.5rem;border-radius:3px;}

/* ── LANGUAGE SWITCHER ── */
.lang-switcher{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;margin-top:0.5rem;}
.lang-flag{display:inline-flex;align-items:center;gap:0.3rem;padding:0.3rem 0.65rem;border:1px solid var(--border);border-radius:6px;font-size:0.75rem;color:var(--ink-light);cursor:pointer;transition:all 0.15s;background:transparent;font-family:inherit;}
.lang-flag:hover{border-color:var(--gold);color:var(--gold);}
.lang-flag.active{border-color:var(--gold);background:rgba(201,160,90,0.08);color:var(--gold);font-weight:600;}
.lang-flag .lf-icon{font-size:1rem;}
.lang-flag.disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;}
.cd-lang-row{display:flex;align-items:center;gap:0.75rem;margin-top:0.75rem;flex-wrap:wrap;}
.cd-lang-label{font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-muted);}
.cc-langs{font-size:0.7rem;letter-spacing:0.1em;opacity:0.7;}

.hdr-top{display:flex;align-items:center;justify-content:space-between;max-width:1600px;margin:0 auto 1.25rem;}
.hdr-back{font-size:0.72rem;font-weight:600;color:rgba(201,160,90,0.6);text-decoration:none;letter-spacing:0.08em;transition:color 0.2s;}
.hdr-back:hover{color:var(--gold);}
.hdr-actions{display:flex;align-items:center;gap:1rem;}
.hdr-forums{font-size:0.72rem;font-weight:700;color:rgba(201,160,90,0.6);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;}
.hdr-forums:hover{color:var(--gold);}






/* ── LAYOUT ── */
.main{display:grid;grid-template-columns:1fr;min-height:calc(100vh - 140px);position:relative;z-index:1;}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--navy);border-right:1px solid rgba(255,255,255,0.07);
  overflow-y:auto;position:sticky;top:0;height:calc(100vh - 140px);
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent;
}
.sb-section{padding:1rem 0;}
.sb-section+.sb-section{border-top:1px solid rgba(255,255,255,0.06);}
.sb-label{font-size:0.58rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(201,160,90,0.4);padding:0.5rem 1.1rem 0.25rem;}
.sb-course{
  display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1.1rem;
  cursor:pointer;transition:background 0.15s;position:relative;
}
.sb-course:hover{background:rgba(255,255,255,0.04);}
.sb-course.active{background:rgba(255,255,255,0.06);}
.sb-course.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--current-accent);}
.sb-course-icon{font-size:1.1rem;flex-shrink:0;width:28px;text-align:center;}
.sb-course-info{flex:1;min-width:0;}
.sb-course-name{font-size:0.82rem;font-weight:600;color:rgba(255,255,255,0.8);overflow:hidden;}
.sb-course-meta{font-size:0.65rem;color:rgba(255,255,255,0.3);margin-top:0.1rem;}
.sb-course-pts{font-size:0.62rem;font-weight:700;letter-spacing:0.08em;color:var(--current-accent);background:rgba(var(--accent-rgb,43,168,152),0.1);border:1px solid rgba(var(--accent-rgb,43,168,152),0.2);border-radius:3px;padding:0.1rem 0.4rem;flex-shrink:0;}
.sb-course.locked .sb-course-name{color:rgba(255,255,255,0.3);}
.sb-course.locked .sb-course-meta{color:rgba(255,255,255,0.15);}

/* Module sub-rows */
.sb-modules{display:none;padding-bottom:0.5rem;}
.sb-course.active .sb-modules{display:block;}
.sb-mod-row{
  display:flex;align-items:center;gap:0.5rem;padding:0.45rem 1.1rem 0.45rem 2.9rem;
  cursor:pointer;transition:background 0.12s;
}
.sb-mod-row:hover{background:rgba(255,255,255,0.03);}
.sb-mod-row.active{background:rgba(255,255,255,0.05);}
.sb-mod-dot{width:6px;height:6px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);flex-shrink:0;transition:background 0.2s;}
.sb-mod-row.done .sb-mod-dot{background:var(--green);border-color:var(--green);}
.sb-mod-row.active .sb-mod-dot{background:var(--current-accent);border-color:var(--current-accent);}
.sb-mod-title{font-size:0.75rem;color:rgba(255,255,255,0.45);flex:1;overflow:hidden;}
.sb-mod-row.active .sb-mod-title{color:rgba(255,255,255,0.75);}
.sb-mod-check{font-size:0.65rem;color:var(--green);}

/* Progress summary */
.sb-progress{padding:1rem 1.1rem;}
.sb-prog-label{display:flex;justify-content:space-between;font-size:0.65rem;color:rgba(255,255,255,0.35);margin-bottom:0.35rem;}
.sb-prog-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-bottom:0.75rem;}
.sb-prog-fill{height:100%;background:var(--current-accent);border-radius:2px;transition:width 0.4s ease;}

/* Points summary */
.sb-points{padding:0.75rem 1.1rem;background:rgba(201,160,90,0.05);border-top:1px solid rgba(201,160,90,0.08);}
.sb-pts-label{font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(201,160,90,0.5);margin-bottom:0.35rem;}
.sb-pts-val{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:var(--gold);}
.sb-pts-sub{font-size:0.65rem;color:rgba(201,160,90,0.4);}

/* Exam row in sidebar */
.sb-exam-row{
  display:flex;align-items:center;gap:0.6rem;padding:0.55rem 1.1rem 0.55rem 2.9rem;
  cursor:pointer;font-size:0.75rem;font-weight:700;color:rgba(255,255,255,0.4);
  transition:all 0.15s;
}
.sb-exam-row.unlocked{color:var(--current-accent);cursor:pointer;}
.sb-exam-row.passed{color:var(--green);}

/* ── CONTENT AREA ── */
.content{background:var(--cream);overflow-y:auto;height:calc(100vh - 48px);width:100%;}

/* Welcome screen */
.welcome{padding:3rem 3.5rem;max-width:800px;margin:0 auto;}
.welcome-eyebrow{font-size:0.62rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--current-accent);margin-bottom:0.75rem;}
.welcome-title{font-family:'Cinzel',serif;font-size:clamp(1.6rem,3vw,2.4rem);font-weight:700;color:var(--ink);line-height:1.15;margin-bottom:0.6rem;}
.welcome-sub{font-size:0.95rem;color:var(--ink-light);line-height:1.75;margin-bottom:2rem;max-width:580px;}

.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;margin-bottom:2.5rem;}
.course-card{
  background:var(--white);border:1px solid var(--border);border-radius:10px;
  padding:1.25rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;
}
.course-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-accent,var(--teal));}
.course-card:hover{border-color:var(--card-accent,var(--teal));box-shadow:0 4px 20px rgba(0,0,0,0.08);transform:translateY(-2px);}
.cc-icon{font-size:1.5rem;margin-bottom:0.65rem;}
.cc-name{font-size:0.88rem;font-weight:700;color:var(--ink);margin-bottom:0.3rem;font-family:'Nunito',sans-serif;}
.cc-desc{font-size:0.78rem;color:var(--ink-light);line-height:1.6;margin-bottom:0.85rem;}
.cc-footer{display:flex;align-items:center;justify-content:space-between;}
.cc-meta{font-size:0.68rem;color:var(--ink-muted);}
.cc-pts{font-size:0.65rem;font-weight:700;letter-spacing:0.08em;padding:0.2rem 0.55rem;border-radius:3px;background:rgba(0,0,0,0.04);border:1px solid var(--border);}

.points-summary{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem;display:flex;align-items:center;gap:2rem;margin-bottom:2rem;}
.ps-block{text-align:center;}
.ps-num{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:700;color:var(--gold);}
.ps-label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-muted);}
.ps-divider{width:1px;height:40px;background:var(--border);}

/* Course detail panel */
.course-detail{padding:2.5rem 3rem;max-width:860px;margin:0 auto;text-align:center;}
.cd-back{display:inline-flex;align-items:center;gap:0.35rem;font-size:0.72rem;font-weight:600;color:var(--ink-muted);cursor:pointer;margin-bottom:1.5rem;transition:color 0.15s;text-align:left;}
.cd-back:hover{color:var(--ink);}
.cd-header{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0.5rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.cd-icon{font-size:2rem;}
.cd-info{}
.cd-eyebrow{font-size:0.62rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--current-accent);margin-bottom:0.3rem;}
.cd-title{font-family:'Cinzel',serif;font-size:clamp(1.3rem,2.5vw,1.9rem);font-weight:700;color:var(--ink);line-height:1.15;margin-bottom:0.4rem;}
.cd-desc{font-size:0.88rem;color:var(--ink-light);line-height:1.7;max-width:580px;}
.cd-pills{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.75rem;justify-content:center;}
.cd-pill{font-size:0.68rem;font-weight:700;padding:0.25rem 0.7rem;border-radius:20px;background:rgba(0,0,0,0.04);border:1px solid var(--border);color:var(--ink-mid);}
.cd-start-btn{display:inline-flex;align-items:center;gap:0.6rem;margin:1.5rem auto 0;padding:0.85rem 2.25rem;background:var(--current-accent);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:0.04em;transition:filter 0.15s,transform 0.12s;box-shadow:0 4px 18px rgba(0,0,0,0.18);}
.cd-start-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.cd-start-btn .cs-arrow{font-size:1.1rem;transition:transform 0.15s;}
.cd-start-btn:hover .cs-arrow{transform:translateX(4px);}
.cd-start-wrap{text-align:center;padding:0.25rem 0 1.75rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;}

.module-list{display:flex;flex-direction:column;gap:0.75rem;text-align:left;}
.mod-card{
  background:var(--white);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;cursor:pointer;transition:all 0.15s;
}
.mod-card:hover{border-color:var(--current-accent);box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.mod-card.done{border-color:rgba(45,138,94,0.3);}
.mod-card.active-mod{border-color:var(--current-accent);}
.mod-card-header{display:flex;align-items:center;gap:0.85rem;padding:0.9rem 1.1rem;}
.mod-num{font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);width:24px;flex-shrink:0;}
.mod-card.done .mod-num{color:var(--green);}
.mod-title{font-size:0.88rem;font-weight:700;color:var(--ink);flex:1;}
.mod-status{font-size:0.72rem;color:var(--ink-muted);}
.mod-card.done .mod-status{color:var(--green);}
.mod-expand{font-size:0.7rem;color:var(--ink-muted);transition:transform 0.2s;}
.mod-card.open .mod-expand{transform:rotate(180deg);}
.mod-lessons{display:none;border-top:1px solid var(--border);background:rgba(0,0,0,0.015);}
.mod-card.open .mod-lessons{display:block;}
.lesson-row{
  display:flex;align-items:center;gap:0.75rem;padding:0.6rem 1.1rem 0.6rem 2.5rem;
  border-bottom:1px solid var(--border-light);cursor:pointer;transition:background 0.12s;
}
.lesson-row:last-child{border-bottom:none;}
.lesson-row:hover{background:rgba(0,0,0,0.02);}
.lr-dot{width:6px;height:6px;border-radius:50%;border:1px solid var(--border);flex-shrink:0;}
.lesson-row.done .lr-dot{background:var(--green);border-color:var(--green);}
.lr-label{font-size:0.75rem;color:var(--ink-mid);flex:1;}
.lesson-row.done .lr-label{color:var(--ink-light);}
.lr-subs{display:flex;gap:0.3rem;}
.lr-sub{font-size:0.6rem;padding:0.1rem 0.35rem;border-radius:2px;background:var(--border-light);color:var(--ink-muted);font-weight:600;}
.lr-sub.done{background:rgba(45,138,94,0.1);color:var(--green);}

/* Module test row */
.mod-test-row{
  display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1.1rem 0.65rem 2.5rem;
  border-top:1px solid var(--border);cursor:pointer;transition:background 0.12s;
  background:rgba(0,0,0,0.02);
}
.mod-test-row:hover{background:rgba(0,0,0,0.04);}
.mod-test-row.locked{opacity:0.4;cursor:default;}
.mod-test-row.passed{background:rgba(45,138,94,0.05);}
.mtr-icon{font-size:0.8rem;}
.mtr-label{font-size:0.75rem;font-weight:700;color:var(--ink);flex:1;}
.mtr-status{font-size:0.65rem;color:var(--ink-muted);}
.mtr-status.pass{color:var(--green);}

/* Course test row */
.course-test-card{
  background:var(--white);border:2px solid var(--border);border-radius:8px;
  padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;
  cursor:pointer;transition:all 0.2s;margin-top:1.25rem;
}
.course-test-card:hover:not(.locked):not(.passed){border-color:var(--current-accent);background:rgba(0,0,0,0.01);}
.course-test-card.locked{opacity:0.4;cursor:not-allowed;}
.course-test-card.passed{border-color:var(--green);background:rgba(45,138,94,0.03);cursor:default;}
.ctc-icon{font-size:1.25rem;}
.ctc-info{flex:1;}
.ctc-title{font-size:0.88rem;font-weight:700;color:var(--ink);}
.ctc-sub{font-size:0.72rem;color:var(--ink-muted);margin-top:0.15rem;}
.ctc-pts{font-size:0.72rem;font-weight:700;color:var(--current-accent);}
/* Bypass / Skip-Ahead card */
.bypass-card{
  background:var(--white);border:2px dashed #c9a05a55;border-radius:8px;
  padding:0.85rem 1.25rem;display:flex;align-items:center;gap:1rem;
  cursor:pointer;transition:all 0.2s;margin-top:0.6rem;
}
.bypass-card:hover:not(.locked):not(.passed){border-color:#c9a05a;background:rgba(201,160,90,0.04);}
.bypass-card.locked{opacity:0.5;cursor:not-allowed;border-style:solid;}
.bypass-card.passed{border-color:var(--green);border-style:solid;background:rgba(45,138,94,0.03);cursor:default;}
.bypass-card .ctc-title{color:#8a6a2a;}
.bypass-card.passed .ctc-title,.bypass-card.locked .ctc-title{color:inherit;}
[data-theme="dark"] .bypass-card{background:#1a1a2e;border-color:#c9a05a44;}
[data-theme="dark"] .bypass-card:hover:not(.locked):not(.passed){background:rgba(201,160,90,0.08);}

/* Module content iframe area */
.module-frame-area{padding:0;display:flex;flex-direction:column;height:100%;}
.frame-topbar{
  display:flex;align-items:center;gap:0.75rem;padding:0.6rem 1rem;
  background:var(--navy);border-bottom:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;
}
.frame-back{font-size:0.7rem;font-weight:600;color:rgba(201,160,90,0.6);cursor:pointer;display:flex;align-items:center;gap:0.3rem;transition:color 0.15s;}
.frame-back:hover{color:var(--gold);}
.frame-title{font-size:0.8rem;font-weight:600;color:rgba(255,255,255,0.7);}
.frame-status{margin-left:auto;font-size:0.65rem;font-weight:700;color:rgba(255,255,255,0.3);}
.module-iframe{width:100%;flex:1;border:none;background:var(--cream);}

/* Course exam panel */
.exam-panel{padding:2rem 2.5rem;max-width:720px;}
.ep-back{display:inline-flex;align-items:center;gap:0.35rem;font-size:0.72rem;font-weight:600;color:var(--ink-muted);cursor:pointer;margin-bottom:1.5rem;transition:color 0.15s;}
.ep-back:hover{color:var(--ink);}
.ep-eyebrow{font-size:0.62rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--current-accent);margin-bottom:0.5rem;}
.ep-title{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:700;color:var(--ink);margin-bottom:0.4rem;}
.ep-sub{font-size:0.85rem;color:var(--ink-muted);line-height:1.6;margin-bottom:1.5rem;}
.exam-meta-pills{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.exam-pill{font-size:0.72rem;font-weight:600;padding:0.25rem 0.75rem;border-radius:20px;background:var(--border-light);border:1px solid var(--border);color:var(--ink-mid);}
.exam-integrity-box{background:rgba(0,0,0,0.02);border:1px solid var(--border);border-left:4px solid var(--ink-muted);border-radius:0 8px 8px 0;padding:0.9rem 1.1rem;margin-bottom:1.25rem;font-size:0.83rem;color:var(--ink);line-height:1.6;}
.exam-integrity-box strong{color:var(--ink);}
.exam-integrity-box ul{margin:0.4rem 0 0 1.2rem;}
.exam-integrity-box li{margin-bottom:0.2rem;}
.exam-start-btn{background:var(--current-accent);color:#fff;border:none;border-radius:8px;padding:0.75rem 2rem;font-size:0.92rem;font-weight:700;cursor:pointer;font-family:inherit;transition:filter 0.15s;}
.exam-start-btn:hover{filter:brightness(1.08);}

/* Exam questions */
.exam-q-area{display:none;}
.exam-q-area.active{display:block;}
.exam-prog-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:1.25rem;overflow:hidden;}

.q-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:1.4rem;margin-bottom:1rem;}

.q-mod-tag{font-size:0.68rem;color:var(--current-accent);margin-bottom:0.6rem;font-weight:600;}
.q-text{font-size:0.95rem;color:var(--ink);line-height:1.65;margin-bottom:1rem;font-weight:600;}
.q-opts{display:flex;flex-direction:column;gap:0.45rem;}

.q-opt:hover:not(.sel){border-color:var(--current-accent);background:var(--white);}
.q-opt.sel{border-color:var(--current-accent);background:rgba(0,0,0,0.02);}
.exam-nav{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem;flex-wrap:wrap;gap:0.6rem;}
.exam-btn{background:var(--current-accent);color:#fff;border:none;border-radius:7px;padding:0.6rem 1.3rem;font-size:0.88rem;font-weight:700;cursor:pointer;transition:filter 0.15s;font-family:inherit;}
.exam-btn:hover{filter:brightness(1.08);}
.exam-btn:disabled{background:var(--border);color:var(--ink-muted);cursor:default;filter:none;}
.exam-btn.sec{background:var(--border-light);color:var(--ink);border:1px solid var(--border);}
.exam-btn.sec:hover{background:var(--border);filter:none;}
.q-counter{font-size:0.82rem;color:var(--ink-muted);}

/* Results */
.results-panel{max-width:540px;}
.score-ring{width:120px;height:120px;border-radius:50%;border:6px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:1.5rem auto;}
.score-ring.pass{border-color:var(--green);}
.score-ring.fail{border-color:var(--red);}
.score-pct{font-size:2rem;font-weight:800;font-family:'Nunito Sans',sans-serif;}
.score-pct.pass{color:var(--green);}
.score-pct.fail{color:var(--red);}
.score-lbl{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);}
.result-verdict{font-size:1.25rem;font-weight:700;text-align:center;margin-bottom:0.3rem;}
.result-verdict.pass{color:var(--green);}
.result-verdict.fail{color:var(--red);}
.result-sub{text-align:center;color:var(--ink-muted);font-size:0.88rem;margin-bottom:1.25rem;}
.result-detail{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:0.9rem 1.1rem;}
.rd-row{display:flex;justify-content:space-between;font-size:0.84rem;padding:0.28rem 0;border-bottom:1px solid var(--border);}
.rd-row:last-child{border-bottom:none;font-weight:700;}

/* Points award */
.pts-award{background:linear-gradient(135deg,rgba(201,160,90,0.08),rgba(201,160,90,0.03));border:1px solid rgba(201,160,90,0.25);border-radius:12px;padding:1.25rem;text-align:center;margin-top:1.25rem;}
.pts-award-num{font-family:'Cinzel',serif;font-size:2.5rem;font-weight:700;color:var(--gold);}
.pts-award-label{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:rgba(201,160,90,0.6);margin-top:0.25rem;}
.pts-award-sub{font-size:0.8rem;color:var(--ink-muted);margin-top:0.4rem;}

/* ── REWARD PANE ── */
.reward-pane{

}

.rp-pts-label{font-size:0.62rem;color:rgba(201,160,90,0.5);text-transform:uppercase;letter-spacing:0.1em;}
.rp-course-prog{margin-bottom:1rem;}

.rp-cp-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:0.6rem;}
.rp-cp-fill{height:100%;border-radius:2px;transition:width 0.4s;}
.rp-badge{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:0.6rem 0.75rem;display:flex;align-items:center;gap:0.6rem;margin-bottom:0.5rem;}

<script>
// ═══════════════════════════════════════════════════════════
// STARFIELD
// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
// COURSES DATA — loaded entirely from course-registry.json
// courses.html is the single source of truth.
// Run: python .github/scripts/build_registry.py to regenerate.
// ═══════════════════════════════════════════════════════════
let COURSES = [];

let REGISTRY_LANGUAGES = []; // populated from registry._meta.languages
async function loadCourseRegistry() {
  try {
    const resp = await fetch('/ai-academy/modules/course-registry.json?v=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const registry = await resp.json();
    // Pull _meta block for languages (schemaVersion 2+)
    if (registry._meta && Array.isArray(registry._meta.languages)) {
      REGISTRY_LANGUAGES = registry._meta.languages;
      // Rebuild LANG_META from registry so the hub stays in sync with mod gen
      for (const l of REGISTRY_LANGUAGES) {
        LANG_META[l.code] = { flag: l.flag || '🌐', label: l.nativeName || l.name || l.code, urlPrefix: l.urlPrefix || '', dir: l.dir || 'ltr' };
      }
    }
    // Only load live courses; skip _meta and any key prefixed with _
    COURSES = Object.entries(registry)
      .filter(([k, c]) => !k.startsWith('_') && c && c.url && c.status === 'live')
      .map(([, c]) => c);
    console.log('Registry loaded:', COURSES.length, 'active courses from', Object.keys(registry).length, 'total');
  } catch(e) {
    console.error('Failed to load course registry:', e);
    COURSES = [];
  }
}
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const STATE = {
  view: 'welcome',    // 'welcome' | 'course' | 'module' | 'exam'
  courseId: null,
  moduleId: null,
  examCourseId: null,
  completedLessons: {},  // {courseId: {moduleId: Set of lessonIdx}}
  completedMods: {},     // {courseId: Set of moduleId}
  passedTests: {},       // {courseId: Set of moduleId}
  passedExams: {},       // Set of courseId
  earnedPoints: 0,
  // Firebase stub — replace with real auth/write when ready
  _firebaseStub: true
};

// ═══════════════════════════════════════════════════════════
// LANGUAGE SUPPORT
// ═══════════════════════════════════════════════════════════
// LANG_META is seeded from registry._meta.languages during loadCourseRegistry().
// Kept as a fallback in case registry load fails or for older cached builds.
const LANG_META = {
  en:{flag:'🇺🇸',label:'English',urlPrefix:'',dir:'ltr'},
  es:{flag:'🇪🇸',label:'Español',urlPrefix:'/es',dir:'ltr'},
  'zh-TW':{flag:'🇹🇼',label:'繁體中文',urlPrefix:'/ai-academy/modules/zh-TW',dir:'ltr'},
  ko:{flag:'🇰🇷',label:'한국어',urlPrefix:'/ai-academy/modules/ko',dir:'ltr'},
  ur:{flag:'🇵🇰',label:'اردو',urlPrefix:'/ai-academy/modules/ur',dir:'rtl'}
};
// Detect language from the URL path first (e.g. /es/ai-academy/... defaults to 'es'),
// then fall back to stored preference, then English.
function detectLangFromPath() {
  const p = (typeof window !== 'undefined' && window.location && window.location.pathname) || '';
  const m = p.match(/^\/([a-z]{2})\//i);
  return m ? m[1].toLowerCase() : null;
}
let activeLang = detectLangFromPath() || localStorage.getItem('aesop-lang') || 'en';

function setLang(lang, cId) {
  activeLang = lang;
  localStorage.setItem('aesop-lang', lang);
  // Re-render to update flag states
  if (STATE.view === 'course' && cId) renderCourseDetail(cId);
  if (STATE.view === 'module' && STATE.courseId && STATE.moduleId) {
    renderModuleFrame(STATE.courseId, STATE.moduleId);
  }
  // Update all flag buttons
  document.querySelectorAll('.lang-flag').forEach(f => {
    f.classList.toggle('active', f.dataset.lang === lang);
  });
}

function getCourseLangs(course) {
  // Returns array of language codes available for this course
  return course.languages || ['en'];
}

function buildLangSwitcher(course, currentLang) {
  const langs = getCourseLangs(course);
  if (langs.length <= 1) return ''; // No switcher needed for English-only
  let h = '<div class="cd-lang-row"><span class="cd-lang-label">Language</span><div class="lang-switcher">';
  langs.forEach(code => {
    const meta = LANG_META[code] || {flag:'🌐',label:code};
    const cls = code === currentLang ? 'lang-flag active' : 'lang-flag';
    h += `<button class="${cls}" data-lang="${code}" onclick="setLang('${code}','${course.id}')"><span class="lf-icon">${meta.flag}</span> ${meta.label}</button>`;
  });
  h += '</div></div>';
  return h;
}

// Lesson indices completed per module
function lessonsDone(cId, mId){ return STATE.completedLessons[cId]?.[mId] || new Set(); }
function modDone(cId, mId){ return (STATE.completedMods[cId] || new Set()).has(mId); }
function testPassed(cId, mId){ return (STATE.passedTests[cId] || new Set()).has(mId); }
function examPassed(cId){ return (STATE.passedExams[cId]); }
function allModsDone(cId){
  const c=getCourse(cId); if(!c) return false;
  return c.modules.every(m=>modDone(cId,m.id));
}
function allTestsPassed(cId){
  const c=getCourse(cId); if(!c) return false;
  return c.modules.every(m=>testPassed(cId,m.id));
}
// All quizzes done for every module (unlocks final exam on standard path)
// Uses the enforcement-gate localStorage key: aesop-gate-{courseId}-{moduleId}
function allMTsAttempted(cId){
  const c=getCourse(cId); if(!c||!c.modules||!c.modules.length) return false;
  return c.modules.every(function(m){
    try{
      var key='aesop-gate-'+cId+'-'+m.id;
      var g=JSON.parse(localStorage.getItem(key)||'null');
      return g && Array.isArray(g.q) && g.q.length>=4;
    }catch(e){ return false; }
  });
}
// Foundations courses are excluded from bypass (noTestout flag set in registry)
function isFoundationsCourse(c){
  return !!(c && c.noTestout);
}
// Read the stored final-exam result for a course
function getFinalExamState(cId){
  try{ return JSON.parse(localStorage.getItem('aesop-final-'+cId)||'null'); }
  catch(e){ return null; }
}
function getCourse(id){ return COURSES.find(c=>c.id===id); }

function totalPoints(){
  return COURSES.reduce((s,c)=>{
    const v=STATE.passedExams[c.id];
    if(!v) return s;
    // v is a factor (0.5 bypass, 1.0 standard) — legacy true treated as 1.0
    return s + Math.round(c.pts * (typeof v==='number' ? v : 1));
  },0);
}

// totalModulePoints — 1 point per completed module across all courses (certification currency)
function totalModulePoints(){
  return Object.values(STATE.completedMods).reduce((s,m)=>s+m.size,0);
}

// Persist module points + full course progress to localStorage.
// aesop-cert-mpts       — running total for the cert chip / nav
// aesop-course-progress — {courseId:{moduleId:true}} read by students.html
function saveCertModPts(){
  try{
    const pts=totalModulePoints();
    const prev=parseInt(localStorage.getItem('aesop-cert-mpts')||'0');
    if(pts>prev) localStorage.setItem('aesop-cert-mpts',String(pts));

    // Full course progress for students.html progress bars
    const stored=JSON.parse(localStorage.getItem('aesop-course-progress')||'{}');
    Object.entries(STATE.completedMods).forEach(([cId,mSet])=>{
      if(!stored[cId]) stored[cId]={};
      mSet.forEach(mId=>{ stored[cId][mId]=true; });
    });
    localStorage.setItem('aesop-course-progress',JSON.stringify(stored));
  }catch(_){}
}

function saveHubProgress(){
  try{
    const d={completedMods:{},passedTests:{},completedLessons:{}};
    Object.entries(STATE.completedMods).forEach(([c,s])=>{ d.completedMods[c]=Array.from(s); });
    Object.entries(STATE.passedTests).forEach(([c,s])=>{ d.passedTests[c]=Array.from(s); });
    Object.entries(STATE.completedLessons).forEach(([c,mm])=>{
      d.completedLessons[c]={};
      Object.entries(mm).forEach(([m,s])=>{ d.completedLessons[c][m]=Array.from(s); });
    });
    localStorage.setItem('aesop-hub-progress',JSON.stringify(d));
  }catch(_){}
}
function loadHubProgress(){
  try{
    const d=JSON.parse(localStorage.getItem('aesop-hub-progress')||'null');
    if(!d) return;
    if(d.completedMods) Object.entries(d.completedMods).forEach(([c,a])=>{ STATE.completedMods[c]=new Set(a); });
    if(d.passedTests) Object.entries(d.passedTests).forEach(([c,a])=>{ STATE.passedTests[c]=new Set(a); });
    if(d.completedLessons) Object.entries(d.completedLessons).forEach(([c,mm])=>{
      STATE.completedLessons[c]={};
      Object.entries(mm).forEach(([m,a])=>{ STATE.completedLessons[c][m]=new Set(a); });
    });
  }catch(_){}
}

function markModComplete(cId, mId){
  if(!STATE.completedMods[cId]) STATE.completedMods[cId]=new Set();
  STATE.completedMods[cId].add(mId);
  saveCertModPts();
  saveHubProgress();
  if(STATE._firebaseStub) console.log('[Firebase stub] modComplete',cId,mId);
}
function markTestPassed(cId, mId){
  if(!STATE.passedTests[cId]) STATE.passedTests[cId]=new Set();
  STATE.passedTests[cId].add(mId);
  saveHubProgress();
  if(STATE._firebaseStub) console.log('[Firebase stub] testPassed',cId,mId);
}
// factor: 1.0 = full credit (standard path), 0.5 = bypass credit
function markExamPassed(cId, factor){
  factor = (typeof factor==='number' && factor>0 && factor<=1) ? factor : 1;
  STATE.passedExams[cId]=factor;
  STATE.earnedPoints=totalPoints();
  if(STATE._firebaseStub) console.log('[Firebase stub] examPassed',cId,'factor:',factor,'pts:',STATE.earnedPoints);
}

// ═══════════════════════════════════════════════════════════
// POSTMESSAGE LISTENER (from module iframes)
// ═══════════════════════════════════════════════════════════
window.addEventListener('message',function(e){
  if(!e.data||typeof e.data!=='object') return;
  const {type,courseId,moduleId,lessonId,passed,score,path}=e.data;
  if(type==='lessonComplete'&&courseId&&moduleId){
    if(!STATE.completedLessons[courseId]) STATE.completedLessons[courseId]={};
    if(!STATE.completedLessons[courseId][moduleId]) STATE.completedLessons[courseId][moduleId]=new Set();
    STATE.completedLessons[courseId][moduleId].add(lessonId);
    // Check if all 4 lessons done => mark mod complete
    const c=getCourse(courseId);
    const m=c&&c.modules.find(x=>x.id===moduleId);
    if(m&&STATE.completedLessons[courseId][moduleId].size>=m.lessons.length){
      markModComplete(courseId,moduleId);
    }
    saveHubProgress();
    renderAll();
  }
  if(type==='modTestPassed'&&courseId&&moduleId){
    markTestPassed(courseId,moduleId);
    markModComplete(courseId,moduleId);
    renderAll();
  }
  // Final exam results (standard path or bypass)
  if(type==='finalExamPassed'&&courseId){
    const factor = (path==='testout') ? 0.5 : 1.0;
    markExamPassed(courseId, factor);
    saveCertModPts();
    // Re-render course detail so the exam card updates immediately
    if(STATE.courseId===courseId) renderCourseDetail(courseId);
    renderAll();
  }
  if(type==='finalExamFailed'&&courseId){
    // State already stored in localStorage by the exam page.
    // Re-render so bypass card flips to locked state if this was a testout attempt.
    if(STATE.courseId===courseId) renderCourseDetail(courseId);
  }
});

// ═══════════════════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════
function renderAll(){
  if(STATE.view==='course' && STATE.courseId) renderCourseDetail(STATE.courseId);
}

function renderSidebar(){ /* sidebar removed */ }

function renderReward(){
  const rc=document.getElementById('rewardContent');
  const pts=totalPoints();
  const maxPts=COURSES.reduce((s,c)=>s+c.pts,0);
  let h='';

  h+=`<div class="rp-points-block">
    <div class="rp-pts-num">${pts}</div>
    <div class="rp-pts-label">of ${maxPts} Core Points</div>
  </div>`;

  // Per-course progress bars
  COURSES.forEach(c=>{
    const done=(STATE.completedMods[c.id]||new Set()).size;
    const pct=Math.round((done/c.modules.length)*100);
    const col=c.accent;
    h+=`<div class="rp-course-prog">
      <div class="rp-cp-label"><span>${c.icon} ${c.title}</span><span>${done}/${c.modules.length}</span></div>
      <div class="rp-cp-bar"><div class="rp-cp-fill" style="width:${pct}%;background:${col};"></div></div>
    </div>`;
  });

  // Badges
  h+=`<div style="margin-top:0.5rem;">`;
  const badges=[
    {id:'first_mod', icon:'🎯', name:'First Step', sub:'Complete your first module', earned: Object.values(STATE.completedMods).some(s=>s.size>0)},
    {id:'first_course', icon:'🏅', name:'Course Complete', sub:'Pass your first course exam', earned: Object.keys(STATE.passedExams).length>0},
    {id:'all_courses', icon:'🏆', name:'Electives Master', sub:'Complete all 6 elective courses', earned: COURSES.every(c=>examPassed(c.id))},
    {id:'gov_done', icon:'🏛️', name:'AI Governance Expert', sub:'Pass AI Governance exam', earned: examPassed('governance')},
    {id:'bld_done', icon:'🛠️', name:'AI Builder', sub:'Pass Building with AI exam', earned: examPassed('building')},
    {id:'cre_done', icon:'🎨', name:'AI Creator', sub:'Pass AI & Creativity exam', earned: examPassed('creativity')},
  ];
  badges.forEach(b=>{
    h+=`<div class="rp-badge${b.earned?' earned':''}">
      <span class="rp-badge-icon">${b.icon}</span>
      <div class="rp-badge-info"><div class="rp-badge-name">${b.name}</div><div class="rp-badge-sub">${b.sub}</div></div>
    </div>`;
  });
  h+=`</div>`;

  // Cert progress
  const stdPts=pts;
  h+=`<div class="rp-cert-block">
    <div class="rp-cert-title">Certification Progress</div>
    <div class="rp-cert-row${stdPts>=6?' met':''}">Certified AI Professional<span>${stdPts>=6?'✓':'6 std pts needed'}</span></div>
    <div class="rp-cert-row${stdPts>=12?' met':''}">Advanced AI Professional<span>${stdPts>=12?'✓':'12 std + 6 active'}</span></div>
    <div class="rp-cert-row${stdPts>=24?' met':''}">Expert AI Professional<span>${stdPts>=24?'✓':'24 std + 12 active'}</span></div>
  </div>`;

  rc.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════

function setSidebarVisible(show){
  const sb = document.getElementById('hubSidebar');
  const rs = document.getElementById('sidebarResizer');
  const main = sb && sb.closest('.main');
  if(!sb||!main) return;
  if(show){
    sb.style.display='';
    if(rs) rs.style.display='';
    main.style.gridTemplateColumns = (parseInt(localStorage.getItem('aesop-electives-sidebar-w'))||320) + 'px 8px 1fr';
  } else {
    sb.style.display='none';
    if(rs) rs.style.display='none';
    main.style.gridTemplateColumns = '1fr';
  }
}
function selectCourse(cId){
  STATE.courseId=cId;
  STATE.moduleId=null;
  STATE.view='course';
  localStorage.setItem('aesop-hub-last-view', JSON.stringify({view:'course', courseId:cId}));
  const c=getCourse(cId);
  document.documentElement.style.setProperty('--current-accent',c.accent);
  const lbl=document.getElementById('hubCourseLabel');
  if(lbl) lbl.textContent=c.title;
  renderCourseDetail(cId);
}

function selectModule(e, cId, mId){
  e.stopPropagation();
  STATE.courseId=cId;
  STATE.moduleId=mId;
  STATE.view='module';
  localStorage.setItem('aesop-hub-last-view', JSON.stringify({view:'module', courseId:cId, moduleId:mId}));
  const c=getCourse(cId);
  document.documentElement.style.setProperty('--current-accent',c.accent);
  renderAll();
  renderModuleFrame(cId, mId);
}

function openExam(cId){ openFinalExam(cId); } // legacy alias

function openFinalExam(cId){
  const c=getCourse(cId);
  if(!c||!c.final) return;
  if(!allMTsAttempted(cId)) return;
  const url=c.url+c.final+'.html';
  renderFinalExamFrame(cId, url, c.title+' — Final Exam');
}

function openBypassExam(cId){
  const c=getCourse(cId);
  if(!c||!c.final) return;
  if(isFoundationsCourse(c)) return;
  const existing=getFinalExamState(cId);
  if(existing && existing.path==='testout' && existing.attempted) return; // one-shot guard
  const url=c.url+c.final+'.html?mode=testout';
  renderFinalExamFrame(cId, url, c.title+' — Bypass Exam');
}

function renderFinalExamFrame(cId, url, title){
  const c=getCourse(cId);
  const backLabel = c ? c.title : 'Course';
  document.getElementById('contentArea').innerHTML=`
    <div style="display:flex;flex-direction:column;height:100%;min-height:100vh;">
      <div style="display:flex;align-items:center;gap:1rem;padding:0.65rem 1.5rem;background:rgba(6,14,24,0.97);border-bottom:1px solid #1a2738;flex-shrink:0;">

        </div>`;
    m.lessons.forEach((l,li)=>{
      const lDone=lessonsDone(cId,m.id).has('l'+(li+1));
      h+=`<div class="lesson-row${lDone?' done':''}" onclick="openModule('${cId}','${m.id}')">
        <span class="lr-dot"></span>
        <span class="lr-label">L${li+1}: ${l}</span>
        <div class="lr-subs">
          <span class="lr-sub${lDone?' done':''}">Quiz</span>
          <span class="lr-sub${lDone?' done':''}">Lab</span>
        </div>
      </div>`;
    });
    h+=`<div class="mod-test-row${tp?' passed':''}" onclick="openModTest('${cId}','${m.id}')" >
      <span class="mtr-icon">📋</span>
      <span class="mtr-label">Module Test</span>
      <span class="mtr-status${tp?' pass':''}">${tp?'Passed':'Take test'}</span>
    </div>`;
    h+=`</div></div>`;
  });

  h+=`</div>`;

  // ── Final Exam card (standard path) ─────────────────────
  {
    const examFactor = typeof STATE.passedExams[cId]==='number' ? STATE.passedExams[cId] : (ep ? 1 : 0);
    const awardedPts = Math.round(c.pts * examFactor);
    const stdPassed  = ep && (feState ? feState.path!=='testout' : true);
    const bypassOnly = ep && feState && feState.path==='testout' && feState.passed;

    let examClass   = 'course-test-card';
    let examOnclick = '';
    let examIcon    = '📝';
    let examTitle   = 'Final Exam';
    let examSub;
    let examBadge   = '';

    if(ep){
      examClass += ' passed';
      examIcon   = '🏆';
      examTitle  = 'Final Exam — Passed!';
      examSub    = `${awardedPts} Core Point${awardedPts!==1?'s':''} awarded${examFactor<1?' (bypass credit — retake for full credit)':''}`;
      examBadge  = `<span class="ctc-pts">+${awardedPts}pt${awardedPts!==1?'s':''} ✓</span>`;
    } else if(!c.final){
      examClass += ' locked';
      examIcon   = '🔒';
      examSub    = 'Final exam not yet available';
    } else if(feState && feState.attempted && !feState.passed && feState.path!=='testout'){
      // Standard path failed — allow retry (no one-shot restriction on standard)
      if(mtsDone){ examOnclick=`openFinalExam('${cId}')`; }
      else { examClass+=' locked'; }
      examSub = `Last score: ${feState.score}% — 70% needed. ${mtsDone?'Try again →':'Complete module tests to unlock'}`;
    } else if(!mtsDone){
      examClass += ' locked';
      examSub    = 'Complete all module tests to unlock the final exam';
    } else {
      examOnclick = `openFinalExam('${cId}')`;
      examSub = `${c.modules.length} module tests done — ready for the final exam`;
    }

    h+=`<div class="${examClass}" onclick="${examOnclick}">
      <span class="ctc-icon">${examIcon}</span>
      <div class="ctc-info">
        <div class="ctc-title">${examTitle}</div>
        <div class="ctc-sub">${examSub}</div>
      </div>
      ${examBadge}
    </div>`;
  }

  // ── Bypass card (test-out path) — hidden for Foundations courses ─
  if(c.final && !isFoundationsCourse(c)){
    const bState   = getFinalExamState(cId); // re-read for testout path
    const bAttempted = bState && bState.path==='testout' && bState.attempted;
    const bPassed    = bAttempted && bState.passed;
    const alreadyFull = ep && !(bState && bState.path==='testout');

    let bypassClass   = 'bypass-card';

    let bypassIcon    = '⚡';
    let bypassTitle   = 'Bypass Exam';

    if(alreadyFull){

      bypassSub = 'Course already completed — bypass not needed';

      bypassClass += ' passed';
      bypassIcon   = '✓';
      bypassTitle  = 'Bypass Exam — Passed';
      bypassSub    = `Scored ${bState.score}% — 50% credit applied. Retake the full course for 100%.`;
    } else if(bAttempted && !bPassed){
      bypassClass += ' locked';
      bypassSub = `Scored ${bState.score}% — one attempt used. Start Module 1 to earn full credit.`;
    } else {
      bypassOnclick = `openBypassExam('${cId}')`;
      bypassSub = 'Score 80% on a single attempt to bypass modules — earns 50% credit';
    }

    h+=`<div class="${bypassClass}" onclick="${bypassOnclick}">
      <span class="ctc-icon" style="font-size:1.3rem;">${bypassIcon}</span>
      <div class="ctc-info" style="flex:1;">
        <div class="ctc-title">${bypassTitle}</div>
        <div class="ctc-sub">${bypassSub}</div>
      </div>
    </div>`;
  }

  h+=`</div>`;
  document.getElementById('contentArea').innerHTML=h;
  if(typeof hubRestoreControls==='function') hubRestoreControls();
}

// MODULE IFRAME
// ═══════════════════════════════════════════════════════════
function renderModuleFrame(cId, mId){
  const c=getCourse(cId);
  const m=c&&c.modules.find(x=>x.id===mId);
  if(!c||!m) return;

  const mNum=c.modules.indexOf(m)+1;
  const courseLangs = getCourseLangs(c);
  const lang = courseLangs.includes(activeLang) ? activeLang : 'en';
  // If registry entry has a langUrls template for this language, use it directly.
  // Template syntax: /path/module-{n}/file-m{n}.html
  let url;
  if (c.langUrls && c.langUrls[lang]) {
    url = c.langUrls[lang].replace(/\{n\}/g, mNum);
  } else {
    const folder = c.url.replace(/\/+$/,'').split('/').pop();
    const langMeta = LANG_META[lang] || {urlPrefix: lang === 'en' ? '' : '/' + lang};
    const urlPrefix = (typeof langMeta.urlPrefix === 'string') ? langMeta.urlPrefix : '';
    url = `${urlPrefix}${c.url}${folder}-m${mNum}.html`;
  }

  // Show loading state
  document.getElementById('contentArea').innerHTML=`
    <div class="module-loading">
      <div class="module-loading-inner">
        <div class="ml-spinner"></div>
        <div class="ml-label">Loading ${m.title}…</div>
      </div>
    </div>`;

  // Fetch and inject module content
  fetch(url + '?v=' + Date.now())
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(html=>injectModuleContent(html, cId, mId, m, c))
    .catch(err=>{
      document.getElementById('contentArea').innerHTML=`
        <div class="module-loading">
          <div class="module-loading-inner">
            <div style="font-size:2rem;margin-bottom:1rem;">⚠️</div>
            <div class="ml-label">Could not load module</div>
            <div style="font-size:0.75rem;color:rgba(255,255,255,0.3);margin-top:0.5rem;">${err.message}</div>
            <button onclick="selectCourse('${cId}')" style="margin-top:1.5rem;background:var(--gold);color:#0a1118;border:none;border-radius:6px;padding:0.5rem 1.25rem;font-size:0.8rem;font-weight:700;cursor:pointer;">← Back to Course</button>
          </div>
        </div>`;
    });
}

function injectModuleContent(html, cId, mId, m, c){
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Extract pieces from the fetched document
  const tabStrip  = doc.querySelector('.tab-strip');
  const contentArea = doc.querySelector('.content-area');
  const moduleStyles = Array.from(doc.querySelectorAll('style')).map(s=>s.textContent).join('\n');
  const moduleScripts = Array.from(doc.querySelectorAll('script')).map(s=>s.textContent).filter(t=>t.trim() && t.includes('COURSE_ID')).join('\n');
  const modTitle = doc.querySelector('.topbar-module')?.textContent || m.title;

  // ── Detect format: "Content Injection" (.content-area + .tab-strip) vs "Standalone" (.site-layout > .sidebar + .main) ──
  const standaloneMain = doc.querySelector('.main');
  const standaloneSidebar = doc.querySelector('.sidebar');
  const isStandalone = !contentArea && standaloneMain;

  if(!contentArea && !standaloneMain){
    document.getElementById('contentArea').innerHTML='<div style="padding:2rem;color:rgba(255,255,255,0.4);">Content not found in module file.</div>';
    return;
  }

  // Inject module-scoped styles (only once per module)
  const styleId = 'module-style-'+cId+'-'+mId;
  if(!document.getElementById(styleId)){
    const styleEl = document.createElement('style');
    styleEl.id = styleId;
    styleEl.textContent = moduleStyles;
    // For standalone modules, hide the sidebar and adjust the grid
    if(isStandalone){
      styleEl.textContent += `
        .site-layout .sidebar { display:none !important; }
        .site-layout { display:block !important; }
      `;
    }
    document.head.appendChild(styleEl);
  }

  // Build the content pane HTML
  const topbarHTML = `
    <div class="mod-topbar">
      <span class="mod-topbar-back" onclick="selectCourse('${cId}')">← ${c.title}</span>
      <div class="mod-topbar-sep"></div>
      <span class="mod-topbar-title">${modTitle}</span>
      ${activeLang !== 'en' && getCourseLangs(c).includes(activeLang) ? `<span style="font-size:0.72rem;color:var(--gold);opacity:0.7;margin-left:0.5rem;">${(LANG_META[activeLang]||{}).flag||''} ${(LANG_META[activeLang]||{}).label||activeLang}</span>` : ''}
      <div class="mod-topbar-sizer">
        <span class="mod-sizer-label">Size</span>
        <button class="mod-sizer-btn" onclick="hubAdjustSize(-1)">A−</button>
        <input class="mod-sizer-range" id="hubSizerRange" type="range" min="22" max="34" value="22" oninput="hubApplySize(this.value)">
        <button class="mod-sizer-btn" onclick="hubAdjustSize(1)">A+</button>
        <div class="mod-topbar-sep"></div>
        <span class="mod-sizer-label">Color</span>
        <input class="mod-color-range" id="hubColorRange" type="range" min="0" max="100" value="100" oninput="hubApplyColor(this.value)" title="Text brightness">
        <div class="mod-topbar-sep"></div>
        <button class="mod-listen-btn" id="hubListenBtn" onclick="hubToggleListen()" title="Read this lesson aloud using your browser's built-in voice">🔊 Listen</button>
        <button class="mod-listen-gear" id="hubListenGear" onclick="hubToggleListenPanel()" title="Voice, pace, and volume settings">⚙</button>
        <div class="mod-listen-panel" id="hubListenPanel">
          <div class="mod-listen-panel-row">
            <label class="mod-listen-panel-lbl" for="hubVoiceSel">Voice</label>
            <select id="hubVoiceSel" onchange="hubOnVoiceChange(this.value)"></select>
          </div>
          <div class="mod-listen-panel-row">
            <label class="mod-listen-panel-lbl" for="hubRateRange">Pace <span class="val" id="hubRateVal">1.0×</span></label>
            <input type="range" id="hubRateRange" min="0.5" max="2" step="0.1" value="1" oninput="hubOnRateChange(this.value)">
          </div>
          <div class="mod-listen-panel-row">
            <label class="mod-listen-panel-lbl" for="hubVolRange">Volume <span class="val" id="hubVolVal">100%</span></label>
            <input type="range" id="hubVolRange" min="0" max="1" step="0.05" value="1" oninput="hubOnVolumeChange(this.value)">
          </div>
          <div class="mod-listen-panel-row">
            <label class="mod-listen-panel-lbl" for="hubPitchRange">Pitch <span class="val" id="hubPitchVal">1.0</span></label>
            <input type="range" id="hubPitchRange" min="0.5" max="2" step="0.1" value="1" oninput="hubOnPitchChange(this.value)">
          </div>
        </div>
      </div>
    </div>`;

  let tabHTML = '';
  let bodyHTML = '';

  if(isStandalone){
    // Build tab strip from sidebar buttons
    if(standaloneSidebar){
      const btns = standaloneSidebar.querySelectorAll('.sb-btn:not(.sb-sub)');
      if(btns.length){
        tabHTML = '<div class="tab-strip">';
        btns.forEach(btn => {
          const target = btn.getAttribute('onclick')?.match(/goPage\(['"]([^'"]+)['"]\)/)?.[1] || '';
          const label = btn.textContent.trim();
          const isActive = btn.classList.contains('active') ? ' active' : '';
          tabHTML += `<button class="tab-btn${isActive}" onclick="standaloneGoPage('${target}')">${label}</button>`;
        });
        tabHTML += '</div>';
      }
    }
    bodyHTML = standaloneMain.innerHTML;
  } else {
    tabHTML  = tabStrip  ? tabStrip.outerHTML  : '';
    bodyHTML = contentArea.outerHTML;
  }

  document.getElementById('contentArea').innerHTML = topbarHTML + tabHTML + bodyHTML;

  // Restore hub controls on new content
  setTimeout(function(){ if(typeof hubRestoreControls==='function') hubRestoreControls(); }, 50);

  // Save + restore page position within module (so F5 returns to same tab/lab)
  const _pageKey = 'aesop-page-' + cId + '-' + mId;

  // Re-execute module scripts in global scope
  // Minimal fallback used when module script has a syntax error (e.g. truncated file)
  const NAV_FALLBACK = `var currentPageId='p-l1';
function goPage(id){var prev=document.getElementById(currentPageId);var next=document.getElementById(id);if(!next)return;if(prev)prev.classList.remove('active');next.classList.add('active');currentPageId=id;updateTabs();window.scrollTo(0,0);}
function updateTabs(){document.querySelectorAll('[data-page]').forEach(function(el){el.classList.toggle('active',el.dataset.page===currentPageId);});}
function answer(btn,result,qId){var box=document.getElementById(qId);if(!box)return;box.querySelectorAll('.quiz-opt').forEach(function(b){b.disabled=true;});btn.classList.add(result==='correct'?'correct':'wrong');box.querySelectorAll('.quiz-feedback').forEach(function(fb){fb.classList.remove('show');});var fb=box.querySelector('.quiz-feedback.'+(result==='correct'?'right':'wrong'));if(fb)fb.classList.add('show');}
function mtAnswer(btn,correct,qNum){var box=document.getElementById(qNum);if(!box||box.classList.contains('answered'))return;box.classList.add('answered');box.querySelectorAll('.mt-opt').forEach(function(b){b.disabled=true;});btn.classList.add(correct?'correct':'wrong');}
function chatSend(labId){var inp=document.getElementById('inp-'+labId);if(inp)inp.value='';var msgs=document.getElementById('msgs-'+labId);if(msgs){var d=document.createElement('div');d.className='chat-msg ai';d.textContent='AI labs require a complete module file. Navigation and quizzes are still available.';msgs.appendChild(d);}}
function chatReset(labId){var msgs=document.getElementById('msgs-'+labId);if(msgs)msgs.innerHTML='';}
function chatKeydown(e,labId){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chatSend(labId);}}
goPage('p-l1');`;

  try {
    const old = document.getElementById('hub-module-script');
    if(old) old.remove();
    const scriptEl = document.createElement('script');
    scriptEl.id = 'hub-module-script';
    // For standalone modules, inject a standaloneGoPage function that replaces the original goPage
    if(isStandalone){
      scriptEl.textContent = `
        function standaloneGoPage(pageId){
          var pages = document.querySelectorAll('#contentArea [id^="p-"]');
          pages.forEach(function(p){ p.style.display = 'none'; });
          var target = document.getElementById(pageId);
          if(target) target.style.display = 'block';
          // Update tab strip active state
          var tabs = document.querySelectorAll('#contentArea .tab-btn');
          tabs.forEach(function(t){ t.classList.remove('active'); });
          var clicked = Array.from(tabs).find(function(t){ return t.getAttribute('onclick').includes(pageId); });
          if(clicked) clicked.classList.add('active');
        }
      ` + moduleScripts.replace(/\bgoPage\b/g, 'standaloneGoPage');
    } else {
      // Validate syntax before injecting — catches truncated/broken module files
      let finalScript = moduleScripts;
      if (finalScript == null || finalScript.trim() === "") {
        // No script content found (empty file, missing COURSE_ID, different var name, etc.)
        console.warn('No module script content found, using nav fallback');
        finalScript = NAV_FALLBACK;
      } else {
        try { new Function(finalScript); } catch(syntaxErr) {
          console.warn('Module script syntax error (truncated file?), using nav fallback:', syntaxErr.message);
          finalScript = NAV_FALLBACK;
        }
      }
      scriptEl.textContent = finalScript;
    }
    document.body.appendChild(scriptEl);
  } catch(e){ console.warn('Module script injection error:', e); }

  // After script is injected, set up page persistence and passed banner
  setTimeout(function(){
    // Inject "passed" banner on the module test page if the test was already passed
    if(testPassed(cId, mId)){
      const mtPage = document.getElementById('p-mt');
      if(mtPage && !mtPage.querySelector('.mt-passed-banner')){
        const banner = document.createElement('div');
        banner.className = 'mt-passed-banner';
        banner.innerHTML = '<div class="mt-passed-icon">🏆</div><div class="mt-passed-title">Module Test Passed</div><div class="mt-passed-sub">Your result is saved. The questions below are available for review.</div>';
        mtPage.insertBefore(banner, mtPage.firstChild);
      }
    }
    // Restore saved page
    const _savedPage = localStorage.getItem(_pageKey);
    if(_savedPage && typeof window.goPage === 'function'){
      try{ window.goPage(_savedPage); }catch(_){}
    }
    // Intercept goPage to persist position (now that the real goPage is defined)
    const _origGoPage = window.goPage;
    if(typeof _origGoPage === 'function'){
      window.goPage = function(id){
        _origGoPage(id);
        localStorage.setItem(_pageKey, id);
      };
    }
  }, 50);
}

  return !!localStorage.getItem(LEARNER_ID_KEY);
}

function generateLearnerId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return 'AESOP-' + code;
}

function showLearnerIdGate(onComplete) {
  // Remove any existing gate
  var existing = document.getElementById('learnerIdGate');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.id = 'learnerIdGate';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';

  overlay.innerHTML = `
    <div style="background:#1a2332;border:1px solid rgba(201,160,90,0.3);border-radius:12px;padding:2rem;max-width:400px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.5);">
      <div style="font-size:2.5rem;margin-bottom:0.75rem;">📋</div>
      <h2 style="font-family:var(--font-display);font-size:1.25rem;font-weight:700;color:#fff;margin-bottom:0.5rem;">Learner ID Required</h2>
      <p style="font-size:0.85rem;color:rgba(255,255,255,0.6);line-height:1.6;margin-bottom:1.5rem;">

      </p>
      <button id="gateGetId" style="width:100%;padding:0.7rem 1.5rem;font-size:0.85rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;background:var(--gold);color:#0d1b2a;border:none;border-radius:6px;cursor:pointer;margin-bottom:1rem;transition:background 0.2s;">
        Get My Learner ID
      </button>
      <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.1);"></div>
        <span style="font-size:0.65rem;color:rgba(255,255,255,0.3);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;">or</span>
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.1);"></div>
      </div>
      <div style="display:flex;gap:0.5rem;">
        <input id="gateIdInput" type="text" placeholder="AESOP-XXXX" maxlength="10"
               style="flex:1;padding:0.6rem 0.75rem;font-family:'SF Mono','Fira Code',monospace;font-size:0.85rem;letter-spacing:0.06em;text-transform:uppercase;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;outline:none;">
        <button id="gateLookup" style="padding:0.6rem 1rem;font-size:0.75rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;background:rgba(201,160,90,0.15);color:var(--gold);border:1px solid rgba(201,160,90,0.3);border-radius:6px;cursor:pointer;white-space:nowrap;">
          Look Up
        </button>
      </div>
      <div id="gateErr" style="font-size:0.78rem;color:#dc3545;margin-top:0.5rem;min-height:1.2em;"></div>
      <div id="gateSuccess" style="display:none;margin-top:1rem;padding:1rem;background:rgba(61,214,192,0.1);border:1px solid rgba(61,214,192,0.25);border-radius:8px;">
        <div style="font-size:0.72rem;color:rgba(255,255,255,0.5);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.3rem;">Your Learner ID</div>
        <div id="gateIdDisplay" style="font-family:'SF Mono','Fira Code',monospace;font-size:1.2rem;font-weight:800;color:var(--gold-light);letter-spacing:0.08em;margin-bottom:0.5rem;"></div>
        <p style="font-size:0.75rem;color:rgba(255,255,255,0.5);margin-bottom:0.75rem;">Save this ID — you'll need it to access your transcript later.</p>
        <button id="gateContinue" style="width:100%;padding:0.6rem 1.5rem;font-size:0.82rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;background:var(--gold);color:#0d1b2a;border:none;border-radius:6px;cursor:pointer;">
          Continue to Exam
        </button>
      </div>
      <button id="gateCancel" style="margin-top:1rem;font-size:0.72rem;color:rgba(255,255,255,0.3);background:none;border:none;cursor:pointer;text-decoration:underline;">Cancel</button>
    </div>
  `;

  document.body.appendChild(overlay);

  // Get new ID
  document.getElementById('gateGetId').addEventListener('click', function() {
    var id = generateLearnerId();
    localStorage.setItem(LEARNER_ID_KEY, id);
    document.getElementById('gateGetId').style.display = 'none';
    document.getElementById('gateSuccess').style.display = 'block';
    document.getElementById('gateIdDisplay').textContent = id;
    // Also save to Firestore via transcript page on next visit
  });

  // Lookup existing ID
  document.getElementById('gateLookup').addEventListener('click', function() {
    var val = document.getElementById('gateIdInput').value.trim().toUpperCase();
    var err = document.getElementById('gateErr');
    err.textContent = '';
    if (!val || !val.startsWith('AESOP-') || val.length < 8) {
      err.textContent = 'Enter a valid Learner ID (e.g. AESOP-7K3X).';
      return;
    }
    localStorage.setItem(LEARNER_ID_KEY, val);
    overlay.remove();
    if (onComplete) onComplete();
  });

  // Enter key in input
  document.getElementById('gateIdInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('gateLookup').click();
  });

  // Continue after getting new ID
  document.getElementById('gateContinue').addEventListener('click', function() {
    overlay.remove();
    if (onComplete) onComplete();
  });

  // Cancel
  document.getElementById('gateCancel').addEventListener('click', function() {
    overlay.remove();
  });
}

// Intercept goPage calls — gate module test pages behind Learner ID
(function() {
  var _origGoPage = null;

  // Poll for goPage to exist (injected by module load)
  var observer = new MutationObserver(function() {
    if (window.goPage && window.goPage !== _gatedGoPage) {
      _origGoPage = window.goPage;
      window.goPage = _gatedGoPage;
    }
    if (window.standaloneGoPage && window.standaloneGoPage !== _gatedStandaloneGoPage) {
      window._origStandaloneGoPage = window.standaloneGoPage;
      window.standaloneGoPage = _gatedStandaloneGoPage;
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });

  function _gatedGoPage(pageId) {
    if (pageId === 'p-mt' && !hasLearnerId()) {
      showLearnerIdGate(function() { _origGoPage(pageId); });
      return;
    }
    _origGoPage(pageId);
  }

  function _gatedStandaloneGoPage(pageId) {
    if (pageId === 'p-mt' && !hasLearnerId()) {
      showLearnerIdGate(function() { window._origStandaloneGoPage(pageId); });
      return;
    }
    window._origStandaloneGoPage(pageId);
  }
})();

let examState = {};

function renderExamPanel(cId){
  const c=getCourse(cId);
  const bank=EXAM_BANKS[cId]||[];
  const questions=bank;
  const ep=examPassed(cId);

  let h=`<div class="exam-panel">
    <div class="ep-back" onclick="selectCourse('${cId}')">← ${c.title}</div>
    <div class="ep-eyebrow">${c.sub} · Course Exam</div>
    <div class="ep-title">${c.title} — Final Exam</div>
    <div class="ep-sub">This exam covers all ${c.modules.length} modules. You need 80% to pass and earn your Core Point${c.pts>1?'s':''}.</div>
    <div class="exam-meta-pills">
      <span class="exam-pill">📝 ${questions.length} Questions</span>
      <span class="exam-pill">🏅 ${c.pts} Core Point${c.pts>1?'s':''} on Pass</span>
      <span class="exam-pill">📊 80% Required</span>
    </div>`;

  if(ep){
    h+=`<div style="background:rgba(45,138,94,0.06);border:1px solid rgba(45,138,94,0.25);border-radius:10px;padding:1.25rem;text-align:center;">
      <div style="font-size:1.5rem;margin-bottom:0.5rem;">🏆</div>
      <div style="font-weight:700;color:var(--green);font-size:1.1rem;margin-bottom:0.25rem;">Exam Passed</div>
      <div style="font-size:0.85rem;color:var(--ink-muted);">${c.pts} Core Point${c.pts>1?'s':''} awarded</div>
    </div>`;
  } else {
    h+=`<div class="exam-integrity-box">
      <strong>Academic Integrity</strong>
      <ul>
        <li>Complete independently without external AI assistance</li>
        <li>Do not copy questions to outside tools</li>
        <li>Take this exam after completing all course modules</li>
      </ul>
    </div>
    <div id="examStart-${cId}">
      <button class="exam-start-btn" onclick="startExam('${cId}')">Begin Exam →</button>
    </div>
    <div class="exam-q-area" id="examQs-${cId}"></div>
    <div id="examResults-${cId}"></div>`;
  }
  h+=`</div>`;
  document.getElementById('contentArea').innerHTML=h;
}

function startExam(cId){
  const bank=EXAM_BANKS[cId]||[];
  // Shuffle
  const qs=[...bank].sort(()=>Math.random()-0.5);
  examState[cId]={questions:qs,current:0,answers:[],started:true};

  document.getElementById(`examStart-${cId}`).style.display='none';
  document.getElementById(`examQs-${cId}`).classList.add('active');
  renderExamQuestion(cId);
}

function renderExamQuestion(cId){
  const es=examState[cId];
  if(!es) return;
  const q=es.questions[es.current];
  const prog=Math.round(((es.current)/es.questions.length)*100);
  const qa=document.getElementById(`examQs-${cId}`);

  let h=`<div class="exam-prog-bar"><div class="exam-prog-fill" style="width:${prog}%"></div></div>`;
  h+=`<div class="q-card">
    <div class="q-meta">Question ${es.current+1} of ${es.questions.length}</div>
    <div class="q-mod-tag">${q.mod}</div>
    <div class="q-text">${q.q}</div>
    <div class="q-opts" id="opts-${cId}">`;
  q.opts.forEach((o,i)=>{
    h+=`<button class="q-opt" onclick="selectAnswer('${cId}',${i})">${o}</button>`;
  });
  h+=`</div></div>`;
  h+=`<div class="exam-nav">
    <span class="q-counter">${es.current+1} / ${es.questions.length}</span>
    <button class="exam-btn" id="examNext-${cId}" disabled onclick="nextQuestion('${cId}')">
      ${es.current<es.questions.length-1?'Next →':'Submit Exam'}
    </button>
  </div>`;
  qa.innerHTML=h;
}

function selectAnswer(cId,idx){
  const es=examState[cId];
  if(!es) return;
  es.answers[es.current]=idx;
  document.querySelectorAll(`#opts-${cId} .q-opt`).forEach((b,i)=>b.classList.toggle('sel',i===idx));
  document.getElementById(`examNext-${cId}`).disabled=false;
}

function nextQuestion(cId){
  const es=examState[cId];
  if(!es) return;
  if(es.current<es.questions.length-1){
    es.current++;
    renderExamQuestion(cId);
  } else {
    submitExam(cId);
  }
}

function submitExam(cId){
  const es=examState[cId];
  const c=getCourse(cId);
  if(!es) return;
  let correct=0;
  es.questions.forEach((q,i)=>{
    if(es.answers[i]===q.correct) correct++;
  });
  const total=es.questions.length;
  const pct=Math.round((correct/total)*100);
  const passed=pct>=80;

  if(passed) markExamPassed(cId);

  document.getElementById(`examQs-${cId}`).classList.remove('active');
  const resultsEl=document.getElementById(`examResults-${cId}`);
  let h=`<div class="results-panel">
    <div class="score-ring ${passed?'pass':'fail'}">
      <span class="score-pct ${passed?'pass':'fail'}">${pct}%</span>
      <span class="score-lbl">${passed?'PASSED':'FAILED'}</span>
    </div>
    <div class="result-verdict ${passed?'pass':'fail'}">${passed?'Congratulations!':'Not quite — review and retry'}</div>
    <div class="result-sub">${passed?`You\'ve passed the ${c.title} exam.`:'You need 80% to pass. Review the modules and try again.'}</div>
    <div class="result-detail">
      <div class="rd-row"><span>Correct</span><span>${correct}</span></div>
      <div class="rd-row"><span>Total Questions</span><span>${total}</span></div>
      <div class="rd-row"><span>Score</span><span>${pct}%</span></div>
      <div class="rd-row"><span>Required to Pass</span><span>80%</span></div>
    </div>`;

  if(passed){
    h+=`<div class="pts-award">
      <div class="pts-award-num">+${c.pts}</div>
      <div class="pts-award-label">Core Point${c.pts>1?'s':''} Awarded</div>
      <div class="pts-award-sub">Total earned: ${totalPoints()} / 9 points · Valid 3 years</div>
    </div>`;
  } else {
    h+=`<div style="margin-top:1rem;text-align:center;">
      <button class="exam-start-btn" onclick="retryExam('${cId}')">Retry Exam</button>
    </div>`;
  }
  h+=`</div>`;
  resultsEl.innerHTML=h;
  renderAll();
}

function retryExam(cId){
  delete examState[cId];
  renderExamPanel(cId);
}

function hubGetContentArea(){

function hubApplySize(val){
  HUB_FONT_SIZE = parseInt(val);
  var base = parseInt(val);
  var dynStyle = document.getElementById('hub-dynamic-size');
  if(!dynStyle){ dynStyle = document.createElement('style'); dynStyle.id = 'hub-dynamic-size'; document.head.appendChild(dynStyle); }
  var css = '.content-area p,.content-area li,.content-area td,.story-text,.section-body p,.section-body li,.lesson-body p,.lesson-body li,.lesson-section p,.quiz-q,.quiz-opt,.quiz-feedback,.lab-intro p,.lab-intro li,.callout p,.gold-callout p,.warn-callout p,.key-term,.key-term span,.kt-def{font-size:'+base+'px !important;}';
  css += '.lesson-hero h1{font-size:'+Math.round(base*1.8)+'px !important;}';
  css += '.section-heading,.callout-label,.lesson-kicker{font-size:'+Math.round(base*0.95)+'px !important;}';
  css += '.chat-msg,.lab-chat-input textarea{font-size:'+base+'px !important;}';
  css += '.lab-prompt{font-size:'+Math.round(base*0.9)+'px !important;}';
  css += 'pre,code,.cmd,.code-block,.snippet,.terminal,.shell-cmd,.inline-code{font-size:'+base+'px !important;}';
  dynStyle.textContent = css;
  localStorage.setItem('aesop-hub-fontsize', val);
}

function hubAdjustSize(delta){
  const r = document.getElementById('hubSizerRange');
  if(!r) return;
  r.value = Math.min(34, Math.max(22, parseInt(r.value) + delta));
  hubApplySize(r.value);
}

function hubApplyColor(val){
  // Shift text color only — interpolate from muted (#6e7a8a) to full (#e8e3db)
  const pct = parseInt(val) / 100;
  const r = Math.round(110 + (232 - 110) * pct);
  const g = Math.round(122 + (227 - 122) * pct);
  const b = Math.round(138 + (219 - 138) * pct);
  const color = 'rgb(' + r + ',' + g + ',' + b + ')';
  // Inject/update a dynamic style rule
  let dynStyle = document.getElementById('hub-dynamic-color');
  if(!dynStyle){
    dynStyle = document.createElement('style');
    dynStyle.id = 'hub-dynamic-color';
    document.head.appendChild(dynStyle);
  }
  if(parseInt(val) === 100){
    dynStyle.textContent = '';
  } else {
    dynStyle.textContent = '.content-area p,.content-area li,.content-area td,.story-text,.section-body p,.lesson-section p,.lesson-body p,.lesson-body li{color:'+color+' !important;}';
  }
  localStorage.setItem('aesop-hub-textcolor', val);
}
