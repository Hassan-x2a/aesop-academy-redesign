// Returns [{text, pauseAfter}] — structure-aware so headings and paragraphs
// get real silence gaps between them instead of running together.
function hubExtractSegments() {
  const root = document.querySelector('.content-area') || document.body;
  const active = root.querySelector('.page.active') || root.querySelector('.page') || root;
  if (!active) return [];

  const clone = active.cloneNode(true);
  clone.querySelectorAll(
    'button, input, select, textarea, script, style, .tab-strip, ' +
    '.quiz-feedback, .quiz-result, .quiz-opt, .mt-opt, [aria-hidden="true"]'
  ).forEach(n => n.remove());

  const segs = [];

  function push(text, pauseAfter) {
    const t = text.replace(/\s+/g, ' ').trim();
    if (t) segs.push({ text: t, pauseAfter });
  }

  function walk(node) {
    if (node.nodeType === 3) {
      const t = (node.textContent || '').replace(/\s+/g, ' ').trim();
      if (!t) return;
      // Append to last seg if it has no pause yet (inline text within a block)
      if (segs.length && segs[segs.length - 1].pauseAfter === 0) {
        segs[segs.length - 1].text += ' ' + t;
      } else {
        segs.push({ text: t, pauseAfter: 0 });
      }
      return;
    }
    if (node.nodeType !== 1) return;
    const tag = node.tagName.toLowerCase();

    if (/^h[1-6]$/.test(tag)) {
      push(node.textContent, 700);
    } else if (tag === 'p') {
      push(node.textContent, 450);
    } else if (tag === 'li') {
      push(node.textContent, 300);
    } else if (tag === 'blockquote') {
      push(node.textContent, 500);
    } else {
      for (const child of node.childNodes) walk(child);
      // After a top-level block, ensure at least a paragraph-length pause
      if (['div','section','article'].includes(tag) && segs.length) {
        if (segs[segs.length - 1].pauseAfter < 350) {
          segs[segs.length - 1].pauseAfter = 350;
        }
      }
    }
  }

  walk(clone);
  return segs.filter(s => s.text.length > 1);
}

function hubPickVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  // If user has picked a voice explicitly, honor it
  const savedName = hubSpeechSetting('voice', '');
  if (savedName) {
    const match = voices.find(v => v.name === savedName);
    if (match) return match;
  }
  // Otherwise: prefer high-quality English voices when available
  const rank = v => {
    const name = (v.name || '').toLowerCase();
    let s = 0;
    if ((v.lang || '').toLowerCase().startsWith('en')) s += 100;
    if (/natural|neural|enhanced|premium|google|samantha|aria|jenny/.test(name)) s += 30;
    if (v.default) s += 5;
    return s;
  };
  return voices.slice().sort((a, b) => rank(b) - rank(a))[0];
}

function hubPopulateVoiceList() {
  const sel = document.getElementById('hubVoiceSel');
  if (!sel || !('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return; // will be called again via onvoiceschanged
  const current = sel.value;
  sel.innerHTML = '';
  // Group English first, then others, alphabetically within each group
  const en = voices.filter(v => (v.lang || '').toLowerCase().startsWith('en')).sort((a,b)=>a.name.localeCompare(b.name));
  const other = voices.filter(v => !(v.lang || '').toLowerCase().startsWith('en')).sort((a,b)=>a.name.localeCompare(b.name));
  const addGroup = (label, list) => {
    if (!list.length) return;
    const g = document.createElement('optgroup');
    g.label = label;
    list.forEach(v => {
      const o = document.createElement('option');
      o.value = v.name;
      o.textContent = v.name + ' (' + v.lang + ')';
      g.appendChild(o);
    });
    sel.appendChild(g);
  };
  addGroup('English', en);
  addGroup('Other languages', other);
  // Restore selection: saved preference, or current, or first
  const saved = hubSpeechSetting('voice', '');
  if (saved && voices.find(v => v.name === saved))     sel.value = saved;
  else if (current && voices.find(v => v.name === current)) sel.value = current;
  else {
    const picked = hubPickVoice();
    if (picked) sel.value = picked.name;
  }
}

function hubToggleListenPanel() {
  const panel = document.getElementById('hubListenPanel');
  if (!panel) return;
  const opening = !panel.classList.contains('open');
  panel.classList.toggle('open');
  if (opening) {
    hubPopulateVoiceList();
    // Restore slider values from storage
    const rate = parseFloat(hubSpeechSetting('rate', '1.0'));
    const vol  = parseFloat(hubSpeechSetting('volume', '1.0'));
    const pit  = parseFloat(hubSpeechSetting('pitch', '1.0'));
    const rEl = document.getElementById('hubRateRange');
    const vEl = document.getElementById('hubVolRange');
    const pEl = document.getElementById('hubPitchRange');
    if (rEl) { rEl.value = rate; document.getElementById('hubRateVal').textContent = rate.toFixed(1) + '×'; }
    if (vEl) { vEl.value = vol;  document.getElementById('hubVolVal').textContent  = Math.round(vol*100) + '%'; }
    if (pEl) { pEl.value = pit;  document.getElementById('hubPitchVal').textContent = pit.toFixed(1); }
  }
}
function hubOnVoiceChange(name)  { hubSpeechSaveSetting('voice', name); }
function hubOnRateChange(v)      { hubSpeechSaveSetting('rate', v);   const el = document.getElementById('hubRateVal');  if (el) el.textContent = parseFloat(v).toFixed(1) + '×'; }
function hubOnVolumeChange(v)    { hubSpeechSaveSetting('volume', v); const el = document.getElementById('hubVolVal');   if (el) el.textContent = Math.round(parseFloat(v)*100) + '%'; }
function hubOnPitchChange(v)     { hubSpeechSaveSetting('pitch', v);  const el = document.getElementById('hubPitchVal'); if (el) el.textContent = parseFloat(v).toFixed(1); }

// Close panel on outside click
document.addEventListener('click', (e) => {
  const panel = document.getElementById('hubListenPanel');
  const gear  = document.getElementById('hubListenGear');
  if (!panel || !panel.classList.contains('open')) return;
  if (panel.contains(e.target) || (gear && gear.contains(e.target))) return;
  panel.classList.remove('open');
});

function hubSetListenButtonState(state) {
  const btn = document.getElementById('hubListenBtn');
  if (!btn) return;
  btn.classList.toggle('playing', state === 'playing' || state === 'paused');
  if (state === 'playing')       btn.textContent = '⏸ Pause';
  else if (state === 'paused')   btn.textContent = '▶ Resume';
  else                           btn.textContent = '🔊 Listen';
}

function hubStopListen() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  hubSpeechState = 'stopped';
  hubSpeechChunks = [];
  hubSpeechIndex = 0;
  hubSetListenButtonState('stopped');
}

function hubToggleListen() {
  if (!('speechSynthesis' in window)) {
    alert('Sorry — your browser doesn\'t support text-to-speech. Try Chrome, Edge, Safari, or Firefox.');
    return;
  }
  if (hubSpeechState === 'playing') {
    speechSynthesis.pause();
    hubSpeechState = 'paused';
    hubSetListenButtonState('paused');
    return;
  }
  if (hubSpeechState === 'paused') {
    // Cancel the paused utterance and re-speak from current position so any
    // settings changes made while paused take effect immediately.
    speechSynthesis.cancel();
    hubSpeechState = 'playing';
    hubSetListenButtonState('playing');
    hubSpeakNextChunk();
    return;
  }
  // Start fresh
  speechSynthesis.cancel();
  hubSpeechChunks = hubExtractSegments();
  if (!hubSpeechChunks.length) {
    alert('No readable text found on this page.');
    return;
  }
  hubSpeechIndex = 0;
  hubSpeechState = 'playing';
  hubSetListenButtonState('playing');
  hubSpeakNextChunk();
}

// Speak one segment at a time — reads settings fresh each time so voice/rate/
// volume/pitch changes in the panel take effect on the very next sentence.
// Each segment carries a pauseAfter (ms) so headings and paragraphs get
// genuine silence between them instead of running together.
function hubSpeakNextChunk() {
  if (hubSpeechState !== 'playing') return;
  if (hubSpeechIndex >= hubSpeechChunks.length) { hubStopListen(); return; }

  const seg    = hubSpeechChunks[hubSpeechIndex];
  const text   = (typeof seg === 'string') ? seg : seg.text;
  const pause  = (typeof seg === 'object' && seg.pauseAfter) ? seg.pauseAfter : 0;

  const voice  = hubPickVoice();
  const rate   = parseFloat(hubSpeechSetting('rate',   '1.0'));
  const volume = parseFloat(hubSpeechSetting('volume', '1.0'));
  const pitch  = parseFloat(hubSpeechSetting('pitch',  '1.0'));

  const u = new SpeechSynthesisUtterance(text);
  if (voice) u.voice = voice;
  u.rate   = rate;
  u.volume = volume;
  u.pitch  = pitch;
  u.lang   = (voice && voice.lang) || 'en-US';

  u.onend = () => {
    if (hubSpeechState !== 'playing') return;
    hubSpeechIndex++;
    if (pause > 0) setTimeout(hubSpeakNextChunk, pause);
    else hubSpeakNextChunk();
  };
  u.onerror = (e) => {
    // 'interrupted' / 'canceled' fires on speechSynthesis.cancel() — not a real error
    if (e.error !== 'interrupted' && e.error !== 'canceled' && hubSpeechState === 'playing') {
      hubSpeechIndex++;
      hubSpeakNextChunk();
    }
  };

  speechSynthesis.speak(u);
}

// Some browsers load voices asynchronously; prime the list so hubPickVoice
// has something to work with on the first click, and refresh the picker
// dropdown once voices finish loading.
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => {
    try { hubPopulateVoiceList(); } catch(_) { /* panel not in DOM yet */ }
  };
}

// Stop speech when the user switches lessons or leaves the module view.
// Uses capture-phase listener so it fires before goPage() handlers.
document.addEventListener('click', (e) => {
  if (hubSpeechState === 'stopped') return;
  const t = e.target;
  if (t.closest && (
      t.closest('[onclick*="goPage"]') ||
      t.closest('.tab-strip') ||
      t.closest('.sb-btn') ||
      t.closest('.hdr-back')
  )) {
    hubStopListen();
  }
}, true);
window.addEventListener('beforeunload', hubStopListen);

}

(function(){
  const resizer=document.getElementById('sidebarResizer');
  const sidebar=document.getElementById('hubSidebar');
  const main=sidebar&&sidebar.closest('.main');
  if(!resizer||!sidebar||!main)return;
  const KEY='aesop-electives-sidebar-w',MIN=200,MAX=600;
  const saved=parseInt(localStorage.getItem(KEY));
  if(saved&&saved>=MIN&&saved<=MAX){sidebar.style.width=saved+'px';main.style.gridTemplateColumns=saved+'px 8px 1fr';}
  let dragging=false,startX=0,startW=0;
  function startDrag(x){dragging=true;startX=x;startW=sidebar.offsetWidth;resizer.classList.add('dragging');document.body.style.cursor='col-resize';document.body.style.userSelect='none';}
  function onMove(x){if(!dragging)return;const w=Math.min(MAX,Math.max(MIN,startW+(x-startX)));sidebar.style.width=w+'px';main.style.gridTemplateColumns=w+'px 8px 1fr';}
  function endDrag(){if(!dragging)return;dragging=false;resizer.classList.remove('dragging');document.body.style.cursor='';document.body.style.userSelect='';localStorage.setItem(KEY,sidebar.offsetWidth);}
  resizer.addEventListener('mousedown',e=>{e.preventDefault();startDrag(e.clientX);});
  document.addEventListener('mousemove',e=>onMove(e.clientX));
  document.addEventListener('mouseup',endDrag);
  resizer.addEventListener('touchstart',e=>{startDrag(e.touches[0].clientX);},{passive:true});
  document.addEventListener('touchmove',e=>{if(dragging)e.preventDefault();onMove(e.touches[0].clientX);},{passive:false});
  document.addEventListener('touchend',endDrag);
})();
