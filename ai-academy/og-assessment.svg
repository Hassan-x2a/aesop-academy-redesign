<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1929"/>
      <stop offset="100%" stop-color="#16293d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3dd6c0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3dd6c0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#c9a05a"/>
      <stop offset="80%" stop-color="#c9a05a"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle teal glow top-left -->
  <ellipse cx="160" cy="200" rx="340" ry="260" fill="url(#glow)"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1a2f45" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1a2f45" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#1a2f45" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#1a2f45" stroke-width="1"/>

  <!-- Gold top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#goldLine)"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="3" height="270" fill="#3dd6c0" opacity="0.7"/>

  <!-- AESOP wordmark -->
  <text x="104" y="232" font-family="Georgia, serif" font-size="22" font-weight="700"
        letter-spacing="0.22em" fill="#c9a05a" opacity="0.9">AESOP</text>
  <text x="104" y="258" font-family="Georgia, serif" font-size="14" font-style="italic"
        letter-spacing="0.08em" fill="rgba(201,160,90,0.55)">AI Academy</text>

  <!-- Divider -->
  <rect x="104" y="274" width="520" height="1" fill="rgba(201,160,90,0.2)"/>

  <!-- Main headline -->
  <text x="104" y="348" font-family="Georgia, serif" font-size="62" font-weight="600"
        font-style="italic" fill="#ffffff" letter-spacing="-0.01em">AI Learning</text>
  <text x="104" y="418" font-family="Georgia, serif" font-size="62" font-weight="600"
        font-style="italic" fill="#ffffff" letter-spacing="-0.01em">Assessment</text>

  <!-- Tagline -->
  <text x="106" y="466" font-family="'Nunito Sans', Arial, sans-serif" font-size="20"
        font-weight="600" letter-spacing="0.04em" fill="rgba(255,255,255,0.45)">FIND YOUR LEARNING PATH</text>

  <!-- Right panel — path icons -->
  <!-- Circle ring -->
  <circle cx="940" cy="315" r="190" fill="none" stroke="rgba(61,214,192,0.08)" stroke-width="1"/>
  <circle cx="940" cy="315" r="150" fill="none" stroke="rgba(61,214,192,0.06)" stroke-width="1"/>
  <circle cx="940" cy="315" r="110" fill="none" stroke="rgba(201,160,90,0.12)" stroke-width="1"/>

  <!-- Central icon background -->
  <circle cx="940" cy="315" r="72" fill="rgba(61,214,192,0.07)" stroke="rgba(61,214,192,0.25)" stroke-width="1.5"/>

  <!-- Path fork icon (simplified) -->
  <!-- Stem -->
  <line x1="940" y1="360" x2="940" y2="300" stroke="#3dd6c0" stroke-width="3" stroke-linecap="round"/>
  <!-- Left branch -->
  <line x1="940" y1="300" x2="910" y2="268" stroke="#c9a05a" stroke-width="3" stroke-linecap="round"/>
  <!-- Right branch -->
  <line x1="940" y1="300" x2="970" y2="268" stroke="#c9a05a" stroke-width="3" stroke-linecap="round"/>
  <!-- Left arrowhead -->
  <polyline points="903,276 910,268 918,272" fill="none" stroke="#c9a05a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right arrowhead -->
  <polyline points="963,272 970,268 977,276" fill="none" stroke="#c9a05a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dot nodes on outer ring -->
  <circle cx="940" cy="125" r="5" fill="#3dd6c0" opacity="0.6"/>
  <circle cx="1113" cy="215" r="4" fill="#c9a05a" opacity="0.5"/>
  <circle cx="1113" cy="415" r="4" fill="#3dd6c0" opacity="0.4"/>
  <circle cx="940" cy="505" r="5" fill="#c9a05a" opacity="0.5"/>
  <circle cx="767" cy="415" r="4" fill="#3dd6c0" opacity="0.4"/>
  <circle cx="767" cy="215" r="4" fill="#c9a05a" opacity="0.5"/>

  <!-- Bottom gold rule -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#goldLine)"/>
</svg>
