<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#061410"/>
      <stop offset="100%" stop-color="#0c2018"/>
    </linearGradient>
    <linearGradient id="green9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#28c840"/>
    </linearGradient>
    <linearGradient id="teal9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3dd6c0"/>
      <stop offset="100%" stop-color="#26b8a6"/>
    </linearGradient>
    <filter id="glow9">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="160" height="160" rx="20" fill="url(#bg9)"/>
  <!-- Outer hex ring -->
  <polygon points="80,14 118,36 118,80 80,102 42,80 42,36"
    fill="rgba(61,214,192,0.05)" stroke="url(#teal9)" stroke-width="2" filter="url(#glow9)" opacity="0.7"/>
  <!-- Circuit traces on hex -->
  <line x1="80" y1="14" x2="80" y2="24" stroke="#3dd6c0" stroke-width="1.5" opacity="0.5"/>
  <line x1="118" y1="36" x2="110" y2="41" stroke="#3dd6c0" stroke-width="1.5" opacity="0.5"/>
  <line x1="118" y1="80" x2="110" y2="75" stroke="#3dd6c0" stroke-width="1.5" opacity="0.5"/>
  <line x1="42" y1="36" x2="50" y2="41" stroke="#3dd6c0" stroke-width="1.5" opacity="0.5"/>
  <line x1="42" y1="80" x2="50" y2="75" stroke="#3dd6c0" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="102" x2="80" y2="92" stroke="#3dd6c0" stroke-width="1.5" opacity="0.5"/>
  <!-- Shield body -->
  <path d="M80,28 L106,42 L106,72 Q106,92 80,102 Q54,92 54,72 L54,42 Z"
    fill="rgba(63,185,80,0.1)" stroke="url(#green9)" stroke-width="2.5" filter="url(#glow9)"/>
  <!-- Circuit lines inside shield -->
  <line x1="68" y1="55" x2="92" y2="55" stroke="rgba(63,185,80,0.3)" stroke-width="1"/>
  <line x1="65" y1="65" x2="95" y2="65" stroke="rgba(63,185,80,0.25)" stroke-width="1"/>
  <circle cx="68" cy="55" r="2" fill="#3fb950" opacity="0.5"/>
  <circle cx="92" cy="55" r="2" fill="#3fb950" opacity="0.5"/>
  <circle cx="65" cy="65" r="2" fill="#3fb950" opacity="0.4"/>
  <!-- Checkmark -->
  <path d="M64,70 L75,82 L98,54" fill="none" stroke="url(#green9)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow9)"/>
  <!-- Bottom panel: status indicators -->
  <rect x="30" y="116" width="100" height="30" rx="8" fill="rgba(63,185,80,0.07)" stroke="rgba(63,185,80,0.2)" stroke-width="1"/>
  <circle cx="48" cy="131" r="5" fill="#3fb950" filter="url(#glow9)" opacity="0.9"/>
  <circle cx="66" cy="131" r="5" fill="#3fb950" filter="url(#glow9)" opacity="0.9"/>
  <circle cx="84" cy="131" r="5" fill="#3fb950" filter="url(#glow9)" opacity="0.9"/>
  <circle cx="102" cy="131" r="5" fill="#febc2e" filter="url(#glow9)" opacity="0.8"/>
  <circle cx="120" cy="131" r="5" fill="rgba(255,255,255,0.15)"/>
  <text x="80" y="149" font-family="monospace" font-size="6" fill="rgba(63,185,80,0.6)" text-anchor="middle" letter-spacing="0.1em">SAFETY CHECKS</text>
</svg>
