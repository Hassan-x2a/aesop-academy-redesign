<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06100e"/>
      <stop offset="100%" stop-color="#0c1e18"/>
    </linearGradient>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="160" height="160" rx="20" fill="url(#bg8)"/>
  <!-- 3D axes -->
  <g stroke-width="2" stroke-linecap="round">
    <!-- X axis (right) -->
    <line x1="55" y1="105" x2="140" y2="105" stroke="#c9a05a" opacity="0.7"/>
    <polygon points="140,105 132,101 132,109" fill="#c9a05a" opacity="0.7"/>
    <!-- Y axis (up) -->
    <line x1="55" y1="105" x2="55" y2="20" stroke="#3dd6c0" opacity="0.7"/>
    <polygon points="55,20 51,28 59,28" fill="#3dd6c0" opacity="0.7"/>
    <!-- Z axis (diagonal down-left) -->
    <line x1="55" y1="105" x2="20" y2="140" stroke="#bc8cff" opacity="0.6"/>
    <polygon points="20,140 26,132 32,138" fill="#bc8cff" opacity="0.6"/>
  </g>
  <!-- Axis labels -->
  <text x="143" y="109" font-family="monospace" font-size="9" fill="#c9a05a" opacity="0.7">x</text>
  <text x="50" y="17" font-family="monospace" font-size="9" fill="#3dd6c0" opacity="0.7">y</text>
  <text x="13" y="145" font-family="monospace" font-size="9" fill="#bc8cff" opacity="0.6">z</text>
  <!-- Cluster 1: teal dots (top-right area) -->
  <circle cx="110" cy="38" r="5.5" fill="#3dd6c0" filter="url(#glow8)" opacity="0.9"/>
  <circle cx="125" cy="52" r="4" fill="#3dd6c0" filter="url(#glow8)" opacity="0.8"/>
  <circle cx="98" cy="50" r="3.5" fill="#3dd6c0" filter="url(#glow8)" opacity="0.7"/>
  <circle cx="118" cy="65" r="3" fill="#3dd6c0" opacity="0.5"/>
  <circle cx="105" cy="62" r="2.5" fill="#3dd6c0" opacity="0.45"/>
  <!-- Cluster 2: gold dots (middle-right) -->
  <circle cx="115" cy="82" r="5" fill="#c9a05a" filter="url(#glow8)" opacity="0.9"/>
  <circle cx="130" cy="72" r="3.5" fill="#c9a05a" filter="url(#glow8)" opacity="0.75"/>
  <circle cx="122" cy="95" r="3" fill="#c9a05a" opacity="0.6"/>
  <circle cx="136" cy="86" r="2.5" fill="#c9a05a" opacity="0.5"/>
  <!-- Cluster 3: purple dots (left area) -->
  <circle cx="68" cy="55" r="5" fill="#bc8cff" filter="url(#glow8)" opacity="0.85"/>
  <circle cx="82" cy="45" r="3.5" fill="#bc8cff" filter="url(#glow8)" opacity="0.7"/>
  <circle cx="75" cy="68" r="3" fill="#bc8cff" opacity="0.6"/>
  <circle cx="62" cy="72" r="2.5" fill="#bc8cff" opacity="0.45"/>
  <!-- Faint connections within clusters -->
  <line x1="110" y1="38" x2="125" y2="52" stroke="#3dd6c0" stroke-width="0.8" opacity="0.25"/>
  <line x1="110" y1="38" x2="98" y2="50" stroke="#3dd6c0" stroke-width="0.8" opacity="0.2"/>
  <line x1="115" y1="82" x2="130" y2="72" stroke="#c9a05a" stroke-width="0.8" opacity="0.25"/>
  <line x1="68" y1="55" x2="82" y2="45" stroke="#bc8cff" stroke-width="0.8" opacity="0.2"/>
  <!-- Grid marks on axes -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="80" y1="102" x2="80" y2="108"/><line x1="105" y1="102" x2="105" y2="108"/><line x1="130" y1="102" x2="130" y2="108"/>
    <line x1="52" y1="80" x2="58" y2="80"/><line x1="52" y1="55" x2="58" y2="55"/><line x1="52" y1="30" x2="58" y2="30"/>
  </g>
</svg>
