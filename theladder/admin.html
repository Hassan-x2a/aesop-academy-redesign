<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_32.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/favicon_512.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concept Requests - AESOP Admin</title>
  <meta name="description" content="Admin review queue for Ladder concept requests.">
  <script>
    if (localStorage.getItem('aesop-theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  </script>
  <link rel="stylesheet" href="/academy-theme.css?v=2">
  <link rel="stylesheet" href="/academy-dark-mode.css?v=2">
  <style>
    :root {
      --ladder-bg: #f5f1e8;
      --ladder-panel: #ffffff;
      --ladder-line: #ded4c5;
      --ladder-soft: #f0e8dc;
      --ladder-ink: #18283a;
      --ladder-muted: #62717f;
      --ladder-good: #735f9e;
      --ladder-focus: #c9a05a;
    }

    [data-theme="dark"] {
      --ladder-bg: #0f1923;
      --ladder-panel: #172331;
      --ladder-line: #304252;
      --ladder-soft: #203242;
      --ladder-ink: #e8e3db;
      --ladder-muted: #b7c0c8;
      --ladder-good: #bda7ff;
      --ladder-focus: #dbb87a;
    }

    body {
      background: var(--ladder-bg);
      color: var(--ladder-ink);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      padding: 2rem 1rem;
    }

    .admin-container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .admin-header {
      margin-bottom: 2rem;
    }

    .admin-header h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
    }

    .admin-header p {
      color: var(--ladder-muted);
      margin: 0;
    }

    .concept-request-queue {
      display: grid;
      gap: 1rem;
    }

    .concept-request-card {
      background: var(--ladder-panel);
      border: 1px solid var(--ladder-line);
      border-radius: 8px;
      padding: 1.5rem;
      display: grid;
      gap: 1rem;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 1rem;
    }

    .card-title {
      flex: 1;
    }

    .card-title h3 {
      margin: 0 0 0.25rem;
      font-size: 1.25rem;
    }

    .card-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.85rem;
      color: var(--ladder-muted);
    }

    .card-meta span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .card-status {
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .status-requested {
      background: #fff3cd;
      color: #856404;
    }

    .status-approved {
      background: #d1ecf1;
      color: #0c5460;
    }

    .status-rejected {
      background: #f8d7da;
      color: #721c24;
    }

    .card-description {
      color: var(--ladder-ink);
      line-height: 1.6;
      padding: 1rem;
      background: var(--ladder-soft);
      border-radius: 4px;
    }

    .card-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary {
      background: var(--ladder-good);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.85;
    }

    .btn-secondary {
      background: var(--ladder-soft);
      color: var(--ladder-ink);
      border: 1px solid var(--ladder-line);
    }

    .btn-secondary:hover {
      background: var(--ladder-line);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--ladder-muted);
    }

    .empty-state h2 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
    }

    .filter-controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-controls select {
      padding: 0.6rem;
      border: 1px solid var(--ladder-line);
      border-radius: 4px;
      background: var(--ladder-panel);
      color: var(--ladder-ink);
    }

    .auth-error {
      background: #ffebee;
      color: #c62828;
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 2rem;
      border-left: 4px solid #f44336;
    }

    .back-link {
      color: var(--ladder-good);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 1rem;
      display: inline-block;
    }

    .back-link:hover {
      color: var(--ladder-focus);
    }

    [data-theme="dark"] .concept-request-card {
      background: var(--ladder-panel);
      border-color: var(--ladder-line);
    }

    [data-theme="dark"] .status-requested {
      background: #664d03;
      color: #ffecb5;
    }

    [data-theme="dark"] .status-approved {
      background: #055160;
      color: #cff4fc;
    }

    [data-theme="dark"] .status-rejected {
      background: #842029;
      color: #f8d7da;
    }

    [data-theme="dark"] .card-description {
      background: var(--ladder-soft);
      color: var(--ladder-ink);
    }

    [data-theme="dark"] .btn-secondary {
      background: var(--ladder-soft);
      color: var(--ladder-ink);
      border-color: var(--ladder-line);
    }

    [data-theme="dark"] .btn-secondary:hover {
      background: var(--ladder-line);
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <a href="/theladder/" class="back-link">← Back to The Ladder</a>

    <div class="admin-header">
      <h1>Concept Requests</h1>
      <p>Review and approve new concept suggestions for The Ladder.</p>
    </div>

    <div id="authError" class="auth-error" hidden></div>

    <div class="filter-controls">
      <label>
        <span>Filter by status:</span>
        <select id="statusFilter">
          <option value="all">All requests</option>
          <option value="requested">Requested</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </label>
      <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
    </div>

    <div id="requestsContainer" class="concept-request-queue">
      <p style="color: var(--ladder-muted); text-align: center;">Loading requests...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, collection, query, onSnapshot, updateDoc, doc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { FIREBASE_CONFIG } from '/ai-academy/js/firebase-config.js';

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAIL = 'scott@aesopacademy.org';
    let currentUser = null;
    let allRequests = [];

    const el = {
      authError: document.getElementById('authError'),
      statusFilter: document.getElementById('statusFilter'),
      refreshBtn: document.getElementById('refreshBtn'),
      requestsContainer: document.getElementById('requestsContainer')
    };

    // Check authentication
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (!user) {
        showAuthError('Please sign in to view the admin queue.');
        return;
      }

      if (user.email !== ADMIN_EMAIL) {
        showAuthError(`Only ${ADMIN_EMAIL} can access this page.`);
        return;
      }

      el.authError.hidden = true;
      loadRequests();
    });

    function showAuthError(message) {
      el.authError.textContent = message;
      el.authError.hidden = false;
      el.requestsContainer.innerHTML = '';
    }

    function loadRequests() {
      try {
        const requestsRef = collection(db, 'conceptRequests');
        const q = query(requestsRef);

        onSnapshot(q, (snapshot) => {
          allRequests = [];
          snapshot.forEach((doc) => {
            allRequests.push({ id: doc.id, ...doc.data() });
          });
          renderRequests();
        });
      } catch (error) {
        console.error('Error loading requests:', error);
        el.requestsContainer.innerHTML = '<p style="color: red;">Error loading requests</p>';
      }
    }

    function renderRequests() {
      const statusFilter = el.statusFilter.value;
      const filtered = statusFilter === 'all'
        ? allRequests
        : allRequests.filter(r => r.status === statusFilter);

      if (filtered.length === 0) {
        el.requestsContainer.innerHTML = `
          <div class="empty-state">
            <h2>No requests</h2>
            <p>There are no ${statusFilter === 'all' ? '' : statusFilter + ' '}concept requests yet.</p>
          </div>
        `;
        return;
      }

      el.requestsContainer.innerHTML = filtered.map(request => `
        <div class="concept-request-card" data-id="${request.id}">
          <div class="card-header">
            <div class="card-title">
              <h3>${escapeHtml(request.conceptName)}</h3>
              <div class="card-meta">
                <span>📅 ${formatDate(request.createdAt?.toDate?.() || new Date(request.createdAt))}</span>
                <span>👤 ${escapeHtml(request.learnerId || 'Unknown')}</span>
              </div>
            </div>
            <span class="card-status status-${request.status}">${request.status}</span>
          </div>
          <div class="card-description">
            ${escapeHtml(request.description)}
          </div>
          <div class="card-actions">
            ${request.status === 'requested' ? `
              <button class="btn btn-primary" onclick="approveRequest('${request.id}')">
                ✓ Approve & Build
              </button>
              <button class="btn btn-secondary" onclick="rejectRequest('${request.id}')">
                ✗ Reject
              </button>
            ` : ''}
            ${request.status === 'approved' ? `
              <button class="btn btn-secondary" onclick="buildConcept('${request.id}')">
                🔨 Build Now
              </button>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    window.approveRequest = async (requestId) => {
      try {
        const requestRef = doc(db, 'conceptRequests', requestId);
        await updateDoc(requestRef, {
          status: 'approved',
          updatedAt: new Date(),
          updatedAtIso: new Date().toISOString(),
          approvedAt: new Date(),
          approvedAtIso: new Date().toISOString()
        });
        alert('Concept approved! It will be built and added to The Ladder soon.');
      } catch (error) {
        console.error('Error approving request:', error);
        alert('Error approving request');
      }
    };

    window.rejectRequest = async (requestId) => {
      const reason = prompt('Reason for rejection (optional):');
      try {
        const requestRef = doc(db, 'conceptRequests', requestId);
        await updateDoc(requestRef, {
          status: 'rejected',
          rejectionReason: reason || '',
          updatedAt: new Date(),
          updatedAtIso: new Date().toISOString(),
          rejectedAt: new Date(),
          rejectedAtIso: new Date().toISOString()
        });
      } catch (error) {
        console.error('Error rejecting request:', error);
        alert('Error rejecting request');
      }
    };

    window.buildConcept = async (requestId) => {
      const request = allRequests.find(r => r.id === requestId);
      if (!request) return;

      try {
        const requestRef = doc(db, 'conceptRequests', requestId);
        await updateDoc(requestRef, {
          status: 'built',
          builtAt: new Date(),
          builtAtIso: new Date().toISOString(),
          updatedAt: new Date(),
          updatedAtIso: new Date().toISOString()
        });
        alert(`Concept "${request.conceptName}" built and added to The Ladder!`);
      } catch (error) {
        console.error('Error building concept:', error);
        alert('Error building concept');
      }
    };

    el.statusFilter.addEventListener('change', renderRequests);
    el.refreshBtn.addEventListener('click', () => {
      // Firebase listener auto-refreshes, but manual click feedback
      alert('Refreshed! (Data updates automatically.)');
    });

    function formatDate(date) {
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }
  </script>
</body>
</html>
