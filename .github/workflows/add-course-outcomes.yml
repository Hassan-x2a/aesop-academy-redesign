name: Add Course Outcomes Block (one-time)

# Manually-triggered workflow that adds a "By the end of this course"
# learner-outcomes block to every course's intro page (m1.html), based
# on the course's title, narrative, and module list. Idempotent — files
# that already have the block are skipped.
#
# Cost: ~$0.005 per course × ~115 courses ≈ $0.60.
#
# To run from the GitHub UI:
#   Actions → "Add Course Outcomes Block (one-time)" → Run workflow
#     apply=true   (default — actually writes)
#     apply=false  (dry-run, prints cost estimate only)
#     slug=<slug>  (optional — process only one course)
#     limit=<N>    (optional — cap total courses processed)

on: {}

jobs:
  add-outcomes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN || secrets.AESOP_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic }}
        run: |
          ARGS=""
          if [ "${{ inputs.apply }}" = "true" ]; then ARGS="$ARGS --apply"; fi
          if [ -n "${{ inputs.slug }}" ]; then ARGS="$ARGS --slug ${{ inputs.slug }}"; fi
          if [ "${{ inputs.limit }}" != "0" ] && [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi
          python .github/scripts/add_course_outcomes.py $ARGS

      - name: Commit updated intro pages (if anything changed)
        # IMPORTANT: always() so partial successes commit even when one
        # course fails. Same lesson learned from the drafts backfill.
        if: ${{ always() && inputs.apply == 'true' }}
        run: |
          git config user.name "Course Outcomes Bot"
          git config user.email "bot@aesopacademy.org"
          git add ai-academy/modules/*/[a-z]*-m1.html || true
          if git diff --staged --quiet; then
            echo "No intro-page changes to commit."
            exit 0
          fi
          git commit -m "Course outcomes: add 'By the End' learner block to course intro pages"
          # -X theirs so the bot's just-written block wins any rebase
          # conflict against parallel pushes to main.
          git pull --rebase -X theirs origin main
          git push
