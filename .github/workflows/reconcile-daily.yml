name: Daily Reconcile (safety net)

# Runs reconcile_all.py once per day, regardless of pushes, so any
# drift introduced by ad-hoc commits, manual edits in the GitHub web
# UI, or any other process that mutates ai-academy/* without going
# through the autopatch path gets corrected within 24h at most.
#
# This is the same script that register-courses.yml runs on every push
# touching ai-academy/modules/**/*.html. The cron just makes sure the
# pipeline runs even on quiet days. Manual workflow_dispatch is also
# allowed for one-off triggers.

on: {}

jobs:
  reconcile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN || secrets.AESOP_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run reconcile_all
        run: python .github/scripts/reconcile_all.py --apply

      - name: Commit reconciliation drift fixes (if any)
        # always() so partial successes still commit; same pattern as
        # backfill-drafts.yml. -X theirs on rebase so the bot's writes
        # win parallel-push conflicts on courses.html etc.
        if: ${{ always() }}
        run: |
          git config user.name "Daily Reconcile Bot"
          git config user.email "bot@aesopacademy.org"
          git add \
            ai-academy/courses.html \
            ai-academy/modules/courses-data.json \
            ai-academy/modules/course-registry.json \
            ai-academy/dashboard.html \
            stats.json \
            aip/registration-report.json
          for f in i18n/courses.*.json; do git add "$f"; done
          if git diff --staged --quiet; then
            echo "No drift to correct today."
            exit 0
          fi
          git commit -m "Daily reconcile: correct drift across UI surfaces"
          git pull --rebase -X theirs origin main
          git push
