name: Build AI News HTML

# Runs ai-news/build-articles.py whenever a JSON article is added or
# changed under ai-news/articles/. Auto-commits any new/updated HTML
# alongside the JSON. Closes the loop for the Daily AI News Claude
# Routine, which writes JSON only.
#
# NOTE: The push trigger misses commits made by other GitHub Actions
# workflows (GITHUB_TOKEN commits don't cascade). The schedule below
# runs every morning to catch any JSON files that the push trigger
# didn't pick up. build-articles.py is idempotent — rebuilding
# existing HTML is harmless.

on: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # A PAT is needed so the commit we make here re-triggers
          # Pages deploy; the default GITHUB_TOKEN cannot. Use a repo
          # secret named AESOP_PAT (fine-grained, contents:write).
          token: ${{ secrets.AESOP_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build article HTML from JSON
        run: python ai-news/build-articles.py

      - name: Commit generated HTML if changed
        env:
          GIT_AUTHOR_NAME: aesop-bot
          GIT_AUTHOR_EMAIL: bot@aesopacademy.org
          GIT_COMMITTER_NAME: aesop-bot
          GIT_COMMITTER_EMAIL: bot@aesopacademy.org
        run: |
          git add ai-news/articles/*.html
          if git diff --cached --quiet; then
            echo "No HTML changes to commit."
            exit 0
          fi
          # No [skip ci] tag — we WANT deploy.yml to run after this so the
          # generated HTML reaches Mocahost. The build only fires on JSON
          # changes (paths filter) and HTML files don't match it, so this
          # commit cannot retrigger build-news-html itself: no loop risk.
          git commit -m "News: build article HTML"
          git push origin HEAD:main
