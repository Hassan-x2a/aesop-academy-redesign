name: Register Unregistered Courses

on: {}

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Reconcile every UI surface to disk truth
        # Orchestrates per-surface reconcilers in dependency order.
        # Replaces the legacy add_course.py --apply, which was
        # append-only and was the source of the drift we repeatedly
        # had to clean up manually. reconcile_all.py is idempotent
        # and driven by disk-folder presence as the source of truth.
        run: python .github/scripts/reconcile_all.py --apply

      - name: Commit reconciliation changes (if any)
        run: |
          git config user.name "Course Registration Bot"
          git config user.email "bot@aesopacademy.org"
          git add \
            ai-academy/courses.html \
            ai-academy/modules/courses-data.json \
            ai-academy/modules/course-registry.json \
            ai-academy/dashboard.html \
            stats.json \
            aip/registration-report.json
          for f in i18n/courses.*.json; do git add "$f"; done
          git diff --staged --quiet && echo "Nothing to commit." || (
            git commit -m "Auto-reconcile: sync all surfaces to disk truth"
            git pull --rebase -X theirs origin main
            git push
          )

      - name: Run course audit
        # Continue even if audit finds issues — we still want the notification
        continue-on-error: true
        run: python .github/scripts/audit_courses.py

      - name: Commit audit report
        run: |
          git add aip/audit-report.md || true
          git diff --staged --quiet && echo "No audit report changes." || (
            git commit -m "Auto-audit: update course audit report"
            git pull --rebase origin main
            git push
          )

      - name: Send registration notification
        # Non-fatal — email failures should never fail the whole workflow
        continue-on-error: true
        env:
          BREVO_SMTP_KEY:  ${{ secrets.BREVO_SMTP_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
        run: python .github/scripts/notify_registration.py
