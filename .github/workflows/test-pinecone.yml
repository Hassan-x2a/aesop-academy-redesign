name: AIP Pinecone Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pinecone requests

      - name: Test Pinecone connection
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.pinecone }}
          PINECONE_HOST: https://aesop-academy-sqe0vz2.svc.aped-4627-b74a.pinecone.io
        run: python .github/scripts/test-pinecone.py
