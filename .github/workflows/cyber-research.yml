name: Cybersecurity Research Agent

on: {}

jobs:
  cyber-research:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic pinecone requests "urllib3<2"

      - name: Run Cybersecurity Research Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.pinecone }}
          PINECONE_HOST: https://aesop-academy-sqe0vz2.svc.aped-4627-b74a.pinecone.io
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python .github/scripts/cyber_research_agent.py

      - name: Rebuild Cybersecurity draft index
        run: python .github/scripts/rebuild_index.py aip/cyber-drafts

      - name: Commit Cybersecurity draft proposals
        run: |
          git config user.name "Cybersecurity Research Agent"
          git config user.email "cyber-agent@aesopacademy.org"
          git add aip/cyber-drafts/
          git diff --staged --quiet || git commit -m "Cyber AIP: $(date '+%Y-%m-%d') cybersecurity course draft proposals"
          git pull --rebase origin main
          git push || (sleep 10 && git pull --rebase origin main && git push)

      - name: Notify on failure
        if: failure() || cancelled()
        env:
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python .github/scripts/notify_failure.py
