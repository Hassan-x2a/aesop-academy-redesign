name: Sync Live Status

# Runs whenever course-registry.json or courses-data.json changes.
# Finds any course that is status:live in the registry but live:false (or
# missing) in courses-data, and flips it — provided the module folder exists
# on disk. Commits and pushes the fix automatically.
#
# This is the safety net for cases where activation happens outside the
# mod-gen UI (direct registry edits, batch scripts, etc.).

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Sync live status between registry and courses-data
        id: sync
        run: |
          python3 - <<'PYEOF'
          import json, os

          SKIP = {'ar-11', 'society'}  # stubs with no module folder

          with open('ai-academy/modules/course-registry.json', encoding='utf-8') as f:
              registry = json.load(f)
          with open('ai-academy/modules/courses-data.json', encoding='utf-8') as f:
              cdata = json.load(f)

          registry_live = {
              k for k, v in registry.items()
              if not k.startswith('_') and isinstance(v, dict) and v.get('status') == 'live'
          }

          mod_root = 'ai-academy/modules'
          disk_folders = {
              d for d in os.listdir(mod_root)
              if os.path.isdir(os.path.join(mod_root, d)) and not d.startswith('.')
          }

          fixed = []
          for course in cdata.get('courses', []):
              cid = course['id']
              if cid in SKIP:
                  continue
              if cid in registry_live and not course.get('live') and cid in disk_folders:
                  course['live'] = True
                  fixed.append(cid)

          if fixed:
              with open('ai-academy/modules/courses-data.json', 'w', encoding='utf-8') as f:
                  json.dump(cdata, f, ensure_ascii=False, indent=2)
              print(f'Fixed {len(fixed)} courses: {", ".join(sorted(fixed))}')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as gh:
                  gh.write('changed=true\n')
                  gh.write(f'summary=Synced live:true for {len(fixed)} course(s): {", ".join(sorted(fixed))}\n')
          else:
              print('No drift found — registry and courses-data are in sync.')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as gh:
                  gh.write('changed=false\n')
          PYEOF

      - name: Commit sync fix
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-academy/modules/courses-data.json
          git commit -m "chore: auto-sync live status from registry to courses-data

          ${{ steps.sync.outputs.summary }}"
          git push
