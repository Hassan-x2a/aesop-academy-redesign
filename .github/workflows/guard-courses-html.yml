name: Guard courses.html

# Defensive sanity check that runs on every push and pull request.
# Compares the new ai-academy/courses.html against its prior version
# and fails the workflow if the new one looks like a stale-working-tree
# clobber rather than a legitimate edit (e.g. >2 mega-cat sections lost,
# >15 nav buttons lost, file shrunk >25%, etc.).
#
# Bypass: include the literal token `[skip-courses-guard]` anywhere in
# the commit message (or set the COURSES_GUARD_SKIP=1 env var) when
# you are intentionally shrinking the file.
#
# This workflow does not modify the repo (read-only permissions). It
# either passes silently or fails loudly; either way it doesn't block
# deploys-to-prod by itself — each downstream workflow decides whether
# to depend on this guard via `needs:`.

on:
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo (need depth ≥ 2 to read prior commit)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run guard (push)
        if: github.event_name == 'push'
        run: |
          # Walk back from HEAD to find the most recent commit that
          # actually touched ai-academy/courses.html. Comparing against
          # raw HEAD~1 produces noise on commits that didn't touch the
          # file at all.
          PREV=$(git log --format='%H' -n 2 -- ai-academy/courses.html | tail -n1)
          if [ -z "$PREV" ] || [ "$PREV" = "$(git rev-parse HEAD)" ]; then
            echo "INFO: no prior commit on courses.html — first commit ever, skipping."
            exit 0
          fi
          echo "Comparing $PREV → ${GITHUB_SHA}"
          python .github/scripts/check_courses_html_sanity.py \
            --old-rev "$PREV" \
            --new-rev "${GITHUB_SHA}"

      - name: Run guard (pull_request)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Comparing PR base $BASE_SHA → head $HEAD_SHA"
          python .github/scripts/check_courses_html_sanity.py \
            --old-rev "$BASE_SHA" \
            --new-rev "$HEAD_SHA"
