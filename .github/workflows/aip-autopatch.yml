name: AIP Auto-Patch courses.html

on: {}

jobs:
  autopatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate approved drafts conform to current schema
        # Currently --warn-only: prints failures but always exits 0 so
        # the autopatch chain isn't blocked by legacy drafts. Drop
        # --warn-only to make this a hard gate once the backfill has
        # completed and all approved Professional drafts conform.
        run: python .github/scripts/validate_draft_schema.py --drafts-dir aip/drafts --audience Professional --warn-only

      - name: Run AIP auto-patch
        run: python .github/scripts/aip_autopatch.py --drafts-dir aip/drafts --category Professional

      - name: Rebuild draft index
        run: |
          python3 -c "
          import os, json
          d = 'aip/drafts'
          files = sorted(f for f in os.listdir(d) if f.endswith('.json') and f != 'index.json')
          with open(os.path.join(d, 'index.json'), 'w') as fp:
              json.dump(files, fp, indent=2)
          "

      - name: Commit patched files
        run: |
          git config user.name "AIP Auto-Patch"
          git config user.email "aip-agent@aesopacademy.org"
          git add ai-academy/courses.html ai-academy/modules/courses-data.json aip/drafts/index.json
          git diff --staged --quiet || git commit -m "AIP: auto-patch courses.html + courses-data.json with approved drafts"
          git pull --no-rebase origin main
          git push
