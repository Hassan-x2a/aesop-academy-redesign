name: Build Trend Data

# Collects signals from HN, GitHub, RSS, and Stack Overflow, then calls
# Claude Haiku to cluster and score them. Writes ai-news/trend-data.json
# and commits it so deploy.yml pushes it to cPanel.
#
# Runs at 08:00 UTC — two hours before build-news-html at 10:00 UTC,
# so the Signal Desk is always fresh when the article build fires.
#
# Commits from this workflow use AESOP_PAT (fine-grained, contents:write)
# so the push re-triggers the Pages/cPanel deploy. Falls back to the
# default GITHUB_TOKEN if the secret is absent (deploy won't cascade).

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:        # "Run workflow" button for manual scans

concurrency:
  group: build-trend-data
  cancel-in-progress: false  # never cancel a running scan mid-write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AESOP_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests "urllib3<2"

      - name: Run trend scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python .github/scripts/build_trend_data.py

      - name: Commit trend-data.json if changed
        env:
          GIT_AUTHOR_NAME: aesop-bot
          GIT_AUTHOR_EMAIL: bot@aesopacademy.org
          GIT_COMMITTER_NAME: aesop-bot
          GIT_COMMITTER_EMAIL: bot@aesopacademy.org
        run: |
          git add ai-news/trend-data.json
          if git diff --cached --quiet; then
            echo "No trend data changes — skipping commit."
            exit 0
          fi
          git commit -m "Trends: daily signal scan $(date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Notify on failure
        if: failure() || cancelled()
        env:
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python .github/scripts/notify_failure.py
