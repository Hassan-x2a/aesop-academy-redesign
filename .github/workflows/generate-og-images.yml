name: Generate OG Images

# Runs whenever a course goes live (registry or courses-data changes).
# Generates 1200x630 PNG cards for every live course.
# Output committed to assets/og/courses/ and deployed with the next FTP push.

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Install system fonts
        run: sudo apt-get install -y -qq fonts-liberation

      - name: Install Python dependencies
        run: pip install --quiet pillow

      - name: Generate OG images
        run: python .github/scripts/generate_og_images.py

      - name: Commit generated images
        run: |
          git config user.name  "OG Image Bot"
          git config user.email "bot@aesopacademy.org"
          git add assets/og/courses/
          git diff --staged --quiet && echo "No new images — all up to date." || (
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "chore: auto-generate OG images ($COUNT course cards)"
            git pull --rebase -X theirs origin main
            git push
          )
