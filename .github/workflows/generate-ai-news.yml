name: Generate AI News Articles

on: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AESOP_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests "urllib3<2"

      - name: Generate article JSON
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          args=()
          if [ -n "${{ inputs.date }}" ]; then
            args+=(--date "${{ inputs.date }}")
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            args+=(--force)
          fi
          python .github/scripts/generate_ai_news_articles.py "${args[@]}"

      - name: Build article HTML
        run: python ai-news/build-articles.py

      - name: Commit generated news
        env:
          GIT_AUTHOR_NAME: aesop-bot
          GIT_AUTHOR_EMAIL: bot@aesopacademy.org
          GIT_COMMITTER_NAME: aesop-bot
          GIT_COMMITTER_EMAIL: bot@aesopacademy.org
        run: |
          git add ai-news/articles/*.json ai-news/articles/*.html ai-news/articles-index.json ai-news/index.html
          if git diff --cached --quiet; then
            echo "No news changes to commit."
            exit 0
          fi
          git commit -m "News: daily AI digest $(date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Notify on failure
        if: failure() || cancelled()
        env:
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python .github/scripts/notify_failure.py
