name: Backfill Drafts (one-time)

# Manually-triggered workflow that adds mega_group + per-module subtitles
# and descriptions to legacy drafts that are missing them. Safe to run
# multiple times — drafts that already have all three fields are skipped.
#
# Cost: ~$0.005 per Claude call. The dry-run output shows the exact
# count and estimated total before any spend.
#
# To run:
#   gh workflow run backfill-drafts.yml -F apply=false   # dry run, no spend
#   gh workflow run backfill-drafts.yml -F apply=true    # actually backfill
#
# Or in the GitHub UI:
#   Actions → "Backfill Drafts (one-time)" → Run workflow → set apply=true

on: {}

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN || secrets.AESOP_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run backfill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic }}
        run: |
          ARGS=""
          if [ "${{ inputs.apply }}" = "true" ]; then ARGS="$ARGS --apply"; fi
          if [ -n "${{ inputs.folder }}" ]; then ARGS="$ARGS --folder ${{ inputs.folder }}"; fi
          if [ "${{ inputs.limit }}" != "0" ] && [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi
          python .github/scripts/backfill_drafts.py $ARGS

      - name: Commit updated drafts (if anything changed)
        # IMPORTANT: always() — we want to commit successful drafts even
        # when the backfill step exits non-zero because a single draft
        # failed. Without this, one bad LLM response throws away the
        # work on the other 168. The commit step itself only writes if
        # there are actual file changes, so always() is safe here.
        if: ${{ always() && inputs.apply == 'true' }}
        run: |
          git config user.name "Drafts Backfill Bot"
          git config user.email "bot@aesopacademy.org"
          git add aip/drafts aip/ya-drafts aip/k12-drafts aip/cyber-drafts || true
          if git diff --staged --quiet; then
            echo "No draft changes to commit."
            exit 0
          fi
          git commit -m "Backfill drafts: add mega_group + module subtitles/descriptions"
          # -X theirs so the bot's just-written drafts win any conflict
          # against parallel pushes to main during the run. Safe here
          # because we only `git add` the four draft folders, so the
          # only things "theirs" can override are draft JSONs the bot
          # just authoritatively rewrote.
          git pull --rebase -X theirs origin main
          git push
