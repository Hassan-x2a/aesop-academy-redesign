name: AIP Research Agent

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:        # Manual trigger anytime

jobs:
  generate-drafts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AIP_COMMIT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic pinecone requests "pytrends" "urllib3<2"

      - name: Run AIP Research Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.pinecone }}
          PINECONE_HOST: https://aesop-academy-sqe0vz2.svc.aped-4627-b74a.pinecone.io
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python .github/scripts/aip_research_agent.py

      - name: Rebuild draft index
        run: python .github/scripts/rebuild_index.py aip/drafts

      - name: Commit draft proposals
        run: |
          git config user.name "AIP Research Agent"
          git config user.email "aip-agent@aesopacademy.org"
          git add aip/drafts/
          git diff --staged --quiet || git commit -m "AIP: $(date '+%Y-%m-%d') weekly draft proposals"
          git pull --rebase origin main
          git push || (sleep 10 && git pull --rebase origin main && git push)

      - name: Notify on failure
        if: failure() || cancelled()
        env:
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python .github/scripts/notify_failure.py
